{"type":"item","text":"5 cucchiai crème fraîche"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale"},{"type":"item","text":"pepe nero"},{"type":"header","text":"Salsa di menta"},{"type":"item","text":"foglie menta (fresca, una manciata)"},{"type":"item","text":"20 g zucchero cristallizzato"},{"type":"item","text":"2 cucchiai aceto di vino rosso"},{"type":"item","text":"sale"},{"type":"item","text":"pepe nero"}],"directions":"sbucciate le mele, privatele del torsolo e tagliatele grossolanamente in pezi di circa 2,5 cm. Grattugiate la scorza dell'arancia sopra un pentolino e spremeteci dentro il succo. Aggiungete il burro, lo zucchero e la cannella. Incorporate la noce moscata grattugiata ed i chiodi di garofano. In un pentolino far sciogliere il burro a fuoco dolce.\n\nMescolate finché il burro diventa spumoso, poi incorporateci i pezzi di mela. Coprite il pentolino con un coperchio e cuocete per 20-25 minuti a fuoco medio-basso mescolando di tanto in tanto fino ad ottenere una salsa mrbida ma con i pezzi. Assaggiate e, se serve, aggiungete un po' di zucchero. Servite la vostra salsa di mele tiepida o fredda....è una delizia in tutti e due i modi!\n\npelate e tritate finemente la mezza cipolla. Mettetela in un pentolino insieme al latte, all'alloro ed ai chiodi di garofano e fate andare a fuoco dolce. Lasciate sobbollire 10 minuti, poi togliete l'alloro ed i chiodi di garofano. Mettete il pane nel pentolino e fatelo sobbollire per 5 minuti, finché avrà assorbito tutto il latte, ammorbidendosi.\n\nIncorporate la senape a aggiustate di sale e pepe. Una volta finita, la salsa dovrebbe avere più o meno la consistenza di un semolino. Se la volete più densa, fatela cuocere un altro po'; se la volete più liquida, aggiungete un goccio d'acqua.\n\nmettete il rafano in una ciotola. Grattugiateci finemente il limone, poi tagliatelo a metà e spremeteci anche il succo. Aggiungete la crème fraîche, una bella spruzzata d'olio evo ed un pizzico di sale e pepe. \n\nMescolate bene il tutto. Assaggiate e, se serve, aggiungete un altro po' di rafano, sale o pepe.\n\nTritate finemente la menta e mettetela in una ciotola. Sciogliete lo zucchero in 100 ml d'acqua bollente e versatelo direttamente sulla menta. Aggiungete l'aceto: oltre a diluirla un po', darà alla salsa una bella scossa.\n\nAggiungete un pizzico di sale e pepe e bilanciate il sapore aggiungendo un pizzico di zucchero o un goccio d'aceto.","notes":"","rating":0,"source":"Jamie Oliver","source_url":"","has_photo":true,"favorites":false},{"uid":"32A9D506-E3AE-48EC-800B-D21A02BFAC5F","name":"Scaloppine Alla Pizzaiola","categories":["Messinese"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"8 fettine vitello"},{"type":"item","text":"1 scatola pelati"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"1/2 bicchiere vino bianco secco"},{"type":"item","text":"olio evo"},{"type":"item","text":"origano"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"},{"type":"item","text":"olive nere (facoltativo)"}],"directions":"In una padella antiaderente far soffriggere l'aglio nell'olio.\n\n\nQuando l'olio sarà ben caldo far rosolare le fettine di carne da entrambi i lati e quando saranno dorate sfumarle nel vino bianco dopodiché metterle da parte mantenendole al caldo. \n\nNella stessa padella versare i pelati, aggiungere le olive (se utilizzate), l'origano, il sale ed il pepe e fare restringere la salsa.\n\nRimettere la carne nel pomodoro.\n\nFare insaporire il tutto per qualche minuto e servire ben caldo.","notes":"La ricetta può essere arricchita mettendo subito la carne nel pomodoro (senza far restringere la salsa) e disponendovi sopra degli spicchi di patate come nella ricetta delle scaloppine.","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"26636247-AC73-44EE-A416-E3534B26F2CA","name":"Scaloppine del nonno Stefano","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"600 g carne di vitello a fette"},{"type":"item","text":"600 g patate"},{"type":"item","text":"1 cipolla"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"}],"directions":"In una padella far dorare le cipolle nell'olio.\n\nAggiungere la carne e farla ammorbidire girandola da entrambe le parti.\n\n\nAggiungere le le patate tagliate a spicchi alti 1/2 cm disponendole tutte sopra alla carne.\n\nSalare e pepare a piacere ed aggiungere un poco d'acqua. \n\nCuocere su fuoco moderato con il coperchio per circa 30 minuti, aggiungendo se necessario di tanto in tanto un poco d'acqua. \n\nServire il piatto caldo.","notes":"Una volta aggiunte le patate, non mescolarle o disturbarle troppo per evitare che si spappolino.","rating":3,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"61E7FDD2-7B20-43FD-A789-CF88CB83B138","name":"Schiacciata alla Fiorentina","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"250 g farina"},{"type":"item","text":"150 g zucchero"},{"type":"item","text":"1 uovo"},{"type":"item","text":"1 arancia (succo e buccia (grattugiata))"},{"type":"item","text":"10 cucchiai latte"},{"type":"item","text":"4 cucchiai olio evo"},{"type":"item","text":"1 bustina lievito per dolci"},{"type":"item","text":"1 bustina vanillina"},{"type":"item","text":"zucchero a velo"}],"directions":"montare l'uovo con lo zucchero\n\nsi aggiungono l'olio e il latte\n\npoi il succo e la buccia dell'arancia grattugiata\n\npoi la farina, il lievito e la bustina di vanillina\n\nmettere in una teglia rettangolare (rigorosamente!!!!)\n\ncuocere in forno a 180° per 20-25 minuti fino a che non assume un colore arancio dorato così:\n\nuna volta raffreddata si cosparge di zucchero a velo e, volendo si decora con del cacao zuccherato con il tipico disegno:\n\nottima così senza nient'altro ma spesso si trova farcita con panna montata, crema o cioccolata.","notes":"","rating":0,"source":"Cookaround","source_url":"","has_photo":true,"favorites":false},{"uid":"185F0F5F-CDBE-4F08-9658-AF612B94AF18","name":"Schiacciata Alla Fiorentina \"tradizionale\"","categories":[],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"\"Venendo da tre generazioni di pasticceri conosco molto bene questo dolce e fin da quando ero piccola guardavo, con il naso che mi batteva sul bordo del bancone da lavoro più alto di me, mio padre, intento a preparare centinaia di schiacciate da distribuire per la città.\n\nLa ricetta che vi propongo è quella della vera schiacciata alla fiorentina, un dolce straordinario che purtroppo oggi fa parte di quei sapori della tradizione quasi del tutto perduti, perchè ritenuti troppo “faticosi” da eseguire seguendo le regole. In effetti è necessaria un’estrema attenzione ai dettagli e ai tempi, ma vedrete che non appena sarà pronta, il profumo e il sapore vi ripagheranno del tempo che le avrete dedicato.\"","ingredients":[{"type":"header","text":"per il lievitino:"},{"type":"item","text":"150 g farina tipo 00 (con un buon glutine)"},{"type":"item","text":"30 g lievito di birra"},{"type":"item","text":"60 g acqua"},{"type":"header","text":"per l'Impasto base:"},{"type":"item","text":"200 g farina tipo 00 (con un buon glutine)"},{"type":"item","text":"45 g burro"},{"type":"item","text":"85 g zucchero semolato"},{"type":"item","text":"85 g uova intere"},{"type":"item","text":"1 scorza di un'arancia (non trattato, grattugiato)"},{"type":"item","text":"1 bustina vanillina"},{"type":"item","text":"5 g sale"},{"type":"header","text":"per l'ultima fase della ricetta:"},{"type":"item","text":"50 g strutto"},{"type":"item","text":"40 g zucchero semolato"},{"type":"item","text":"1 uovo"}],"directions":"Sciogliere il lievito di birra nell’acqua tiepida e unirlo alla farina; impastare fino all’ottenimento di un composto liscio, omogeneo e asciutto; mettere l’impasto in un recipiente precedentemente infarinato e lasciarlo coperto da un telo di stoffa in un punto caldo della casa (non vicino al termosifone o nel forno acceso!) fino a che l’impasto non raddoppierà il suo volume; considerate che la temperatura ottimale sarebbe di 25° circa.\n\nIniziare la seconda fase della ricetta quando il lievitino è pronto ad essere integrato\nIncorporare nel seguente ordine gli ingredienti: prima la farina con il burro e lo zucchero; poi le uova ed infine la scorza d’arancia grattugiata, la vanillina e il sale.\n\nUna volta messi tutti gli ingredienti, unirvi il lievitino e continuare a impastare fino al raggiungimento di un impasto equilibrato; rimetterlo a lievitare fino al raddoppiamento, almeno, del volume dell’impasto.\n\nMontare insieme lo zucchero e il burro, poi incorporarvi l’impasto base lievitato sotto forma di piccoli pezzi facendo in modo che il risultato sia un impasto molto morbido e piuttosto diluito ma non liquido; a questo punto non resta che unire l’uovo e finire di lavorare l’impasto finche non abbia raggiunto la giusta sodezza: la pasta deve risultare in modo tale da riuscire a distenderla con le mani.\n\nSistemare l’impasto nella teglia e lasciarlo a lievitare fino a che la pasta superi per altezza i bordi e formi un specie di cupolina al centro (ci vorranno circa 2 ore).\n\nAppena la lievitazione sarà terminata, infornare: la ricetta originale dice a 210° per circa 10 minuti, ma secondo me a non più di 180° e per circa 20 minuti. Per me è da provare a 160° e togliere quando ha il classico color nocciola chiaro.\n\nUna volta tolta dal forno è necessario aspettare che si sia intiepidita dopodichè non resta che spolverarla di zucchero a velo e servirla.","notes":"Prima di iniziare la ricetta assicuratevi di avere una teglia di circa 22×34 cm poichè per una perfetta riuscita del dolce è necessario mettere 550 gr d’impasto in un contenitore proprio di queste dimensioni.\n\nL'ho provata usando farina tipo 0 e mettendo in forno tradizionale a 185° per 20 minuti. Il rusultato è buono, un po' troppo asciutto (probabilmente era necessario lasciarlo 5/7 minuti in meno nel forno). Sapore ottimo e consistenza molto leggera.\n\nL'ho fatta ancora, stavolta usando farina 00, raddoppiando le dosi e facendo due teglie. E' venuta molto bene, soffice e saporita. Il gusto molto buono, forse può essere esaltato utilizzando essenza di vaniglia al posto della vaniglina. L'ho farcita di crema chantilly, ottenuta da circa il 40% di crema inglese e 60% di panna.","rating":4,"source":"Ginger & Tomato","source_url":"","has_photo":true,"favorites":false},{"uid":"3AA1C94B-54A0-4BF9-B6DA-B4C2B60D9058","name":"Schiacciata Alla Fiorentina \"tradizionale\" (2)","categories":[],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"Nota dell'autrice\n\"Dolce fiorentino tipico del periodo di carnevale! Questa è la versione antica, con strutto, lievito di birra e doppia lievitazione.\nIl risultato ha proprio \"il sapore schiacciata alla fiorentina\", profumo e morbidezza incredibili!\nqui ho usato la ricetta della mia famiglia, trovata in un vecchio quaderno di ricette, di quelli neri con la costolina rossa, scritto a pennino e poi a stilografica, bellissimo!\nIl quaderno era della mia zia Gì, anno di nascita 1919. le ricette prima sono state dettate dalla sua mamma, la mia nonna, poi nel tempo sono state trascritte altre ricette di amiche. \n\nQuesto quaderno è poi interessantissimo da un punto di vista storico-culinario, attraversa un periodo di tempo ampio e si vede come si trasformano le ricette con i periodi storici (ricette \"povere\" del tempo di guerra, più ricche con l'arrivo del benessere) e con l'arrivo dell'industrializzazione.\"","ingredients":[{"type":"item","text":"500 g farina (anche 300 g tipo 0 e 200 g tipo manitoba)"},{"type":"item","text":"200 g zucchero"},{"type":"item","text":"200 g strutto"},{"type":"item","text":"2 uova"},{"type":"item","text":"1 arancia (scorza e succo)"},{"type":"item","text":"20 g lievito di birra"},{"type":"item","text":"1/4 lt latte (va bene anche acqua)"},{"type":"item","text":"q.b. zucchero a velo (per la copertura)"},{"type":"item","text":"zafferano (in polvere, facoltativo ma tipico)"},{"type":"item","text":"noce moscata (facoltativo ma tipico)"}],"directions":"la ricetta non specificava quanta farina usare, io ne ho messa 350 gr, ho unito il lievito spezzettato ed ho aggiunto il latte (l'ho messo tutto in questo passaggio)\nho impastato bene fino ad avere un panetto omogeneo che ho lasciato lievitare fino al raddoppio (un ora circa)\n\nuna volta lievitato ho sgonfiato l'impasto\n\nSpremere l'arancia e grattugiare la buccia\n\n\nimpasto finale:\n\nin una ciotola unire le uova al succo di arancia\n\nunire lo zucchero\n\namalgamare il tutto\n\nunire la farina e amalgamarla bene al composto appena preparato\n\naggiungere lo strutto, amalgamare anch'esso e poi aggiungere la scorza di arancia grattugiata\n\nse fosse avanzato del latte dalla biga, aggiungerlo in questo momento\n\naggiungere a questo punto la biga e lavorare bene il tutto\n\nl'impasto richiede una lavorazione tipo quella del babà, lunga ed energica\n\nl'impasto finale sarà mobido ma ben incordato\n\nversare l'impasto in una teglia rigorosamente rettangolare (in questo caso 23x33) e far lievitare nuovamente fino al raddoppio\n\nscaldare il forno a 200°, poi abbassare a 190° e infornare, cuocere per 45-50 minuti circa (consueta prova stecchino)\n\nse in cottura si colorisse troppo, coprire con una stagnola o con una teglia nel primo spazio del forno utile e portare a cottura\n\neccola appena sfornata, appena si sarà freddata cospargere di zucchero a velo e, a piacere, decorare con il tipico giglio fiorentino (per la sagoma del giglio: qui)\n\nservire al naturale o farcita con panna montata o crema chantilly","notes":"Vista l'anzianità della ricetta, i pochi dettagli di preparazione e di specifica del tipo di farina, valutare se occorresse aggiungere della farina se l'impasto risultasse troppo morbido\n\nSB: Ho provato a farla dimezzando le dosi per una teglia tonda di 24 cm. Ho mantenuto le proporzioni, sostituito il burro allo strutto e usato farina 0 e manitoba. \nHo aggiunto anche una bustina di zafferano e 1/2 noce moscata.\nDopo la seconda lievitazione (un'ora e mezzo circa), a impasto raddoppiato, ho infornato a 190°, ventilato pasticceria, per 25 minuti. \nL'impasto ha lievitato ancora nel forno moltissimo, uscendo dalla teglia di un paio di centimetri in altezza. Poi si è sgonfiato prima della fine della cottura ed anche dopo. \nProbabilmente anche per questo il risultato è deludente: poco soffice, un po' asciutto.\nInoltre è speziata: zafferano e noce moscata hanno un loro gusto deciso, piacevole, che però l'allontana dalle versioni che conosciamo \"alla Giorgio\" che probabilmente prevedono vaniglina soltanto.","rating":0,"source":"La cucina di Marble","source_url":"","has_photo":true,"favorites":false},{"uid":"83D9A6C9-BE61-4ACF-8994-FDFF5C8F8C93","name":"Schiacciata Alla Fiorentina \"tradizionale\" (3)","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per la biga:"},{"type":"item","text":"200 g farina tipo 0 ((W=360/380, P/L=0,50-0,60))"},{"type":"item","text":"100 g acqua"},{"type":"item","text":"65 g lievito"},{"type":"header","text":"per il preimpasto:"},{"type":"item","text":"300 g farina tipo 0 ((W=190/200 P/L=0,55-0,60))"},{"type":"item","text":"100 g burro"},{"type":"item","text":"100 g zucchero"},{"type":"item","text":"1 1/2 uova"},{"type":"item","text":"7 1/2 g buccia di limone (grattugiata)"},{"type":"item","text":"32 1/2 g buccia di arancia (grattugiata)"},{"type":"item","text":"0.10 cucchiaini vanillina"},{"type":"item","text":"5 g sale"},{"type":"header","text":"per l'impasto:"},{"type":"item","text":"100 g zucchero"},{"type":"item","text":"50 g strutto"},{"type":"item","text":"2 1/2 uova"}],"directions":"Biga \n\nDisporre la farina su un piano formando spazio al centro.\n\nSciogliere il lievito in un po' d'acqua tiepida.\n\nMettere l'acqua al centro della farina e farla pian piano assorbire impastando poi bene.\n\nLasciar riposare la biga per 5-6 ore in frigorifero (T circa 5°C). \n\nPreimpasto \n\nMettere tutti gli ingredient,i escluso le bucce di agrumi macinate, in impastatrice (braccia tuffanti) e aggiungere la biga.\n\nQuando l’impasto è pronto aggiungere le bucce macinate e far incorporare per alcuni minuti. \n\nLasciar riposare l’impasto in mastello per circa 3-4 ore a temperatura di frigorifero (T circa 5°C). \n\nImpasto \n\nMettere tutti gli ingredienti in planetaria, aggiungere il preimpasto e lavorare molto bene, fino a che la pasta non risulti ben liscia ed “incordata”. Se del caso aggiungere delle uova intere per regolare la consistenza. \n\nDisporre l'impasto su una teglia rettangolare precedentemente unta con strutto fuso, “tirare” la pasta sulla teglia facendo attenzione ad ottenere uno spessore uniforme. \n\nLasciar lievitare per circa 2 ore a temperatura di laboratorio. \n\nCuocere in forno moderato con bocchette aperte per circa 10-15 minuti. \n\nLasciar raffreddare per alcuni minuti poi capovolgere la schiacciata sulla teglia per evitare la \n\nformazione di umidità. \n\nCospargere la superficie con zucchero al velo vanigliato.","notes":"","rating":0,"source":"Ricetta tradizionale del panificio NISTRI ANDREA","source_url":"","has_photo":true,"favorites":false},{"uid":"523D030A-DF86-49C6-9E5C-6CABBFBD3E16","name":"Schiacciata Alla Fiorentina \"tradizionale\" (4)","categories":["Desserts"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"il sapore è ottimo, devo dire che se abbiamo un pò più di tempo a disposizione, è meglio fare questa versione, senza nulla togliere all'altra!","ingredients":[{"type":"item","text":"500 g farina"},{"type":"item","text":"15 g lievito di birra"},{"type":"item","text":"300 g acqua (tiepida)"},{"type":"item","text":"2 uova"},{"type":"item","text":"1 pizzico sale"},{"type":"item","text":"125 g zucchero"},{"type":"item","text":"1 buccia di arancia"},{"type":"item","text":"150 g strutto"},{"type":"item","text":"zucchero a velo"}],"directions":"ho fatto mezza dose\n\ncome prima cosa si unisce il lievito spezzettato alla farina\n\nsi aggiunge l'acqua e si lavora bene il composto, fino a che non otterremo un impasto ben omogeneo\n\nche lasceremo lievitare in luogo tiepido circa un'ora, raddoppierà il volume. eccolo dopo la lievitazione\n\naggiungiamo quindi lo zucchero, le uova, la scorza di arancia grattugiata, il sale\n\ne lavoriamo a lungo l'impasto, anche 10-15 minuti, fino a che non sarà ben elastico. all'inizio sembra impossibile, ma poi diventa tutto omogeneo ed elastico. aggiungiamo quindi lo strutto\n\nlavoriamo di nuovo bene in modo che lo strutto si amalgami bene al resto dell'impasto e mettiamo tutto in teglia (che dovrà essere rigorosamente rettangolare!!!). meglio sarebbe unta (con strutto o burro) e infarinata, ma questa volta ho messo la carta da forno bagnata e strizzata e dopo non mi è piaciuto per niente l'effetto finale...\n\nlasciamo lievitare un paio d'ore, fino a che non raddoppia in altezza\n\nin forno a 180° per circa 35'\n\neccola finita spolverizzata di zucchero a velo e, nel mio caso, rattoppata in seguito alla rottura dovuta \"all'aiuto\" della mia nipotina....","notes":"","rating":0,"source":"Cookaround","source_url":"","has_photo":true,"favorites":false},{"uid":"193EA5B0-4573-4A9B-9485-9BE9C009E1C4","name":"Schiacciata Fiorentina Al Gusto Brioche","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"La ricetta per ottenere la schiacciata alla fiorentina con il tipico gusto brioche come in pasticceria.\nQuesta ricetta richiede tante ore di lievitazione e pur non richiedendo molto lavoro necessita di minimo 2 giorni di attesa prima di arrivare al risultato finale.","ingredients":[{"type":"header","text":"per il primo impasto:"},{"type":"item","text":"150 g farina forte (manitoba)"},{"type":"item","text":"50 ml acqua"},{"type":"item","text":"30 g burro"},{"type":"item","text":"2 g lievito di birra"},{"type":"header","text":"per il secondo impasto:"},{"type":"item","text":"500 g farina manitoba"},{"type":"item","text":"4 uova intere"},{"type":"item","text":"125 g zucchero semolato"},{"type":"item","text":"150 g burro"},{"type":"item","text":"50 ml latte intero"},{"type":"item","text":"25 g miele"},{"type":"item","text":"23 g lievito di birra"},{"type":"item","text":"7,5 g sale"},{"type":"item","text":"1 scorza di un'arancia"},{"type":"item","text":"1 bacca di vaniglia"},{"type":"item","text":"zucchero vanigliato (per guarnire)"},{"type":"item","text":"zucchero semolato (per guarnire)"},{"type":"item","text":"cacao in polvere (per guarnire)"}],"directions":"Il primo impasto si ottiene sciogliendo 2 g di lievito di birra in 50 ml di acqua ed unendolo a 150 g di farina e 30 g di burro ammorbidito nel forno a microonde oppure a temperatura ambiente.\n\nSi impastano tutti questi ingredienti fino ad ottenere un impasto compatto ma senza esagerare. Non è necessario ottenere il classico impasto liscio ma vale lo stesso principio di quando si realizzano le biga per il pane, basta amalgamare bene gli ingredienti.\n\nUna volta prepararto questo primo impasto si mette a lievitare a temperatura ambiente per circa 12 ore coprendolo con un panno umido. Se al termine delle 12 ore, come spesso accade, non abbiamo il tempo per proseguire la nostra ricetta possiamo conservare l'impasto in frigo.\n\nPer il secondo impasto è consigliabile utilizzare un robot da cucina. In alternativa possiamo sempre farlo a mano ma il lavoro sarà un po' piu lungo.\n\nSciogliere il rimanente lievito nel latte tiepido e spezzettarci dentro il primo impasto. Unire tutti gli ingredienti ad eccezione del burro che sarà aggiunto a metà impasto avendo l'accortezza di non mettere il sale a diretto contatto con il lievito.\n\nAvviare il robot da cucina utilizzando il classico gancio. Quando l'impasto inizia ad essere ben amalgamato unire poco alla volta il burro appena tolto dal frigo e continuare ad impastare per circa 10 minuti fermando l'impastatrice dopo circa 5 minuti per staccare l'impasto dal gancio e capovolgerlo con le mani. Questa procedura permette di agevolare l'ottenimento della giusta consistenza dell'impasto stesso.\n\nProbabilmente non riusciremo ad ottenere un impasto abbastanza elastico e liscio direttamente nel robot da cucina per cui conviene al termine dei 10 minuti, capovolgerlo su un piano di lavoro e continuare per qualche minuto l'impasto manualmente, meglio se si riesce senza aggiungere altra farina.\n\nUna volta che l'impasto sarà ben liscio formare una palla e mettere a lievitare a temperatura ambiente per circa 30 minuti, dopodichè è necessario coprirlo con la pellicola e metterlo in frigo a lievitare e maturare per altre 12 ore.\n\nTogliere dal frigo, stendere l'impasto e metterlo in una teglia alta foderata con la classica carta da forno. Con queste quantità si possono ottenere due schiacciate alla fiorentina piccole oppure una grande circa 50 cm per 30 cm.\n\nMettere la teglia a lievitare in forno spento ma con un pentolino d'acqua a bollore per circa 3 ore.\n\nAl termine della lievitazione è necessario toglierla dal forno che dovrà essere acceso ed impostato a circa 180 gradi.\n\nMentre il forno si scalda, utilizzando un colino, spolverare il dolce prima con lo zucchero semolato e poi con quello vanigliato.\n\nQuando il forno raggiunge la temperatura di 180 gradi, infornare la schiacciata alla fiorentina e cuocere per circa 20 minuti o meglio fino a quando il dolce inizia a prendere colore.\n\nUna volta tolto dal forno e quando si sarà raffreddato togliere dalla teglia e spolverare con altro zucchero vanigliato.\n\nSe siete tradizionalisti, usando del cacao amaro, un colino e una forma di cartone disegnate il nostro amato giglio di Firenze.","notes":"Varianti: se volete esagerare montate 300/400 g di panna, tagliate a mezzo la schiacciata alla fiorentina e guarnitela. A differenza di tante altre torte però non dovete bagnarla ma unire semplicemente la panna montata oppure, perchè no, della buona crema pasticcera o crema chantilly.","rating":5,"source":"Ricette e Ricette","source_url":"","has_photo":true,"favorites":false},{"uid":"3FDF3DBA-7808-484D-A828-4D05A7300334","name":"Soffritto all'italiana","categories":["Ricette base","Aiutacuochi"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g cipolle bianche (oppure gialle o rosse)"},{"type":"item","text":"300 g carote"},{"type":"item","text":"200 g sedano"},{"type":"item","text":"150 g burro (oppure olio evo)"}],"directions":"Pelate le cipolle e le carote e tagliatele fini insieme al sedano, meglio se con un coltello di ceramica. Sciogliete in una casseruola il burro e fatele rosolare a fuoco dolcissimo.\n\nCuocete per 30 minuti o più, non si cuociono mai troppo, mescolando con un cucchiaio di legno, unendo acqua se asciugassero troppo e sempre stando ben attenti che non brucino.\n\nAlla fine tritate o passate al frullatore a immersione.","notes":"Il soffritto non si sala, tanto non lo si mangia a cucchiaiate. Salerete il piatto dove lo utilizzerete.","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"E5A9CABE-4999-4439-AEE5-5ABD29DEA422","name":"Soffritto all'italiana con pancetta","categories":["Ricette base","Aiutacuochi"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g cipolle bianche (oppure gialle o rosse)"},{"type":"item","text":"300 g carote"},{"type":"item","text":"200 g sedano"},{"type":"item","text":"200 g pancetta"},{"type":"item","text":"100 g burro (oppure olio evo)"},{"type":"item","text":"1 bicchierino vino bianco secco"},{"type":"item","text":"1 punta concentrato di pomodoro"}],"directions":"Pelate le cipolle e le carote e tagliatele fini insieme al sedano. Aggiungete la pancetta a dadini. Sciogliete in una casseruola il burro e fate rosolare il trito con pancetta a fuoco dolcissimo.\n\nDopo 10 minuti di cottura, unire il vino bianco ed il concentrato di pomodoro.\n\nCuocete per altri 20 minuti o più, mescolando con un cucchiaio di legno, unendo acqua se asciugasse troppo e sempre stando ben attenti che non brucino.\n\nAlla fine tritate o passate al frullatore a immersione.","notes":"Il soffritto non si sala, tanto non lo si mangia a cucchiaiate. Salerete il piatto dove lo utilizzerete.","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"FE183EA4-D5F5-44A0-9137-AF091149616B","name":"Soffritto di cipolle","categories":["Ricette base","Aiutacuochi"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"Fate il soffritto con calma, nella solita giornata uggiosa, quando non avete nulla di meglio da fare. Conservatelo in frigo, dove dura 1 settimana senza problemi, oppure in freezer, diviso in dosi standard, dove dura 3 mesi. Aggiungetelo dove e quando serve, al momento giusto.","ingredients":[{"type":"item","text":"1 kg cipolle bianche (oppure gialle o rosse)"},{"type":"item","text":"150 g burro (oppure olio evo)"}],"directions":"Pelate e tagliate fini le cipolle, possibilmente con un coltello di ceramica. Sciogliete in una casseruola il burro e fatele rosolare a fuoco dolcissimo, che di più non si può. \n\nCuocete per 30 minuti o più, non si cuociono mai troppo, mescolando con un cucchiaio di legno, unendo acqua se asciugassero troppo e sempre stando ben attenti che non brucino.\n\nAlla fine tritate o passate al frullatore a immersione.","notes":"Il soffritto non si sala, tanto non lo si mangia a cucchiaiate. Salerete il piatto dove lo utilizzerete.","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"C31DC1F3-DC95-4640-9F6B-65140F2D645D","name":"Soffritto di porri","categories":["Ricette base","Aiutacuochi"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 kg porri (lasciare anche un po' del verde)"},{"type":"item","text":"150 g burro (oppure olio evo)"}],"directions":"Pelate e tagliate fini i porri, lasciando un po' del verde, che da un buon sapore. Sciogliete in una casseruola il burro e fatele rosolare a fuoco dolcissimo (si dice \"sopra una candela\"). \n\nCuocete per 30 minuti o più, non si cuociono mai troppo, mescolando con un cucchiaio di legno, unendo acqua se asciugassero troppo e sempre stando ben attenti che non brucino.\n\nAlla fine tritate o passate al frullatore a immersione.","notes":"Il soffritto non si sala, tanto non lo si mangia a cucchiaiate. Salerete il piatto dove lo utilizzerete.","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"75283EDE-0966-41D6-9D9E-CDA55B8FA34F","name":"Soffritto di scalogni","categories":["Ricette base","Aiutacuochi"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 kg scalogni"},{"type":"item","text":"150 g burro (oppure olio evo)"}],"directions":"Pelate e tagliate fini i porri, lasciando un po' del verde, che da un buon sapore. Sciogliete in una casseruola il burro e fatele rosolare a fuoco dolcissimo. \n\nCuocete per 30 minuti o più, non si cuociono mai troppo, mescolando con un cucchiaio di legno, unendo acqua se asciugassero troppo e sempre stando ben attenti che non brucino.\n\nAlla fine tritate o passate al frullatore a immersione.","notes":"Il soffritto non si sala, tanto non lo si mangia a cucchiaiate. Salerete il piatto dove lo utilizzerete.","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"B9FBF0F7-EDCA-4A26-927F-73BB81E712C5","name":"Soufflé classico al formaggio","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"150 g groviera (grattugiato)"},{"type":"item","text":"75 g burro"},{"type":"item","text":"40 g farina"},{"type":"item","text":"50 cl latte (tiepido)"},{"type":"item","text":"4 tuorli d'uovo"},{"type":"item","text":"6 albumi d'uovo"},{"type":"item","text":"1 pizzico noce moscata (grattugiata)"},{"type":"item","text":"sale e pepe (qb)"}],"directions":"","notes":"","rating":0,"source":"Soufflés gongflés","source_url":"","has_photo":true,"favorites":false},{"uid":"D0ACE3EE-5C1B-4571-B716-097FE8B59562","name":"Soufflé di zucchine alla menta","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"3 zucchine (piccole)"},{"type":"item","text":"1 mazzetto menta"},{"type":"item","text":"30 g burro"},{"type":"item","text":"30 g farina"},{"type":"item","text":"35 cl latte (tiepido)"},{"type":"item","text":"3 tuorli d'uovo"},{"type":"item","text":"5 albumi d'uovo"},{"type":"item","text":"sale e pepe (qb)"}],"directions":"","notes":"","rating":0,"source":"Soufflés gongflés","source_url":"","has_photo":true,"favorites":false},{"uid":"C6061AEF-1F85-439F-9E3F-4AEB29F04B3B","name":"Spaghetti O’ Niuru De Sicci","categories":["Messinese"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"30 min","description":"","ingredients":[{"type":"item","text":"1 kg seppie (comprese le sacche col nero)"},{"type":"item","text":"sale"},{"type":"item","text":"olio evo"},{"type":"item","text":"350 g spaghetti"},{"type":"item","text":"2 aglio"},{"type":"item","text":"pepe"},{"type":"item","text":"250 g pomodoro concentrato"},{"type":"item","text":"ciuffi prezzemolo"},{"type":"item","text":"pecorino grattugiato"}],"directions":"Pulire le seppie e tagliarle a pezzi. \n\nIn un tegame versare un velo d’olio, farvi imbiondire gli spicchi d’aglio schiacciati, unire poi le seppie rimescolando. \n\nPoco dopo aggiungere il prezzemolo, salare e pepare. Unire il pomodoro concentrato e diluire con 600 gr circa di acqua tiepida.\n\nAggiustare di sale e portare a ebollizione fino a quando il sugo avrà raggiunto la densità desiderata. Cuocere a fuoco basso per circa 25 – 30 minuti.  \n\nVersare il nero contenuto nelle vescichette tenute da parte e rimescolare a fuoco spento. \n\nCuocere la pasta in acqua salata.\n\n Scolare la pasta e unire la salsa. \n\nSpolverate un po’ di pecorino","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"C5990E2B-FF94-4D92-A1FA-E4FB5570A0AD","name":"Spinaci Cremosi","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"400 g spinaci (baby, già lavati)"},{"type":"item","text":"1 mazzo cipollotti"},{"type":"item","text":"3 spicchi aglio"},{"type":"item","text":"2 rametti timo (fresco)"},{"type":"item","text":"1 noce moscata (da grattugiare)"},{"type":"item","text":"1 noce burro (abbondante)"},{"type":"item","text":"100 ml panna fresca"},{"type":"item","text":"25 g parmigiano"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"282A5F0E-AB4A-47D7-81DD-1BD16C1C768E","name":"Stelle alla gelatina di lampone","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"150 g farina tipo 00"},{"type":"item","text":"150 g fecola di patate"},{"type":"item","text":"200 g burro"},{"type":"item","text":"100 g zucchero a velo"},{"type":"item","text":"1 g uovo"}],"directions":"","notes":"","rating":0,"source":"Cucchiaio d'argento","source_url":"","has_photo":true,"favorites":false},{"uid":"D93D1031-88E0-4015-80FB-4BCB6B442B11","name":"Stinco alla birra","categories":["Maiale"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"4 stinchi di maiale"},{"type":"item","text":"33 cl birra scura"},{"type":"item","text":"4 cucchiai Soffritto di cipolle"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"1 rametto rosmarino"},{"type":"item","text":"foglie salvia"},{"type":"item","text":"olio (oppure burro)"},{"type":"item","text":"sale e pepe"}],"directions":"In una casseruola rosolate gli stinghi di maiale con olio (o burro) per 10'.\n\nUnite la birra, il soffritto, l'aglio, il rosmarinoe la salvia.\n\nCuocere coperto a fuoco dolcissimo per un' ora e mezzo.\n\nAlla fine regolate si sale e pepe.","notes":"Perfetto se accompagnato da un contorno di patate bollite.","rating":4,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"8D84337C-B866-4231-8583-911C9809E4FE","name":"Stoccafisso alla ghiotta messinese","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"2 ore 5 min","description":"(Piscistoccu 'a ghiotta missinisi)\n\nLo stoccafisso alla messinese è una ricetta tipica della città, famosa per la preparazione del “piscistuoccu”, ovvero lo stoccafisso.","ingredients":[{"type":"item","text":"800 g filetti di baccalà"},{"type":"item","text":"1000 g patate novelle"},{"type":"item","text":"200 g salsa di pomodoro"},{"type":"item","text":"200 g cipolle"},{"type":"item","text":"100 g sedano"},{"type":"item","text":"50 g capperi"},{"type":"item","text":"200 g olive verdi in salamoia"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale e pepe"}],"directions":"Ammollate lo stoccafisso, tenendolo a bagno quanto serve.\n\nTritate la cipolla e il sedano. Fateli cuocere insieme ai capperi in una casseruola con qualche cucchiaio d’olio e mezzo bicchiere d’acqua. Quando l’acqua è evaporata, fate rosolare il trito mescolandolo con un mestolo di legno. Unite il passato di pomodoro e irrorate con mezzo litro d’acqua. Condite con sale, pepe e un po’ d’olio. Mescolate bene e immergetevi i filetti di baccalà, disponendoli uno accanto all’altro. Fate cuocere e fuoco lento per circa 20 minuti. \n\nNel frattempo sbucciate le patate e tagliatele a tocchetti. Unitele al baccalà disponendole con cura tra gli spazi vuoti lasciati dal pesce e formando uno strato a coprire completamente il baccalà.\n\nPortate avanti la cottura per un’ora e mezza circa, senza mescolare per evitare di rompere i filetti di pesce, ma spostandoli delicatamente con un mestolo di legno per evitare che si attacchino al fondo della casseruola.\n\nAccorgimenti:\n\nIl baccalà e lo stoccafisso si differenziano per le modalità e i tempi di essiccazione, ma possono essere preparati seguendo le stesse ricette.\n\nIdee e varianti:\n\nEsiste una variante di baccalà alla messinese arricchita con pinoli e uva passa, ingredienti preziosi nella cucina siciliana.","notes":"","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"A00DEC38-8241-4053-9371-453E88D09380","name":"Sugo d'arrosto","categories":["Ricette base"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"Sono due le cose che rendono buono il sugo di un arrosto: un fondo di verdure, cioè quello strato su cui va appoggiata la carne prima di infornarla, ed il sughetto che si viene a formare durante la cottura di un pezzo di buona carne.\n\nFinché userete un fondo di verdure e comprerete carne di qualità, il vostro sugo sarà sempre una favola, indipendenetmente che lo prepariate con acqua o brodo. Seguite questo metodo e andrete sul sicuro.","ingredients":[{"type":"item","text":"fondo di verdure arrostite (ovvero quello che otterrete mettendo cipolle, carote e sedano sul fondo della teglia dell'arrosto)"},{"type":"item","text":"1 cucchiaio farina"},{"type":"item","text":"1 bicchiere vino rosso secco (anche vino bianco, o sidro, o una bella spruzzata di porto o di sherry)"},{"type":"item","text":"1 lt Brodo vegetale (anche di pollo o manzo. Va bene anche acqua.)"}],"directions":"Se state leggendo questa pagina, vuol dire che il vostro arrosto è già sul tagliere a farsi un riposino e vi trovate davanti la teglia con il fondo di verdure ed il sughetto della carne. Aiutandovi con un cucchiaio, rimiovete il 90% del grasso sciolto: inclinate la teglia e rimuovete lo strato untuoso che si è formato in superficie. Rimettete la teglia sul fuoco, a fiamma vivace. Aggiungete la farina, mescolate bene e, tenendo ferma la teglia con un canovaccio, schiacciate per bene le verdure usando uno schiacciapatate (non fa niente se restano dei grumi). \n\nSe state preparando il sugo per il pollo arrosto, adesso potete spezzettarci dentro le ali per insaporirlo. Quando tutto è stato mescolato e schiacciato, e prima di incorporare il brodo, versate la bevanda alcolica per dare un po' di profumo  e fatelo evaporare sul fuoco lasciandolo bollire qualche minuto. Incorporateci il brodo mescolando, oppure aggiungete 1 litro d'acqua calda. Portate a ebollizione grattando e recuperando quei delizionsi pezzettini che via via si attaccano al fondo. Abbassate il fuoco e lasciate sobbollire per 10 minuti, o finché il sugo avrà raggiunto la consistenza desiderata.\n\nPrendete una grossa caraffa, una terrina o una pentola e metteteci sopra un colino a maglia larga. Fate passare il sugo attraverso il colino schiacciandolo con un mestolo per spremere bene tutta la parte più buona. Buttate via ogni rimasuglio di verdura o carne. A questo punto avete tra le mani un sugo strepitoso, che potete servire così com'è oppure far sobbollire un altro po' per addensarlo ulteriormente.\n\nA seconda della carne che sto servendo, io di solito aggiungo al mio sugo d'arrosto un cucchiaino di rafano, di senape, di marmellata di ribes, oppure dalsa di mirtilli rossi, di menta o di mele: don dovete farlo per forza anche voi, ma secondo me un sapore leggermente contrastante ci sta da Dio.","notes":"","rating":4,"source":"Jamie Oliver","source_url":"","has_photo":true,"favorites":false},{"uid":"B4BC7996-307E-4BE3-A1CF-E15BB86E265D","name":"Sugo da Roast-Beef ultra rapido","categories":["Ricette base"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1/2 cipolla rossa"},{"type":"item","text":"12 funghi champignon (piccoli)"},{"type":"item","text":"1 cucchiaio farina (abbondante)"},{"type":"item","text":"1 bicchierino vino rosso secco"},{"type":"item","text":"0,3 lt Brodo di pollo"}],"directions":"","notes":"","rating":3,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"FE47DE52-04F4-4D87-A11D-4295C21B7E5C","name":"Tacchino ripieno al forno","categories":[],"servings":"8 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g salsiccia"},{"type":"item","text":"500 g prugne snocciolate"},{"type":"item","text":"500 g castagne secche"},{"type":"item","text":"3 mele"},{"type":"item","text":"1 bicchiere vino bianco secco"},{"type":"item","text":"1 gambo sedano"},{"type":"item","text":"1 carota"},{"type":"item","text":"1 cipolla"},{"type":"item","text":"latte (qb)"},{"type":"item","text":"olio evo (qb)"},{"type":"item","text":"sale e pepe (qb)"}],"directions":"","notes":"","rating":0,"source":"Cucchiaio d'argento","source_url":"","has_photo":true,"favorites":false},{"uid":"57B241CA-1DF2-4BC7-B607-312B5E35D14E","name":"Tarte Tatin di banane","categories":[],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"Che ricetta fantastica. Mi fa impazzire proprio perché è così semplice. L'unica cosa che dovete fare è comprare un po' di pasta sfoglia già pronta, tagliare a metà qualche banana e lasciare che nel forno succeda qualcosa di magico! Mi raccomando, però, state attentissimi quando capovolgete la tarte tatin: il caramello bollente fa veramente male. Vi conviene coprirvi la mano con uno strofinaccio e concentrarvi bene su quello che state facendo. E se non vi piacciono le banane, provate a farla con le mele o le pere.","ingredients":[{"type":"header","text":"per la base:"},{"type":"item","text":"250 g pasta sfoglia fresca"},{"type":"header","text":"per la farcitura:"},{"type":"item","text":"farina (per spolverare)"},{"type":"item","text":"1 arancia"},{"type":"item","text":"1/4 cucchiaino cannella (in polvere)"},{"type":"item","text":"4 banane (grosse)"},{"type":"item","text":"150 g zucchero"},{"type":"item","text":"60 g burro"},{"type":"header","text":"per servire:"},{"type":"item","text":"crème fraîche (facoltativo)"},{"type":"item","text":"gelato alla vaniglia (facoltativo)"},{"type":"item","text":"cocco disidratato (facoltativo)"}],"directions":"scaldate il forno a 180℃. Tagliate il burro a cubetti e mettetelo in una pirofila dai bordi alti grande all'incirca 19x30. Scaldatela a fuoco basso, fate fondere il burro, poi aggiungete lo zucchero e cuocete per un paio di minuti, mescolando di tanto in tanto fino a che si è dorato e caramellato. Togliete la pirofila dal fuoco, cospargete di cannella e grattateci sopra la scorza di mezza arancia.\n\ninfarinate un piano di lavoro e il mattarello. Invece di appoggiare di piatto il panetto di pasta, mettetelo di taglio e iniziate a lavorarlo con il mattarello: con questo accorgimentola pasta risulterà più leggera e croccante. Stendetelo fino a ottenere un rettangolo grande più o meno come la priofila con uno spessore di circa 0,5 cm. Avvolgete la pasta attorno al mattarello e adagiatela delicatamente sulla pirofila rimboccandola con cura intorno alle anane in modo che siano coperte per bene. Punzecchiate la pasta con la punta di un coltello o la forchetta. Mettete la pirofila sul ripiano più alto del forno già caldo e cuocetela per 25-30 minuti, finché ka oasta sarà bella dorata.\n\nQuando la vostra tarte tatin sarà pronta, dovrete capovolgerla in un colpo solo, altrimenti finirà per attaccarsi alla pirofila. Per farlo, copritebi la mano con un canovaccio, reggete la pirofila con sopra un piatto da portata o un vassoio e capovolgetela delicatamente. Con la punta di un coltello, alzate un angolino di pasta per controllare che sia ben cotta anche sotto (se non lo è, rimettetela in forno con per un paio di minuti), poi fate scivolare la vostra tarte tatin fuori dalla pirofila. Se volete aggiungere della crème fraîche, mettetela in una ciotola, grattateci su il resto della scorza d'arancia e mescolate bene. Se volete aggiungere il gelato alla vaniglia, spargete qualche cucchiaiata di cocco su un piatto e rotolateci sopra rapidamente una pallina di gelato fino a ricoprirla. Servite la vostra tarte tatin con una cucchiaiata di crème fraîche o il gelato ricoperto di cocco e mangiatela subito!","notes":"","rating":0,"source":"Jamie Oliver","source_url":"","has_photo":true,"favorites":false},{"uid":"39C3967A-7EF7-435F-9C42-0DBC61B6BCAA","name":"Teglia di Pollo","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"4 petti di pollo (da circa 180 g, senza pelle)"},{"type":"item","text":"300 g pomodorini ciliegini"},{"type":"item","text":"4 fette pancetta tesa affumicata"},{"type":"item","text":"1 pizzico origano (secco)"},{"type":"item","text":"1 cucchiaio paprica dolce"},{"type":"item","text":"1 noce burro"},{"type":"item","text":"1 limone"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"E2FFB6A1-C224-483B-A530-6BDF5753E3BF","name":"Terrina D'anatra","categories":[],"servings":"10 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 anatra"},{"type":"item","text":"250 g lardo"},{"type":"item","text":"150 g vitello (tritato)"},{"type":"item","text":"150 g lonza di maiale tritata"},{"type":"item","text":"100 g prosciutto crudo"},{"type":"item","text":"2 uova"},{"type":"item","text":"2 bicchierini brandy"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"}],"directions":"Disossate l'anatra e tagliate la carne a pezzetti.\n\nMescolateli in una grande terrina con il prosciutto crudo e 100 g di lardo entrambi tagliati a striscioline.\n\nSpruzzate il tutto con il brandy, salate e pepate e lasciate riposare per 2 ore coperto.\n\nTritate 100 g di lardo e il fegato dell'anatra, mescolateli con la carne di vitello e quella di maiale, salate, pepate e amalgamate con le uova sbattute.\n\nRiunite le due preparazioni, mescolate per avere un composto omogeneo e disponetelo in una terrina imburrata premendolo bene in superficie.\n\nSopra adagiatevi le fettine di lardo avanzate.\n\nCoprite e cuocete per circa 2 ore in forno a bagnomaria regolando il calore in modo che l'acqua sobbolli.\n\nRitirate, togliete il coperchio, sigillate il recipiente con un foglio di alluminio, mettetevi sopra un peso e tenete in frigorifero per un giorno.\n\nPrima di sformare eliminate il grasso affiorato in superficie.","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"C12E707F-189B-49FF-BFB9-9CA38705DBDB","name":"Terrina D'anatra Alle Mele","categories":[],"servings":"10 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 anatra"},{"type":"item","text":"4 foglie alloro"},{"type":"item","text":"2 scalogni"},{"type":"item","text":"1 pizzico timo"},{"type":"item","text":"500 g fegato di vitello"},{"type":"item","text":"4 mele (piccole e mature)"},{"type":"item","text":"220 g lardo (tagliato a fettine sottili)"},{"type":"item","text":"1 bicchiere vino bianco secco"},{"type":"item","text":"1 uovo"},{"type":"item","text":"1/2 limone"},{"type":"item","text":"1 cucchiaino zucchero"},{"type":"item","text":"100 cl gelatina"},{"type":"item","text":"1 bicchierino vino madera"},{"type":"item","text":"90 g burro"}],"directions":"Pulite l'anatra, disossatela e tagliate il petto a listerelle sottili e lunghe.\n\nMettetele a marinare nel vino bianco a cui aggiungerete gli scalogni tritati, il timo, 2 foglie d'alloro spezzettate, un buon pizzico di sale e un po' di pepe macinato al momento.\n\nLasciate così per circa 2 ore.\n\nIntanto tagliate il fegato di vitello a fettine piccole, mettetele in una padella insieme al fegato dell'anatra anch'esso tagliato a pezzettini e fate rosolare in 60 g di burro fino a media cottura.\n\nSbucciate le mele, tagliatele a pezzi e fatele cuocere con lo zucchero, il succo di limone e il resto del burro.\n\nQuando saranno morbide, unitele al fegato e frullate il tutto, raccogliendo la purea in una terrina.\n\nCondite con sale e pepe e legate con l'uovo sbattuto sino ad ottenere un composto omogeneo.\n\nFoderate uno stampo per paté rettangolare, con il fondo scannellato, con fettine di lardo, ricoprite con uno strato di composto di fegato e, sopra a questo, disponete i filetti di anatra; completate con il composto rimasto e con le fettine di lardo, adagiandovi sopra le ultime 2 foglie di alloro.\n\nCuocete il paté, coperto, a bagnomaria in forno a calore moderato (160 gradi-170 gradi).\n\nFuori dal forno, togliete il coperchio e sostituitelo con un peso affinché il paté si comprima mentre si raffredda.\n\nPreparate la gelatina seguendo le indicazioni della confezione, profumatela con il Madera.\n\nSformate il paté su un piatto da portata.\n\nEliminate il grasso, ricopritelo con la gelatina e lasciatelo solidificare in frigo prima di servire.","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"25367B17-D8C1-4035-8A3A-BC84CE57DD88","name":"Terrina Di Fegati Di Pollo","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"150 g lardo"},{"type":"item","text":"300 g fegati di pollo"},{"type":"item","text":"1 bicchierino vino porto"},{"type":"item","text":"100 g burro"},{"type":"item","text":"albumi d'uovo"},{"type":"item","text":"lardo"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"},{"type":"item","text":"timo"},{"type":"item","text":"alloro"},{"type":"item","text":"1 cucchiaio scalogno (tritato)"}],"directions":"Tagliate il lardo in dadi e fatelo fondere in padella.\n\nQuando il lardo è fuso, aggiungere nella padella i fegatini ben privati del fiele, 1 rametto di timo, 1 foglia di alloro, sale, pepe.\n\nFar saltare rapidamente il tutto.\n\nQuando i fegatelli sono appena cotti, aggiungere lo scalogno, farlo dorare, togliere timo e alloro, farli scolare, gettando il grasso di cottura.\n\nMettete in un recipiente fegati, lardo e scalogno, aggiungete il porto e lasciate riposare un'ora.\n\nRiservate interi 4 fegatelli, passate il resto al mixer per ottenere una crema estremamente liscia.\n\nIncorporate il burro lavorato in pomata ed i tre bianchi d'uovo montati a metà cioè non troppo sodi.\n\nMescolate a lungo.\n\nVersate la preparazione in una terrina rivestita di barde di lardo, intercalando i fegati interi.\n\nRicoprite con una barda di lardo, mettete al fresco.\n\nQuesta terrina, che deve essere rosata, si serve con un cucchiaio bagnato nell'acqua calda, accompagnata da crostini.\n\nNon si conserva più di 1-2 giorni.\n\nLe barde di lardo sono sottili fette di lardo bianco, non aromatizzato, non molto stagionato, generalmente usate per proteggere alcune parti del cibo dal calore diretto e per 'nutrire' quello che contengono.","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"BB774236-DC62-436A-AC08-93498030186E","name":"Torta di Pollo","categories":["30 minuti"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"4 petti di pollo (circa 180g l'uno, senza pelle)"},{"type":"item","text":"1 noce burro"},{"type":"item","text":"1 mazzetto cipollotti"},{"type":"item","text":"150 g funghi champignon"},{"type":"item","text":"1 cucchiaio farina (più quella per spolverare)"},{"type":"item","text":"2 cucchiaini senape inglese"},{"type":"item","text":"1 cucchiaio crème fraîche (colmo)"},{"type":"item","text":"0,3 lt Brodo di pollo"},{"type":"item","text":"2 rametti timo (fresco)"},{"type":"item","text":"1/3 noce moscata (da grattugiare)"},{"type":"item","text":"1 rotolo pasta sfoglia (già stesa)"},{"type":"item","text":"1 uovo"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"2406B095-4B51-46BA-B4F5-CC4429D59F95","name":"Torta Salata Alla Scarola","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per la farcitura:"},{"type":"item","text":"1 cespo insalata scarola riccia (indivia)"},{"type":"item","text":"100 g pecorino pepato siciliano (grattugiato)"},{"type":"item","text":"1 cipolla (in alternativa anche il cipollotto od il porro)"},{"type":"item","text":"1 uovo"},{"type":"item","text":"2 cucchiai provola dolce (a dadini, va bene qualunque formaggio che fonde)"},{"type":"item","text":"olive taggiasche"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"},{"type":"item","text":"3 acciughe salate (facoltativo)"},{"type":"item","text":"capperi (facoltativo)"},{"type":"header","text":"per la base:"},{"type":"item","text":"2 dischi pasta sfoglia fresca rustica (anche surgelata oppure va bene la pasta brisé)"}],"directions":"Srotolate un disco di pasta e adagiarlo, sulla carta da forno, in uno stampo da crostata o da pizza (con un bordino di almeno 2 cm) di circa 30 cm di diametro. \n\nFare pochi forellini sul fondo con le punte di una forchetta: in questo modo il fondo non si solleverà facendo una bolla).\n\nSoffriggere la cipolla in poco olio ed aggiungere la scarola (precedentemente lavata, asciugata e tagliuzzata).\n\nFare appassire brevemente e togliere dal fuoco.\n\nAggiungere i capperi, le olive e le acciughe (se utilizzate). Incorporare anche il pecorino grattugiato.\n\nVersate il miscuglio sul fondo di pasta distribuendolo uniformemente.\n\nAggiungere la provola (o altro formaggio da fondere utilizzato) a pezzetti. Sbattere le uova con 1 cucchiaino di sale, un pochino di pepe e distribuirlo sopra alla farcitura.\n\n\nSrotolare l’altro disco di pasta e disporlo a copertura della torta. Premere bene sui bordi per sigillare i due strati di pasta sfoglia. Se si ritiene opportuno spennellare con del tuorlo d'uovo.\n\nTagliare l'eventuale pasta eccedente con un coltello e fare ancora qualche forellino sulla superficie della torta.\n\nCuocere nel forno già caldo a 180° per circa 25/30 minuti o finché la superficie sarà dorata. Servire la torta calda o a temperatura ambiente. \n\nSi può anche prepararla in anticipo e riscaldarla al momento di andare in tavola.","notes":"","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"CA3F5701-B232-420B-8913-3736A830C177","name":"Uova In Camicia","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"Dalla tradizione delle ricette povere e popolari, un modo semplice di cucinare le uova per un piatto unico serale.","ingredients":[{"type":"item","text":"8 uova"},{"type":"item","text":"2 lt acqua"},{"type":"item","text":"2 cucchiaini sale"},{"type":"item","text":"2 cucchiaini aceto bianco"}],"directions":"Prendete una casseruola, riempitela abbondantemente di acqua e fate bollire con sale e aceto. Prendete le uova, rompetele una per volta in un piattino e versate mano a mano nell'acqua. Fate bollire per 3 minuti finché l'albume si sarà rappreso e racchiuderà completamente il tuorlo. Sgocciolate le uova con un mestolo, adagiatele su un tovagliolo asciutto e servite.","notes":"Potete sbizzarrirvi nel condimento delle uova con del sale, del pepe nero oppure spolverizzare con del pecorino.","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"48C43C9B-2F7B-43D8-BB33-E7793F78D9A0","name":"Verdure Croccanti & Guacamole","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1/2 finocchio"},{"type":"item","text":"1 carota"},{"type":"item","text":"1/2 cetriolo"},{"type":"item","text":"60 g grissini"},{"type":"item","text":"1 Guacamole"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"8E3AB039-A177-499C-894A-F67728CC2C97","name":"Winter Crunch Salad with A Mind-blowing Sauce","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"This is a really interesting, delicious winter salad dish which is a great way of using up all the crunchy winter veg that’s available. It’s proper name is bagna cauda, which basically means ‘hot bath’ in Italian, and the idea is that you have a load of raw or just cooked pieces of vegetable which you dip into a delicious, warm sauce. You may like your sauce to be thick and oozy but I prefer mine to be quite thin and delicate, like the texture of thin custard, with a lovely sheen to it.\n\nYou can use any vegetables you want, and depending on the season you can do a lighter summer version or a more root-veg-based winter one. I actually prefer my veg to be raw, as I love the crunch you get from them, but if you want to boil them briefly until they’re al dente, feel free.","ingredients":[{"type":"header","text":"sauce"},{"type":"item","text":"6 cloves of garlic (peeled)"},{"type":"item","text":"300 ml milk"},{"type":"item","text":"10 anchovy fillets in oil"},{"type":"item","text":"180 ml good extra virgin olive oil (plus extra for drizzling)"},{"type":"item","text":"2 tablespoons good white wine vinegar"},{"type":"header","text":"vegetables"},{"type":"item","text":"young carrots (peeled and finely sliced)"},{"type":"item","text":"small raw beetroots (peeled and finely sliced)"},{"type":"item","text":"sticks sticks of celery (trimmed and thinly sliced, yellow leaves reserved)"},{"type":"item","text":"1/2 Romanesco or white cauliflower (broken into florets)"},{"type":"item","text":"1 bulb of fennel (trimmed and finely sliced, herby tops reserved)"},{"type":"item","text":"1 handful small beetroot leaves (if available, washed)"},{"type":"item","text":"1 bunch radishes (trimmed and washed)"},{"type":"item","text":"1/2 celeriac (peeled and finely sliced)"}],"directions":"Firstly, prepare all your veg, because once the sauce is done you’ll be ready to serve! To make your sauce, put the garlic cloves, milk and anchovies into a saucepan and bring to the boil. Simmer slowly for 10 minutes, or until the garlic is soft and tender, keeping a close eye on the pan to make sure the milk doesn’t boil over. Don’t worry if it spits and looks a little lumpy – simply remove from the heat and whiz the sauce up with a hand blender. Gently blend in the extra virgin olive oil and the vinegar a little at a time – you’re in control of the consistency at this point. If you like it thick, like mayonnaise, keep blending. Now taste it and adjust the seasoning. Make sure there’s enough acidity from the vinegar to act like a dressing. It should be an incredible, pungent warm sauce.\n\nThere are two ways you can serve this – with both you need the sauce to be warm. Either pour the sauce into a bowl and place this on a plate, with the veg arranged around the bowl, or serve the veg in a big bowl and drizzle the sauce over the top. Sprinkle over the reserved herby fennel tops and celery leaves and finish with a drizzle of extra virgin olive oil.","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"51F460BB-35EC-4F01-8405-31EC6CE3DB74","name":"Yorkshire Pudding","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 tazza farina (scarsa)"},{"type":"item","text":"1 tazza latte"},{"type":"item","text":"1 uovo"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"60B59EB2-DE92-48D0-BBB2-07284B21FCAC","name":"Zucchina Lunga Al Sapore Di Sicilia","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 zucchina lunga siciliana"},{"type":"item","text":"1 cipolla (anche meglio i cipollotti)"},{"type":"item","text":"10 pomodorini pachino"},{"type":"item","text":"2 patate"},{"type":"item","text":"80 g parmigiano (grattugiato, anche pecorino)"},{"type":"item","text":"foglie basilico"},{"type":"item","text":"sale"},{"type":"item","text":"2 bicchieri Brodo vegetale (facoltativo)"},{"type":"item","text":"peperoncino (facoltativo)"}],"directions":"Tagliare le estremità della zucchina lunga e pelarla. La nonna Concetta la grattava semplicemente con il coltello.\n\nSciacquarla e tagliarla in pezzi lunghi circa 3-4 cm.\n\nDividere ogni pezzo a metà. Se ci sono semi troppo grandi rimuoverli. Suddividere, poi, ogni metà nel il senso della lunghezza in 3-4 fiammiferi (a seconda della grossezza della zucchina). Ad operazione ultimata, sciacquare la zucchina e metterla a sgocciolare.\n\nNel frattempo, lavare i pomodorini e tagliarli a spicchi.\n\nPelare le patate e tagliarle in pezzi non troppo piccoli nel senso della lunghezza.\n\n\nVersare 3 cucchiai di olio in un tegame capiente.\n\nFarvi rosolare la cipolla, tagliata finemente, un pezzetto di peperoncino ed i pomodorini.\n\nAppena questi ultimi si ammorbidiscono, schiacciarli leggermente con il cucchiaio di legno ed aggiungere la zucchina lunga.\n\nFarla insaporire per qualche minuto, a fuoco vivace. Eventualmente togliere il peperoncino.\n\nSuccessivamente abbassare la fiamma, aggiungere 1 o 2  bicchieri di brodo vegetale.\n\nDurante la cottura la zucchina manderà abbondante acqua di vegetazione.\n\nFare cuocere a fuoco moderato, fino a quando il brodo si sarà leggermente ristretto e la zucchina sarà diventata tenera e morbida.\n\nAppena prima di spegnere, aggiustare di sale e di pepe ed unire qualche foglia di basilico, sminuzzata a mano.\n\nPrima di portare in tavola, insaporire la minestra con il parmigiano (o il pecorino); oppure servire il formaggio a parte, in modo che ciascuno si possa servire a proprio gusto.\n\nDecorare la minestra con foglie di basilico e servire (anche fredda in estate).","notes":"La zucchina lunga viene chiamata in Sicilia “Cucuzza longa”.\nÈ, infatti, lunga anche un metro ed è di colore verde chiaro.\nÈ un ortaggio molto utilizzato in tutta l’isola, particolarmente durante la stagione estiva.\nSi presta, infatti, a varie preparazione ed è leggermente dissetante e rinfrescante.\nLa minestra suggerita può essere portata in tavola calda, tiepida o, addirittura, fredda.\nA seconda dei gusti personali, il brodo di cottura può essere più o meno ristretto.\nAlcuni preparano la minestra e, poi, vi cuociono la pasta di piccolo formato.\nÈ importante la presenza del basilico, che insaporisce e decora.","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"B9674339-F27C-4B4A-B4C2-DEEBD149852D","name":"Zucchine Ripiene","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 kg zucchine"},{"type":"item","text":"300 g carne tritata"},{"type":"item","text":"1 cipolla"},{"type":"item","text":"30 g capperi"},{"type":"item","text":"50 g olive verdi"},{"type":"item","text":"salsa di pomodoro"},{"type":"item","text":"basilico"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"}],"directions":"Bollite le zucchine per ammorbidirle (dovrebbero bastare circa 5 minuti). \n\nScolarle, farle raffreddare e tagliarle in due nel senso della lunghezza. \n\nCon un cucchiaino, togliere la polpa (che verrà messa da parte in una ciotola) fino ad ottenere delle barchette da sistemare in una teglia unta d’olio. \n\nIn una padella rosolare prima la cipolla e poi la carne. Spegnere il fuoco. \n\nAggiungere la polpa delle zucchine, i capperi, le olive, il basilico tritati e qualche cucchiaio di salsa di pomodoro per legare meglio il composto. \n\nImpastare bene, distribuire l’impasto nelle barchette, versare un filo d’olio e mettere in forno caldo a 180° per 30 minuti circa.","notes":"Nel ripieno possono essere aggiunti, come varianti, pane grattugiato condito oppure un'uovo sbattuto.\n\nUn'altra variante molto semplice prevede, come ripieno, l'uso del solo pangrattato condito con l'aggiunta di capperi e olive oltre alla polpa della zucchina.","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"578BA45E-E8DF-4E1B-8EDD-A092E98BC1F3","name":"Zuppa di Lenticchie","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"Lentils are an ancient crop, nutritious and full of fiber. Lentil soup is an easy dish to throw together, and is hearty enough to make a full meal. Perfect for vegetarians, zuppa di lenticchie is the Italian version. Germans make Linsensuppe, the French soupe aux lentilles. The Greeks have fakis, and the Turks enjoy mercimek çorbasi.","ingredients":[{"type":"item","text":"Olive oil (3 tablespoons)"},{"type":"item","text":"Onion, chopped (1)"},{"type":"item","text":"Carrot, peeled and chopped (1)"},{"type":"item","text":"Celery, chopped (2 stalks)"},{"type":"item","text":"Garlic, minced (2 to 3 cloves)"},{"type":"item","text":"Tomatoes. chopped (2 cups)"},{"type":"item","text":"Stock or water (8 cups)"},{"type":"item","text":"Lentils (2 cups)"},{"type":"item","text":"Parsley, chopped (1/4 cup)"},{"type":"item","text":"Rosemary (1 sprig)"},{"type":"item","text":"Bay leaf (1)"},{"type":"item","text":"Salt and pepper (to taste)"}],"directions":"Heat the olive oil in a large, heavy-bottomed pot over medium-high flame. Add the onion, carrot, celery and garlic and saute until the onion is transculent, 5 to 6 minutes.\n\nAdd the tomatoes and cook, stirring occasionally, for another 3 to 4 minutes. Then add the remaining ingredients and bring to a boil. Reduce flame to medium-low and simmer for 25 to 30 minutes, or until the lentils are cooked through but not falling apart.\n\nAdjust seasoning and serve with crusty bread.","notes":"Add pasta, pearled barley or rice when you add the lentils. This makes a thicker soup, and you make have to add more liquid..\nFor a meaty meal, add chunks of chicken, pork, or sausages to your simmering soup.\nGerman Linsensuppe: Saute some chopped bacon and use the bacon fat instead of olive oil. Eliminate the garlic and tomatoes. Add sliced frankfurters and chunks of potato.\nGreek Fakes: Add some oregano. When you serve the soup, drizzle it with some olive oil and red wine vinegar.\nSpanish Sopa de Lentejas: Use red lentils and add a tablespoon of good paprika to the onions, carrots and celery as you saute them. Brown some Spanish chorizo and add it to the soup.\nTurkish Mercimek Çorbasi: Use 1 1/2 cups of red lentils and 1/2 cup of bulgur wheat. Eliminate the rosemary, and add a tablespoon of paprika and 2 teaspoons of cumin to the onions, carrots and celery as you saute them. Garnish with mint and drizzle with olive oil and lemon juice.","rating":0,"source":"Whats4Eats.com","source_url":"","has_photo":true,"favorites":false},{"uid":"9166A78D-3AD5-43CB-8692-5D6FB1FAB7BD","name":"Zuppa di Pomodoro e Crostini Rustici","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 kg pomodorini ciliegini"},{"type":"item","text":"4 pomodori (grossi)"},{"type":"item","text":"1 peperoncino (rosso, fresco)"},{"type":"item","text":"4 spicchi aglio"},{"type":"item","text":"1 pane ciabatta"},{"type":"item","text":"2 cipolle rosse (piccole)"},{"type":"item","text":"4 cucchiai aceto balsamico"},{"type":"item","text":"1 mazzetto basilico"},{"type":"item","text":"4 cucchiai crème fraîche"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false}];
const CATS=["30 minuti","Aiutacuochi","Desserts","Maiale","Manzo","Messinese","Pasqua","Pollo","Ricette base"];
const UPDATED="01/05/2026 10:22";

let filterCat='', filterText='', filterFavs=false;

const catsBar=document.getElementById('cats-bar');
CATS.forEach(cat=>{
  const btn=document.createElement('button');
  btn.className='cat-chip'; btn.dataset.cat=cat; btn.textContent=cat;
  btn.onclick=()=>setCat(cat);
  catsBar.appendChild(btn);
});

function setCat(cat){
  filterCat=cat;
  document.querySelectorAll('.cat-chip').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  render();
}

document.getElementById('search').addEventListener('input',e=>{
  filterText=e.target.value.toLowerCase().trim(); render();
});

document.getElementById('btn-favs').addEventListener('click',()=>{
  filterFavs=!filterFavs;
  document.getElementById('btn-favs').classList.toggle('active',filterFavs);
  render();
});

function stars(n){
  if(!n) return '';
  const s=Math.min(5,Math.max(0,Math.round(n)));
  return '★'.repeat(s)+'☆'.repeat(5-s);
}

function filtered(){
  return RECIPES.filter(r=>{
    if(filterFavs && !r.favorites) return false;
    if(filterCat && !r.categories.includes(filterCat)) return false;
    if(filterText){
      const hay=(r.name+' '+r.categories.join(' ')+' '+r.description).toLowerCase();
      if(!hay.includes(filterText)) return false;
    }
    return true;
  });
}

function render(){
  const list=filtered();
  const grid=document.getElementById('grid');
  const empty=document.getElementById('empty');
  const counter=document.getElementById('counter');
  const stats=document.getElementById('stats-bar');

  counter.textContent='('+(list.length===154?154:list.length+' / '+154)+' ricette)';
  stats.textContent=list.length===154
    ? `Tutte le ${list.length} ricette · aggiornato ${UPDATED}`
    : `${list.length} di 154 ricette`;

  if(!list.length){ grid.innerHTML=''; empty.style.display=''; return; }
  empty.style.display='none';

  grid.innerHTML=list.map(r=>{
    const photo=r.has_photo
      ? `<img class="card-photo" src="photos/${r.uid}.jpg" alt="${esc(r.name)}" loading="lazy">`
      : `<div class="card-nophoto">🍽️</div>`;
    const tags=r.categories.slice(0,2).map(c=>`<span class="tag">${esc(c)}</span>`).join('');
    const fav=r.favorites?'<span class="fav-badge">⭐</span>':'';
    const strs=r.rating?`<div class="card-stars">${stars(r.rating)}</div>`:'';
    return `<div class="card" data-uid="${r.uid}" onclick="openModal('${r.uid}')" tabindex="0" role="button">
      ${photo}
      <div class="card-body">
        ${strs}<div class="card-name">${fav}${esc(r.name)}</div>
        <div class="card-tags">${tags}</div>
      </div>
    </div>`;
  }).join('');
}

const overlay=document.getElementById('overlay');
const modal=document.getElementById('modal');

function openModal(uid){
  const r=RECIPES.find(x=>x.uid===uid);
  if(!r) return;

  const photo=r.has_photo
    ? `<img class="modal-photo" src="photos/${r.uid}.jpg" alt="${esc(r.name)}">`
    : `<div class="modal-nophoto">🍽️</div>`;

  const meta=[];
  if(r.servings) meta.push(`<span>👥 ${esc(r.servings)}</span>`);
  if(r.prep_time) meta.push(`<span>⏱ Prep: ${esc(r.prep_time)}</span>`);
  if(r.cook_time) meta.push(`<span>🔥 Cottura: ${esc(r.cook_time)}</span>`);
  if(r.total_time) meta.push(`<span>⏰ Totale: ${esc(r.total_time)}</span>`);
  if(r.rating) meta.push(`<span style="color:#d4a017">${stars(r.rating)}</span>`);

  const tags=r.categories.map(c=>`<span class="tag">${esc(c)}</span>`).join('');
  const fav=r.favorites?' ⭐':'';

  let ingHtml='';
  if(r.ingredients && r.ingredients.length){
    ingHtml='<div class="modal-section"><h3>Ingredienti</h3><ul class="ing-list">';
    r.ingredients.forEach(item=>{
      if(item.type==='header') ingHtml+=`</ul><div class="ing-header">${esc(item.text)}</div><ul class="ing-list">`;
      else ingHtml+=`<li>${esc(item.text)}</li>`;
    });
    ingHtml+='</ul></div>';
  }

  let dirHtml='';
  if(r.directions){
    dirHtml=`<div class="modal-section"><h3>Procedimento</h3>
      <div class="directions-text">${esc(r.directions)}</div></div>`;
  }

  let notesHtml='';
  if(r.notes){
    notesHtml=`<div class="modal-section"><h3>Note</h3>
      <div class="notes-text">${esc(r.notes)}</div></div>`;
  }

  let srcHtml='';
  if(r.source_url){
    srcHtml=`<a class="source-link" href="${r.source_url}" target="_blank" rel="noopener">
      🔗 ${esc(r.source||r.source_url)}</a>`;
  } else if(r.source){
    srcHtml=`<span class="source-link">📖 ${esc(r.source)}</span>`;
  }

  document.getElementById('modal-inner').innerHTML=`
    ${photo}
    <div class="modal-content">
      <div class="modal-name">${esc(r.name)}${fav}</div>
      <div class="modal-meta">${meta.join('')}</div>
      <div class="modal-tags">${tags}</div>
      ${r.description?`<div class="modal-desc">${esc(r.description)}</div>`:''}
      ${dirHtml}${ingHtml}${notesHtml}${srcHtml}
    </div>`;

  overlay.classList.add('open');
  modal.scrollTop=0;
  document.body.style.overflow='hidden';
}

function closeModal(){
  overlay.classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('btn-close').onclick=closeModal;
overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
</body>
</html>
