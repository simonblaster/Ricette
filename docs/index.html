gredients":[{"type":"item","text":"800 g filetto di manzo (4 fette)"},{"type":"item","text":"200 g carciofi"},{"type":"item","text":"1 cipollotto fresco"},{"type":"item","text":"4 cucchiai olio evo"},{"type":"item","text":"30 g burro"},{"type":"item","text":"q.b. sale e pepe"},{"type":"item","text":"400 g pasta sfoglia"},{"type":"item","text":"320 g pancetta affumicata"},{"type":"item","text":"4 cucchiai panna fresca liquida"},{"type":"item","text":"1 foglia salvia"},{"type":"item","text":"1 uovo"},{"type":"item","text":"1 rametto rosmarino"},{"type":"item","text":"200 ml birra"}],"directions":"Per preparare il filetto di manzo in crosta alla birra per prima cosa dedicatevi a preparare la crema di carciofi che ricoprirà il filetto. Tagliate i cuori di carciofo a pezzetti (1) e mondate e triate il cipollotto. In una padella fate appassire con l’olio il cipollotto quindi aggiungete i carciofi e lasciateli cuocere (2) per 10 minuti quando diverranno teneri e asciutti, quindi aggiustate di sale e pepe. Con un frullatore ad immersione riducete i carciofi a pezzi più piccoli (3) per ottenere una crema asciutta ma non troppo fine, quindi lasciate raffreddare.\n\nLegate i 4 filetti di manzo con dello spago da cucina in modo da conferirgli una forma tonda (4), poi rosolateli in padella su entrambi i lati con 2 cucchiai di olio e il burro (5) 2 minuti per ogni lato, quindi salate ricordandovi di lasciarli piuttosto al sangue o comunque rosati all’interno. In questa fase il filetto deve raggiungere la cottura finale desiderata: ricordatevi di non cuocere il filetto più di una volta su ogni lato. Tenete da parte il fondo di cottura dei filetti e poneteli su di una gratella in un posto fresco a scolare del liquido in eccesso (6).\n\nQuando i filetti saranno freddi, spalmateli completamente con la crema di carciofi (7) e posizionate su di un foglio di carta forno alcune fette di pancetta poste a croce (8). Adagiate il filetto al centro e poi richiudete la pancetta in modo da avvolgerlo completamente (9).\n\nMettete il filetto al centro di un disco di pasta sfoglia (10) che richiuderete formando delle piccole pences tutto intorno ad esso (11) che appiattirete premendole verso la carne e sigillando la sommità. Se dovesse avanzarvi della pasta sfoglia in eccesso tagliatela via con un coltellino (12).\n\nPonete i filetti, con la parte della chiusura rivolta verso il basso, su di una leccarda foderata con carta forno (13). Potete utilizzare i ritagli di pasta sfoglia per tagliare delle striscioline (14) e realizzare qualche decoro sulla superficie della crosta del filetto. Sbattete il tuorlo dell’uovo con la panna e spennellate interamente la superficie e i lati dei filetti (15).\n\nInfornate i filetti in crosta (16) in forno già caldo a 180° per 20 minuti fino a che la pasta sfoglia diverrà di un bel colore dorato. Nel frattempo, preparate la salsa di accompagnamento alla birra: versate nella padella dove avrete raccolto il  fondo di cottura le erbe aromatiche tritate (17) e la birra (18). Salate e lasciate ridurre; se volete rendere la salsa ancora più densa aggiungete un cucchiaino di farina disciolta in poco brodo di carne. Trascorso il tempo necessario, estraete i filetti in crosta dal forno e serviteli immediatamente con la riduzione alla birra.","notes":"Fuori stagione potrete usare anche i cuori di carciofi congelati. Chiedete al vostro macellaio di fiducia di preparavi 4 tagli di filetto di manzo alti circa 4 cm e del peso di 200 gr l'uno. Se volete un'alternativa più economica chiedete invece 4 tagli di filetto di maiale.","rating":0,"source":"Giallo Zafferano","source_url":"","has_photo":true,"favorites":false},{"uid":"E4C2800D-FAB7-4937-95FF-2667DBD43354","name":"FIletto di Tonno in padella","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"4 fIletti di tonno (alti 4 cm)"},{"type":"item","text":"1 bicchiere brandy"},{"type":"item","text":"1 dl Fondo di pesce"},{"type":"item","text":"40 g Roux"}],"directions":"Tirate fuori dal frigo i filetti di tonno almeno 3 ore prima di cucinarli\n\nLegateli con filo da cucina perché non perdano la forma\n\n\nFateli rosolare in padella con poco burro per il tempo che più vi aggrada, come si fa per i filetti di carne, da 2' a 5' per lato\n\nToglieteli e passateli in forno a 90°\n\n\nDeglassate il fondo della padella unendo il brandi e fiammeggiate\n\nFate ridurre, grattando il fondo con un cucchiaio di legno\n\n\nVersate il fondo di pesce ed il roux e cuocete per 6'\n\nRegolate di pepe e sale\n\nEmulsionate con una noce di burro e rimettete per 1' i filetti in padella","notes":"Varianti: si può usare al posto del fondo di pesce la salsa di pomodoro, alla senape, al curry o una salsa frullata di asparagi, carciofi, fave e altre verdure","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"ACFFE3E7-0574-4DC7-80C7-1A13AE6ABFD4","name":"Flan al cioccolato","categories":["Desserts"],"servings":"8 persone","prep_time":"","cook_time":"","total_time":"","description":"\"Cioccolatissimo\"","ingredients":[{"type":"item","text":"250 g cioccolato fondente"},{"type":"item","text":"110 g zucchero"},{"type":"item","text":"80 g farina"},{"type":"item","text":"8 uova (intere)"},{"type":"item","text":"200 g burro"}],"directions":"Sciogliere a bagno maria il cioccolato con il burro.\n\nNel frattempo montare i rossi d'uovo con metà zucchero.\n\nQuando il cioccolato è totalmente sciolto, unire i rossi d'uovo ed aggiungere anche la farina.\n\nMontare i bianchi d'uovo con lo zucchero restante e unirli al composto precedente.\n\nImburrare ed infarinare gli stampini.\n\nVersare il composto fino a riempire i 3/4 dello stampino.\n\nMettere gli stampini nel forno preriscaldato a 180° e cuocere per 8 minuti (non un minuto di più, meglio uno in meno).","notes":"","rating":4,"source":"Fabrizio Candela","source_url":"","has_photo":true,"favorites":false},{"uid":"338D3E68-11D0-4D5C-BC91-A7D4087F5C87","name":"Focaccia Messinese","categories":["Messinese"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"Tipico piatto rustico Messinese.... gustato in ogni occasione... il sabato con una buona birra, per compleanni e festività varie o semplice fast food nelle pause pranzo....","ingredients":[{"type":"header","text":"per la pasta per pane:"},{"type":"item","text":"300 g farina di semola"},{"type":"item","text":"200 g farina tipo 0"},{"type":"item","text":"320 g acqua (tiepida)"},{"type":"item","text":"30 ml di vino"},{"type":"item","text":"40 g olio"},{"type":"item","text":"70 g di lievito madre rinfrescato, oppure 5 grammi di lievito di birra fresco o 2 grammi si lievito secco"},{"type":"item","text":"12 g di sale"},{"type":"item","text":"10 g di zucchero semolato"},{"type":"header","text":"per il condimento:"},{"type":"item","text":"pomodorini freschi"},{"type":"item","text":"un cespo di lattuga scarola riccia (indivia)"},{"type":"item","text":"600 g tuma, provola o primosale"},{"type":"item","text":"pepe nero"},{"type":"item","text":"sale"},{"type":"item","text":"olio evo"},{"type":"item","text":"5 alici (sott'olio, facoltativo)"}],"directions":"Sciogliere il lievito nell acqua tiepida con l' aiuto delle mani aggiungere lo zucchero per accellerare la lievitazione, formare una fontana di farina sulla spianatoia aggiungere il sale e lo strutto e piano piano il liquido fino a formare una palla liscia ed omogenea, molto lavorata.\n\nLasciare lievitare in un posto caldo e lontano da correnti d' aria per 2h circa, se occorre coprire con un panno pulito e una calda coperta di lana.\n\nIl condimento:\n\nLavare accuratamente la lattuga, asciugatela in un canovaccio o con la centrifuga, tagliatela a piccoli pezzi e salate accuratamente.\n\nScolate, dalla loro acqua di vegetazione, i pomodori in un setaccio a maglia stretta, ottenendo una polpa densa, versateli in un recipiente e condite con sale e un filo d olio.\n\nStendete la pasta lievitata su di una teglia da forno 'nera' aiutandovi con il mattarello e successivamente con le mani, formate un bordino e controllate che lo spessore sia uniforme per tutta la teglia (non deve essere troppo sottile, altrimenti in cottura si brucierà). \n\nDisporre sulla base la lattuga riccia successivamente la salsa di pomodoro e schiacciatela con un cucchiaio o con le mani cosi da distribuirla bene sull'insalata, distribuire le alici a pezzetti. \n\nLasciare riposare ancora qualche minuto.\n\nInfornare a 220°C per circa 25 min, quando la pasta sarà cotta e dorata distribuire il formaggio tritato, infornare nuovamente per altri 5 min. Spolverare con il pepe nero macinato e tagliare a pezzi, servire calda.","notes":"","rating":1,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"A4E457E6-17F2-43D0-B13F-EED6298AD76D","name":"Fondo di pesce","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 lt Brodo di pesce"},{"type":"item","text":"100 g funghi champignon (gambi)"},{"type":"item","text":"2 porri"},{"type":"item","text":"1 bicchierino vino dolce"},{"type":"item","text":"20 g burro"}],"directions":"Tritate porri e funghi e fateli rosolare in una noce di burro per 20', a fuoco dolcissimo\n\n\nVersate il brodo e il vino e fate cuocere a fuoco dolcissimo fino a quando non zarà ridotto a 1 quinto. Alla fine filtrate","notes":"","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"FDDFE7E6-7C9A-4392-B9C7-60858206C67E","name":"Fonduta alla piemontese","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"400 g fontina"},{"type":"item","text":"4 tuorli d'uovo"},{"type":"item","text":"30 g burro"},{"type":"item","text":"250 g latte intero"},{"type":"item","text":"q.b. tartufo bianco"},{"type":"item","text":"q.b. pane a cassetta"},{"type":"item","text":"sale"}],"directions":"Tagliate la fontina a dadini, raccoglietela in una ciotola e copritela con il latte. Lasciate ammorbidire per almeno due ore.\n\nIn una casseruola fate sciogliere a bagno maria il burro. Versatevi la fontina con il latte, amalgamatevi i tuorli e continuate a mescolare fino a quando il formaggio è del tutto fuso.\n\nRegolate il sale con moderazione. Cuocete ancora per cinque minuti senza che il composto raggiunga il bollore. \n\nVersate in fondine, cospargete di fettine di tartufo bianco e accompagnate con triangolini di pancarré leggermente tostato.","notes":"","rating":0,"source":"Cucchiaio d'argento","source_url":"","has_photo":true,"favorites":false},{"uid":"3EEDA904-6230-4784-BA32-98ACA95F7F6D","name":"Guacamole","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 manciata pomodorini ciliegini (se possibile di vari colori)"},{"type":"item","text":"2 peperoncini (rossi, freschi)"},{"type":"item","text":"1 manciata prezzemolo (fresco, anche coriandolo)"},{"type":"item","text":"2 avocado (maturi)"},{"type":"item","text":"2 lime"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"1BCB1F8B-CC24-4D6F-8A0E-4DC16E27CCF2","name":"Hash di Manzo Ultrarapido","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g carne di manzo macinata"},{"type":"item","text":"2 rametti timo (fresco)"},{"type":"item","text":"1 cipolla rossa"},{"type":"item","text":"2 carote"},{"type":"item","text":"3 gambi sedano"},{"type":"item","text":"2 rametti rosmarino (fresco)"},{"type":"item","text":"4 spicchi aglio"},{"type":"item","text":"6 cucchiai salsa worcester"},{"type":"item","text":"1 mazzetto prezzemolo"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"DD1CE5E6-1647-4157-AD32-8F6284844BC0","name":"Hummus","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"L'hummus di ceci è una deliziosa crema \ntipica del Medio Oriente; viene servita come \"meze\", ovvero piccolo antipasto da gustare prima delle altre pietanze. \nL'hummus viene preparato con ceci e tahina, una particolare pasta di sesamo, detta anche burro di sesamo, molto diffusa in Turchia e nel Vicino Oriente.\nLa particolarità dell'hummus di ceci è il suo sapore: delicato, per la presenza dei ceci  e della tahina, ma anche un po' asprigno, poiché alla preparazione viene aggiunto del succo di limone che conferisce il giusto equilibrio di sapori a questa ricetta.\nAnnunci Google","ingredients":[{"type":"item","text":"300 g ceci secchi"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"sale (q.b.)"},{"type":"item","text":"olio evo"},{"type":"item","text":"2 limoni"},{"type":"item","text":"sesamo (q.b.)"},{"type":"item","text":"2 cucchiai tahina"},{"type":"item","text":"2 cucchiai cumino"},{"type":"item","text":"acqua oligominerale naturale (q.b.)"},{"type":"header","text":"Per guarnire"},{"type":"item","text":"Peperoncino (in polvere o fresco)"},{"type":"item","text":"Prezzemolo (tritato)"}],"directions":"Per preparare l’hummus mettete in ammollo i ceci per 24 ore, utilizzando un recipiente che possa contenere il doppio del loro volume di acqua. Trascorso questo tempo, scolate i ceci e sciacquateli molto bene. Metteteli ora a cuocere in una pentola a pressione con abbondante acqua per circa 20 minuti (oppure in pentola normale, sempre coperti con dell'acqua, per circa due ore) (1), o fino a che non diventeranno teneri, quindi scolateli e teneteli da parte (2). \n\n\nIn una padella antiaderente ponete tre cucchiai di olio extravergine di oliva, due spicchi d’aglio e le spezie in polvere, quindi fate tostare il tutto per un paio di minuti a fuoco medio (3).\n\n\nAggiungete i ceci scolati e lasciate insaporire per altri 2-3 minuti (4); nel frattempo spremete i limoni e mettete il loro succo da parte (5). Trasferite i ceci (con aglio e spezie) all’interno di un mixer (6),\n\n\n\naggiungete la tahina (7) e il succo di limone (8), poi frullate il tutto fino ad ottenere una crema omogenea e liscia. Aggiungete a filo dell'olio extravergine di oliva o dell'acqua calda (preferibilmente un po' dell''acqua di cottura dei ceci) ed amalgamate il tutto aiutandovi con un cucchiaio: ciò servirà a rendere l'hummus ancora più cremoso. A questo punto l’hummus è pronto: servitelo all’interno di una ciotolina, dopo averne cosparso la superficie con del prezzemolo tritato o del peperoncino (9). L’hummus è ideale accompagnato da pane azzimo o da pane arabo leggermente tostato.","notes":"","rating":0,"source":"Giallo Zafferano","source_url":"","has_photo":true,"favorites":false},{"uid":"9217406E-AB1E-4E7A-A019-77B5256B32F9","name":"Insalata Di Polpo","categories":["Messinese"],"servings":"","prep_time":"","cook_time":"","total_time":"25 min","description":"","ingredients":[{"type":"item","text":"600 g polpo"},{"type":"item","text":"300 g patate"},{"type":"item","text":"prezzemolo"},{"type":"item","text":"olio evo"},{"type":"item","text":"limone"},{"type":"item","text":"1 spicchio aglio"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"},{"type":"item","text":"peperoncino"},{"type":"item","text":"pomodorini ciliegini (facoltativo)"},{"type":"item","text":"olive nere (facoltativo)"}],"directions":"Sciacquare sotto l’acqua corrente il  polpo e mettere a bollire l'acqua in una pentola.\n\n\nQuando l'acqua bolle, aggiungere il sale ed immergere il polpo tenendolo per un tentacolo. Tirarlo fuori immediatamente e immergerlo in acqua fredda.\n\nRipetere l'operazione per cinque volte di seguito, dopodiché lasciare il polpo immerso per la cottura.\n\n\nQuando sarà cotto (basta infilzare con i denti di una forchetta per capirlo) spegnere il fuoco e lasciare che si raffreddi pian piano nella propria acqua di cottura.\n\nScolarlo, lasciarlo intiepidire e tagliarlo a pezzetti. \n\nNel frattempo, lessare le patate in acqua salata. Una volta cotte privarle della buccia e tagliarle a pezzi. \n\nSe utilizzati, lessare i fagiolini in acqua salata, una volta cotti scolarli ben bene e tagliarli.\n\nLavare e tagliare il pomodoro a spicchi. \n\nSgocciolare le olive e privarle del nocciolo.\n\nUnire tutti gli ingredienti in una insalatiera, condire con olio extra vergine d’oliva, limone, sale, pepe, peperoncino, prezzemolo tritato fresco (meglio emulsionare a parte prima di unire all'insalata).","notes":"La Zia consiglia di aggiungere all'emulsione della senape e del tabasco.\n\nAl posto delle patate e dei fagiolini (o in aggiunta) si possono usare anche sedano e insalata belga.","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"D8254EF8-EFF7-4662-94BD-D627FC591509","name":"Iris Fritte","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"Piatto tipico della rinomata rosticceria siciliana, l’iris fritta, si dice sia nata dietro le grate di un convento. L’antica ricetta utilizzava le rosette, raschiate della parte scura, e riempite di ricotta.","ingredients":[{"type":"item","text":"500 g farina (possibilmente la Manitoba)"},{"type":"item","text":"50 g margarina"},{"type":"item","text":"30 g lievito di birra"},{"type":"item","text":"1 pizzico sale"},{"type":"item","text":"3 uova"},{"type":"item","text":"400 g ricotta di pecora"},{"type":"item","text":"2,5 dl latte"},{"type":"item","text":"100 g cioccolato fondente (a gocce)"},{"type":"item","text":"100 g zuccata (zucca candita, quella che si usa per cannoli e cassata tagliata a piccoli dadini)"},{"type":"item","text":"400 g zucchero"},{"type":"item","text":"pangrattato"},{"type":"item","text":"olio per friggere"}],"directions":"Lasciate la margarina fuori dal frigo in modo che si ammorbidisca. \n\nLavorate con le fruste la ricotta con 250 gr di zucchero in una terrina capiente, e quando è fluida lasciatela riposare per mezz’ora. \n\nDopo, aggiungete le gocce di cioccolato, la zuccata tagliata e mettetela da parte. \n\nSetacciate la farina ed unite la margarina, mescolando energicamente. \n\nAggiungete il lievito sbriciolato, lo zucchero rimasto, il latte tiepido, a poco a poco, lavorandolo continuamente e un pizzico di sale. \n\nAggiungete un uovo battuto e continuare a lavorare l’impasto, aggiungendo eventualmente un po’ d’acqua. \n\nLasciate la pasta coperta a lievitare per due ore. \n\nStendetela con il mattarello, e formate dei dischi di circa 7 cm di lunghezza e di un cm di spessore. \n\nNella metà dei dischi posizionate il ripieno e coprite con l’altra metà, formando della palle, che dovrete far riposare ancora un’ora.\n\nSbattete le restanti due uova in un piatto e mettete il pangrattato con un po’ di sale in un altro. \n\nPassate gli Iris prima nelle uova, poi nel pangrattato ed infine in un pentolino con l’olio bollente, fino a doratura. Scolatele sulla carta assorbente e servitele tiepide.","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"49FE27DF-91D7-4639-8358-A411489BCC92","name":"Jacket Potatoes","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"4 patate (grosse, da forno)"},{"type":"item","text":"2 rametti rosmarino"},{"type":"item","text":"4 cucchiaini crème fraîche"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"A1F5C4CF-881E-426B-9AEC-A6E3D5F2F49C","name":"Jamie's Christmas Turkey","categories":[],"servings":"8 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"5 kg tacchino"},{"type":"item","text":"olio evo"},{"type":"item","text":"1 mandarino (tagliato a metà)"},{"type":"item","text":"sale"},{"type":"item","text":"pepe nero macinato"},{"type":"item","text":"1 mazzetto rosmarino"},{"type":"item","text":"2 cipolle (sbucciate e tritate grossolanamente)"},{"type":"item","text":"2 costole sedano (tritate grossolanamente)"},{"type":"item","text":"2 carote (tritate grossolanamente)"},{"type":"header","text":"Per il ripieno"},{"type":"item","text":"olio evo"},{"type":"item","text":"2 cipolle (sbucciate e tritate finemente)"},{"type":"item","text":"sale"},{"type":"item","text":"pepe nero macinato"},{"type":"item","text":"1/2 noce moscata (macinata)"},{"type":"item","text":"3 ciuffi salvia (tritata grossolanamente)"},{"type":"item","text":"300 g carne di maiale macinata"},{"type":"item","text":"1 manciata mollica di pane (grande)"}],"directions":"Take your turkey out of the fridge about an hour before you're ready to cook it so it comes up to room temperature before roasting. Give it a good rinse then pat it dry with some kitchen paper, making sure you soak up any water in the cavity. Drizzle the meat with a good lug of olive oil, add a few good sprinkles of salt and pepper and then rub this seasoning all over the bird, making sure you get in to all the nooks and crannies.\n\nPreheat your oven to full whack then get started on your stuffing. Pour a lug or two of olive oil into a large pan on a medium heat and fry off your chopped onion for about 10 minutes or until softened. Stir in a good pinch of salt and pepper, the ground nutmeg and your chopped sage leaves, then continue to fry and stir for another minute or two.\n\nSpoon the onion mixture into a large bowl and let it cool completely. Once cooled, add your pork mince and breadcrumbs and use your hands to really scrunch everything together. Once it's mixed really well, bring the stuffing together into a ball, then cover and chill until you're ready to stuff your turkey.\n\nPull the skin at the neck-end back so you can see a cavity and push about half of your stuffing inside your turkey. Not too much: you don't want to pack it so tightly it slows down the cooking. Once done, pull and fold the skin over the opening and tuck it under the bird so it looks nice.\n\nTurn the turkey around and drop a few small pieces of stuffing into the larger cavity along with your clementine halves and a few sprigs of rosemary. Place your roughly chopped veg in the bottom of a roasting pan and lay your turkey on top. Cover the turkey with tin foil then put it in the hot oven and immediately turn the temperature down to 180°C/350°F/gas 4. Cook for about 35 to 40 minutes per kilo. The 5kg bird in this recipe will take about 3 to 3½ hours.\n\nCheck on your turkey every 20 minutes or so and keep it from drying out by basting it with the lovely juices from the bottom of the pan. After 2½ hours, remove the foil so the skin gets golden and crispy.\n\nWhen the time is up, take your turkey out of the oven and stick a small sharp knife into the fattest part of the thigh. If the juices run clear and the meat pulls apart easily, it's ready. If not, pop the turkey back in the oven to cook for a bit longer then check again. Once ready, cover the turkey with tin foil and a few clean tea towels for 30 minutes and let it rest while you get your veg and gravy ready.","notes":"","rating":5,"source":"Jamie Oliver","source_url":"","has_photo":true,"favorites":false},{"uid":"1FD33A71-B190-426A-87B6-91554CE3247A","name":"Lebkuchen dough","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per l'impasto:"},{"type":"item","text":"350 g miele di castagne"},{"type":"item","text":"100 g burro"},{"type":"item","text":"450 g farina"},{"type":"item","text":"50 g zucchero a velo"},{"type":"item","text":"2 cucchiai cacao in polvere"},{"type":"item","text":"1 cucchiai cannella in polvere"},{"type":"item","text":"1 cucchiai chiodi di garofano"},{"type":"header","text":"per il ripieno:"},{"type":"item","text":"marmellata a piacere"},{"type":"item","text":"pinoli (o altre noci a piacere)"}],"directions":"","notes":"","rating":0,"source":"Francesca Fiorentini","source_url":"","has_photo":true,"favorites":false},{"uid":"B1F98146-F36D-406F-AE31-7ECAACCE7DAA","name":"Macco","categories":["Messinese"],"servings":"","prep_time":"","cook_time":"","total_time":"3 ore 15 min","description":"Questa ricetta di macco verde è tipica del catanese, si può preparare con o senza pasta.","ingredients":[{"type":"item","text":"500 g fave secche"},{"type":"item","text":"1 gambo sedano"},{"type":"item","text":"1 cipolla (cipolla)"},{"type":"item","text":"300 g taglierine (oppure altra pasta corta)"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"},{"type":"item","text":"1 mazzetto finocchietto selvatico (detto anche finocchiu rizz, un alternativa al sedano)"},{"type":"item","text":"1 pomodoro (facoltativo)"}],"directions":"Ammollare le fave in acqua la sera prima (così come si fa con i ceci) riponendole in un tegame pieno d’acqua. Ricoprirle completamente considerando che nel corso della notte le fave l’assorbiranno. Il giorno seguente togliere l’occhio e la buccia una per una. \n\nTagliare finemente la cipolla ed il sedano e rosolarli in un tegame a bordi alti con poco olio.\n\nAggiungere le fave sgusciate (ed il finocchietto, se utilizzato). Aggiungere dell'acqua calda e salare. \n\nCuocere a fuoco lento per circa un’ora e mezza, rimescolare facendo in modo che le fave si sfarinino. \n\nAggiungere ancora acqua se occorresse durante la cottura.\n\nQuasi a fine cottura aggiungere le taglierine sminuzzate. \n\nUltimata la cottura aggiungere una spolveratina di pepe e un giro d’olio a crudo. \n\nServire la minestra tiepida.","notes":"Vino consigliato:\n\nCerasuolo di Vittoria","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"11480E10-4477-4E6B-A2D6-FE8200309FA6","name":"Melanzane Ripiene","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"10 melanzane (piccole e rotonde)"},{"type":"item","text":"200 g carne tritata"},{"type":"item","text":"1 cipolla (media)"},{"type":"item","text":"1 kg passata di pomodoro"},{"type":"item","text":"capperi"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"foglie basilico"},{"type":"item","text":"100 g pan grattato condito"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"}],"directions":"Lavare le melanzane senza privarle della buccia, tagliare via il picciolo e la parte sottostante dura. Ritagliare un piccolo cono in modo da creare un'apertura dalla quale scavare la melanzana. Metterlo da parte.\n\nSarebbe sempre opportuno salare l'interno e metterle a capovolte per almeno un'ora per fare perdere l'acqua di vegetazione.\n\nCon l'aiuto di un coltello incidente svuotare l' interno della melanzana formando un incavo. Mettete da parte i frammenti di melanzana asportati (eliminare le parti con troppi semini!).\n\nIn una padella rosolare la cipolla tagliata finissima a fuoco bassissimo e aggiungere i pezzetti dell'interno della melanzana tagliati sottilissimi e farli ammorbidire per qualche minuto. \n\nPreparare un ragu con la carne tritata (meglio se battuta al coltello). Aggiungerlo alla melanzana.\n\n\nAggiungere le foglie di basilico, capperi, sale e pepe e spegnere il fuoco. Lasciare riposare per qualche secondo e versare dentro il pan grattato condito amalgamando il tutto. Deve risultare un composto umido: se occorre aggiungere altro olio.\n\nCon le punte delle dita o con un cucchiaino da caffe farcire l'interno delle melanzane. Chiudere con i piccoli coni precendentemente messi da parte, formando dei tappi e bloccarli con gli stuzzicadenti cosi che durante la cottura l'interno non si asciughi troppo e non fuoriesca il ripieno.\n\nOliare il fondo di una teglia da forno, aggiungere la passata di pomodoro, gli spicchi d'aglio interi e qualche foglia di basilico; \n\nDisporre le melanzane con l'apertura verso l'alto e infornare a 180° per il tempo necessario che esse cuociano rigirandole spesso. Il tempo varia a seconda della qualità della melanzana, (PROVA DELLA FORCHETTA).\n\n\nFriggere le melanzane in abbondante olio in modo da dorarle su tutti i lati, stando attenti a non far fuoriuscire il ripieno.\nMetterle in una pentola, con l'apertura verso l'alto, con la passata di pomodoro, gli spicchi d'aglio interi e qualche foglia di basilico.\nCuocere a fiamma moderata per circa mezz'ora.\n\nA fine cottura, lasciare riposare per qualche minuto e servire tiempide.","notes":"","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"D9D2782D-B31E-4677-9901-0FF3AB201911","name":"Melanzane Ripiene A Tabacchiera","categories":["Messinese"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"(Mulinciani Chini)","ingredients":[{"type":"item","text":"1000 g melanzane (piccole e rotonde)"},{"type":"item","text":"100 g cipolla bionda"},{"type":"item","text":"30 g capperi"},{"type":"item","text":"50 g Pangrattato condito alla Messinese"},{"type":"item","text":"olio di oliva"},{"type":"item","text":"sale"},{"type":"item","text":"tuma (anche fontina o altro formaggio che fonde)"},{"type":"item","text":"pepe"},{"type":"item","text":"50 g acciughe salate (facoltativo)"}],"directions":"Scegliere le piccole e sode melanzane, togliere la parte del torsolo, poi tagliarle in due nel senso longitudinale. Scottarle in acqua salata e sgocciolarle, prima che siano diventate troppo morbide. \n\nRidurle a 'barchetta' o a 'tabacchiera', come vuole il più diffuso nome di questa pietanza, che ha in Messina il maggior centro di estimatore (ma è comune a tutta l'isola), asportando la polpa e tenendola da parte. \n\nSoffriggere in padella la cipolla a fette sottili e prima che imbiondisca, aggiungere la polpa tolta alle mezze melanzane lessate. \n\nAggiungere ancora i capperi sotto sale delle vicinissime Eolie, le acciughe (se utilizzate). Regolare di sale e pepe.\n\nQuando questo soffritto nell'olio è ben amalgamato, aggiungere il pangrattato condito e togliere dal fuoco.\n\n\nCon questa farcia riempire le 'tabacchiere' di melanzana (a Messina, per secoli 'punto franco', tutti possedevano una grossa tabacchiera da tasca) e sigillare con il formaggio, che faccia una crosticina sulla farcia; \n\nMettere le melanzane in una teglia. Se piace possiamo adagiarle su della passata di pomodoro con la quale bagnare anche la parte superiore della tabacchiera.\n\nInfornare a 180° per circa 30 minuti. \n\nFriggere le melanzane su tutti i lati in abbondante olio caldo.\n\nServire tiepide.","notes":"","rating":5,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"57129E1F-68F5-41A3-A3EC-A50C9DA93968","name":"Melenzane Alla Parmigiana","categories":["Messinese"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"(Mulinciani a' la parmiciana)\n\nQuesto e' un antico piatto siciliano in cui, erroneamente, in tutti i libri di cucina controllati (pochi per dir la verita`), si riporta, tra gli ingredienti, il formaggio parmigiano, da cui prende nome il piatto. Niente di piu' falso. Il nome parmigiana non deriva dal nome del formaggio forastero, bensi' dall'italianizzazione dalla parola dialettale parmiciana. La parmiciana e` l'insieme delle liste di legno che compongono una persiana. Esse sono messe una sopra l'altra, come le fette di melenzane nel piatto che andiamo a descrivere.","ingredients":[{"type":"item","text":"8 melanzane"},{"type":"item","text":"1 kg pomodoro maturo"},{"type":"item","text":"100 g parmigiano (pecorino o cacio cavallo può andare bene lo stesso)"},{"type":"item","text":"1 mazzetto basilico"},{"type":"item","text":"2 uova"},{"type":"item","text":"1 spicchio aglio"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale"}],"directions":"Tagliate le melenzane a fette (mezzo cm. circa), cospargetele di sale e mettetele nel colapasta con un peso sopra per qualche ora e scolatele. \n\nLavatele e asciugatele. Poi friggetele in padella con olio di oliva abbondante e ben caldo\n\nPreparare una salsa di pomodoro con i pomodori, l'aglio ed il basilico. \n\nSul fondo di una pirofila versate qualche cucchiaio di salsa ed alternate strati di melenzane (a la parmiciana) coperte di salsa, pecorino grattugiato e foglie di basilico. \n\nCoprite l'ultimo strato con salsa e pecorino. Sbattere le uova e versarle sopra. Infornare per circa 20 minuti a circa 180°. \n\nServite tiepida.","notes":"","rating":0,"source":"Ricetta speciale della nonna Concetta","source_url":"","has_photo":true,"favorites":false},{"uid":"48562520-F237-436A-BBF2-3F284781C32A","name":"Merluzzo in Crosta","categories":["30 minuti"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"2 filetti di merluzzo (600 g l'uno, oppure 6 da 180g, con la pelle, squamati e diliscati)"},{"type":"item","text":"1 cucchiaino semi di finocchio"},{"type":"item","text":"200 g pane bianco (con la crosta)"},{"type":"item","text":"4 spicchi aglio"},{"type":"item","text":"15 g filetti di acciughe sottolio (ovvero una mezza scatola da 30g)"},{"type":"item","text":"140 g pomodori secchi sottolio (ovvero una mezza scatola da 280g)"},{"type":"item","text":"1 mazzetto basilico (fresco)"},{"type":"item","text":"1 peperoncino (rosso, fresco)"},{"type":"item","text":"40 g parmigiano"},{"type":"item","text":"1 limone"},{"type":"item","text":"aceto balsamico"},{"type":"item","text":"2 rametti rosmarino"},{"type":"item","text":"2 rametti timo"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"BCAAC196-77BA-41E3-903E-01CCFD30B274","name":"Mum's Everyday Red Lentils","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"1 ora 45 min","description":"","ingredients":[{"type":"item","text":"1 cup masoor dal red lentils (picked through for stones)"},{"type":"item","text":"2 cups water"},{"type":"item","text":"1 onion (diced)"},{"type":"item","text":"4 cloves garlic (thinly sliced)"},{"type":"item","text":"1 (1/2-inch) piece ginger (peeled and minced)"},{"type":"item","text":"2 medium tomatoes (diced)"},{"type":"item","text":"1 serrano chile (sliced in 1/2, optional)"},{"type":"item","text":"1/2 teaspoon cumin seeds"},{"type":"item","text":"1/2 teaspoon black mustard seeds"},{"type":"item","text":"Generous 1/2 teaspoon turmeric powder"},{"type":"item","text":"1/2 teaspoon paprika or bafaat powder"},{"type":"item","text":"1 tablespoon vegetable oil"},{"type":"item","text":"Handful chopped fresh cilantro leaves"}],"directions":"Put the lentils in a strainer and rinse them under running water. Add them to a bowl, cover with water and let soak for 30 minutes. Drain and set aside.\n\nIn a medium saucepan, combine 2 cups of water, the onions, garlic, ginger, tomatoes, chile, if using, and the lentils. Bring to a boil over medium-high heat. Skim any scum from the surface. DO NOT ADD SALT YET; it will toughen the lentils, thereby lengthening their cooking time. Lower the heat, cover the pot with a lid and gently simmer until the lentils are tender, almost translucent, and almost falling apart, about 30 to 40 minutes.\n\nWhisk the lentils, releasing its natural starch, and mash some them so the mixture becomes thick. Add salt, to taste.\n\nTempering oil (bagaar): In a small bowl, combine the cumin and mustard seeds. In another bowl, combine the spice powders. Have all the ingredients ready because this will move very fast!\n\nIn a small skillet, over a medium-high flame, warm 1 tablespoon vegetable oil. Once the oil is shimmering, add seeds and immediately cover so you don't get covered in spluttering oil and seeds! Add the spices. They should sizzle and bubble a little - that's the blooming and it's exactly what you want. Don't let them burn. The mixture should bloom for about 30 seconds, no more.\n\nPour the oil mixture into the lentils, standing back so you don't get hurt when the mixture splutters again. Stir to combine. Transfer the lentils to a serving dish and garnish with cilantro.\n\nSERVES 4\n\nCalories: 237\n\nTotal Fat: 5 grams\n\nSaturated Fat: 0 grams\n\nProtein: 14 grams\n\nTotal carbohydrates: 35 grams\n\nSugar: 4 grams\n\nFiber: 9 grams\n\nCholesterol: 0 milligrams\n\nSodium: 23 milligrams","notes":"","rating":0,"source":"FoodNetwork.com","source_url":"","has_photo":true,"favorites":false},{"uid":"A8234ABA-ED53-40AC-8487-AE7DD0D85180","name":"Orecchiette Con Polpette","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"350 g orecchiette"},{"type":"item","text":"250 g carne di manzo macinata"},{"type":"item","text":"500 g pomodori pelati"},{"type":"item","text":"1 fetta pane pugliese"},{"type":"item","text":"1 uovo"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"prezzemolo"},{"type":"item","text":"basilico"},{"type":"item","text":"pecorino grattugiato"},{"type":"item","text":"parmigiano (grattugiato)"},{"type":"item","text":"cipolla (piccola)"},{"type":"item","text":"peperoncino"},{"type":"item","text":"1/2 bicchiere vino bianco secco"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale e pepe"}],"directions":"Amalgamate alla carne macinata uno spicchio d'aglio e un po' di prezzemolo tritati, il parmigiano e il pecorino grattugiato, la mollica di pane bagnata e strizzata e l'uovo.\n\nRegolate di sale e pepe e lavorate bene il composto. Formate delle polpettine piccole come nocciole.\n\nFatele rosolare in una padella finché risulteranno dorate, quindi sgocciolatele e fatele asciugare su un foglio di carta assorbente.\n\n\nFate soffriggere nella stessa padella la cipolla e l'aglio rimasto tritati.\n\nAggiungete il peperoncino, salate e rimettete nella padella le polpettine. Bagnate con il vino e fatelo evaporare. Aggiungete i pomodori pelati tritati e fate cuocere il sugo a fuoco basso per circa mezz'ora.\n\nAlla fine regolate di sale e pepe e spolverizzate con prezzemolo e basilico.\n\nLessate le orecchiette al dente, scolatele, conditele con il sugo di polpettine e servite.","notes":"Per questo tradizionale piatto salentino si può usare anche la carne di agnello, di vacallo o di maiale.","rating":4,"source":"Cucina Moderna","source_url":"","has_photo":true,"favorites":false},{"uid":"65DDB8B2-DEC6-493D-9960-EB3EFD1A3E39","name":"Paella","categories":[],"servings":"8 persone","prep_time":"","cook_time":"","total_time":"1 ora 20 min","description":"La Paella nasce come piatto povero, tra gli orti e i cortili dell'Albufera, vicino a Valencia. La ricetta originale, la \"huertana\", era preparata con ciò che la terra e la laguna offrivano. Il merito della sua diffusione si deve ai \"merenderos\", piccoli ristoranti costieri gestiti da pescatori, dove i turisti hanno cominciato ad apprezzarla. Con il successo si è arricchita sempre più di ingredienti; e della sua origine popolare rimane soltanto la \"paella\" o caldera, il caratteristico recipiente di ferro a bordi bassi svasati con due manici, in cui viene ancora cucinata.","ingredients":[{"type":"item","text":"300 g riso semifino"},{"type":"item","text":"1,2 kg pollo (tagliato a pezzi)"},{"type":"item","text":"200 g chorizo (va bene una buona salsiccia piccante)"},{"type":"item","text":"250 g piselli (sgranati, anche surgelati)"},{"type":"item","text":"2 cipolle"},{"type":"item","text":"350 g pomodori pelati"},{"type":"item","text":"8 scampi (grossa dimensione)"},{"type":"item","text":"16 cozze (grandi)"},{"type":"item","text":"500 g calamari"},{"type":"item","text":"200 g vongole"},{"type":"item","text":"2 peperoni (meglio se uno verde e uno giallo)"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"1 costola sedano"},{"type":"item","text":"1 porro"},{"type":"item","text":"1 mazzetto prezzemolo"},{"type":"item","text":"7 dl Brodo di pesce"},{"type":"item","text":"2 bustine zafferano"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale e pepe"}],"directions":"Scaldate 4 cucchiai di olio nell'apposita padella, unite i pezzi di pollo e rosolateli, mescolando spesso, per 10 minuti, a calore moderatamente vivace.\n\nIn un'altra padella, scaldate 2 cucchiai d'olio e soffriggetevi per 4-5 minuti un trito di aglio, porro, prezzemolo, sedano e cipolla; unite quindi i pomodori a pezzetti.\n\nFte insaporire per 5 minuti, poi aggiungete al soffritto la salsiccia a pezzetti, i piselli e gli scampi con il guscio e cuocete ancora per pochi instanti.\n\nTrasferite tutto quanto nella padella in cui sta cuocendo il pollo; regolate di sale, pepate e mescolate per amalgamare bene tutto quanto. Scaldate il forno a 200°.\n\nUnite i calamari puliti a striscioline, le vongole e le cozze pulite e aperte sul fuoco e i peperoni a pezzetti, tenendo la fiamma alta e mescolando dopo ogni aggiunta.\n\nDistribuite il riso sugli ingredienti, versate il brodo caldo in cui avrete sciolto lo zafferano, portate a ebollizione, coprite con un goglio di alluminio e infornate per 20 minuti.","notes":"Se andrete in Spagna, difficilmente riuscirete a mangirare due volte la stessa paella: perché la sua composizione cambia a seconda delle zone e di chi la prepara. Voi potete fare lo stesso, scegliendo a vostro gusto fra le varie categorie di ingredienti che avete a disposizione.\nSalumi: oltre al chorizo, potete usare salsiccia secca napoletana, prosciutto crudo, salamini toscani.\nCarni: in alternativa al pollo, ottimi anche coniglio e tacchino.\nLegumi e verdure: in aggiunta o in alternativa a piselli e peperoni, usate fave, fagioli, ceci, fagiolini, carciofi.\nPesci, molluschi e crostacei: vanno tutti bene, dall'anguilla alla coda di rospo, dalle lumache all'aragosta.\n\nDurante la cottura, non mescolate mai il riso: se necessario, smuovetelo con un cucchiaio di legno.\n\nAlla fine, la paella deve risultare piuttosto asciutta, con i chicchi di riso ben separati; se occorre, lasciatela in forno qualche minuto in più, in modo che tutto il brodo venga assorbito.\n\nFate riposare la paella per 10 minuti a recipiente coperto prima di servirla: in questo modo si amalgamano meglio i vari sapori.\n\nQuesta è stata una delle prime ricette con le quali mi sono cimentato per invitare degli amici. Fin dalla prima volta in cui, leggendola su una rivista, ho voluto provarla, questo ricetta mi ha regalato allegria e delle splendide serate che non dimenticherò mai.","rating":4,"source":"Cucina Moderna","source_url":"","has_photo":true,"favorites":false},{"uid":"6FCF82A7-A5BC-4F8A-A7EF-8BB5B21966A1","name":"Pane 3","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[],"directions":"Mettere la vaschetta (con la paletta inserita) sulla bilancia (meglio se digitale) e azzerarla. ● Versare nella vaschetta 400 gr. di acqua di rubinetto (meglio se oligominerale naturale) stiepidita o a temperatura ambiente (vedi note al paragrafo successivo). ● Versare nella vaschetta 1 cucchiaino colmo di zucchero (sono circa 6 grammi, non fa diventare dolce il pane, ma serve per “nutrire” il lievito). ● Sbriciolare nella vaschetta un cubetto da 25 gr. di lievito di birra (o una bustina da 10 gr. di lievito naturale secco), e sciogliere il tutto con una paletta in silicone o un cucchiaio di legno. Ne basterebbe anche meno, ma all'inizio è meglio non rischiare. ● Aggiungere 200 gr. di farina “Manitoba”. ● Aggiungere altri 400 gr. di farina: ○ Pane bianco comune: 400 gr. di farina tipo “0”. ○ Pane comune con grano duro (non è questo l'Altamura): 200 gr. di semola di grano duro rimacinata e 200 gr. di farina tipo “0”. Usare la doratura della crosta a “scuro”. ○ Pane semi-integrale: 200 gr. di farina integrale e 200 gr. di farina “0”; controllare l'impasto, la farina integrale assorbe meno acqua: usare 10 gr. di acqua in meno o aggiungere un po' di farina (un cucchiaino alla volta). Usare il programma “Pane integrale” (programma n. 3 nella BM3983). ● Fare una fontanella al centro e versarvi 10-12 gr. (un cucchiaino colmo) di sale fino ed eventualmente anche un po' d'olio extravergine (10-15 gr.). ● Possono essere aggiunti ora alcuni ingredienti opzionali che non intralciano l'impasto, come sesamo tostato, peperoncino, semi di finocchio, ecc. (v. capitolo successivo). ● Posizionare correttamente la vaschetta nella macchina, chiudere il Pag. 12 di 118. coperchio, attaccare la spina e accendere la macchina. ● Impostare il programma Standard o Pane Francese. Il secondo lievita di più, cuoce di meno, quindi il pane sarà più soffice. ● Impostare il livello di doratura della crosta. ● Se non si può essere presenti quando termina il programma, impostare il timer in modo da ritardare il programma ed essere presenti per togliere il pane dalla macchina entro un'ora (*) dal termine della cottura. ● Premere il pulsante di avvio (nella BM3983 è quello rosso). ● Se si è presenti “al beep” (dopo circa 20' dall'avvio dell'impasto), si possono aggiungere ingredienti opzionali come olive snocciolate, cipolle soffritte, fichi secchi, noci, mandorle, pancetta, salsiccia, dadini vari, ecc. ● Anche il sale, invece che all'inizio, può essere aggiunto ora. ● A programma terminato (beep), attendere mezz'oretta e poi togliere il pane dalla macchina posandolo su una griglia per disperdere l'umidità. ● Consumarlo tostato dopo che si è raffreddato, o meglio ancora il giorno dopo. Per consumarlo subito, tagliarlo a metà, affettare e tostare le fette.","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"57D3EFE1-3E28-44D9-90E9-5B566E484D6C","name":"Pane Bianco","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per il lievitino:"},{"type":"item","text":"100 g acqua oligominerale naturale"},{"type":"item","text":"150 g farina manitoba (anche 00 in mancanza)"},{"type":"item","text":"10 g lievito fresco"},{"type":"item","text":"1 cucchiaino zucchero"},{"type":"header","text":"per l'impasto:"},{"type":"item","text":"100 g latte"},{"type":"item","text":"180 g acqua"},{"type":"item","text":"25 g olio"},{"type":"item","text":"3 cucchiaini zucchero"},{"type":"item","text":"350 g farina tipo 00"},{"type":"item","text":"1 1/2 cucchiaino sale fino"}],"directions":"Preparare il lievitino facendo andare il programma 1 della macchina del pane ma e spegnendo la macchina dopo aver finito di amalgamare gli ingredienti.\n\n\nLasciare la macchina coperta per un'ora o più, a seconda della stagione, e poi aggiungere gli altri ingredienti per l'impasto.\n\n\nAvviare la macchina impostando il programma 6.","notes":"a piacere si può aggiungere 50-60 gr. di semini misti fin dall'inizio dell'impasto (viene meglio che al bip)","rating":0,"source":"Cookaround","source_url":"","has_photo":true,"favorites":false},{"uid":"706A4E69-3391-4463-AA00-E8897C482156","name":"Pane bianco standard","categories":[],"servings":"750gr","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"300 ml acqua"},{"type":"item","text":"1,5 cucchiai olio evo"},{"type":"item","text":"450 g farina tipo 0 (possiblilmente non sbiancata)"},{"type":"item","text":"4 cucchiaini latte scremato in polvere"},{"type":"item","text":"1,5 cucchiaini sale"},{"type":"item","text":"1 cucchiaio zucchero"},{"type":"item","text":"1,5 cucchiaini lievito in polvere"}],"directions":"","notes":"","rating":0,"source":"Kenwood \"Ricettario macchina del pane BM350\"","source_url":"","has_photo":true,"favorites":false},{"uid":"037F3A83-D770-48B0-8DC2-C6882D83ADFB","name":"Pane Con La Macchina Del Pane","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"400 ml acqua oligominerale naturale (stiepidita o a temperatura ambiente)"},{"type":"item","text":"6 g zucchero (circa un cucchiaino, da sciolgliere nell'acqua per nutrire il lievito)"},{"type":"item","text":"25 g lievito di birra (oppure 10g (una bustina) di lievito naturale secco, in ogni caso da sciogliere in acqua)"},{"type":"item","text":"200 g farina manitoba"},{"type":"item","text":"400 g farina (vedi le varie alternative nelle istruzioni)"},{"type":"item","text":"10 g sale"},{"type":"item","text":"10 g olio"}],"directions":"Mettere la vaschetta (con la paletta inserita) sulla bilancia (meglio se digitale) e azzerarla.\n\nVersare nella vaschetta 400 gr. di acqua di rubinetto (meglio se oligominerale naturale) stiepidita o a temperatura ambiente (vedi note al paragrafo successivo).\n\nVersare nella vaschetta 1 cucchiaino colmo di zucchero (sono circa 6 grammi, non fa diventare dolce il pane, ma serve per “nutrire” il lievito).\n\nSbriciolare nella vaschetta un cubetto da 25 gr. di lievito di birra (o una bustina da 10 gr. di lievito naturale secco), e sciogliere il tutto con una paletta in silicone o un cucchiaio di legno. Ne basterebbe anche meno, ma all'inizio è meglio non rischiare.\n\nAggiungere 200 gr. di farina “Manitoba”.\n\nAggiungere altri 400 gr. di farina, scegliendo fra queste opzioni: \n○ Pane bianco comune: 400 gr. di farina tipo “0”. \n○ Pane comune con grano duro (non è questo l'Altamura): 200 gr. di semola di grano duro rimacinata e 200 gr. di farina tipo “0”. Usare la doratura della crosta a “scuro”. \n○ Pane semi-integrale: 200 gr. di farina integrale e 200 gr. di farina “0”; controllare l'impasto, la farina integrale assorbe meno acqua: usare 10 gr. di acqua in meno o aggiungere un po' di farina (un cucchiaino alla volta). Usare il programma “Pane integrale”.\n\nFare una fontanella al centro e versarvi 10-12 gr. (un cucchiaino colmo) di sale fino ed eventualmente anche un po' d'olio extravergine (10-15 gr.).\n\nPossono essere aggiunti ora alcuni ingredienti opzionali che non intralciano l'impasto, come sesamo tostato, peperoncino, semi di finocchio, ecc. (v. capitolo successivo).\n\nPosizionare correttamente la vaschetta nella macchina, chiudere il coperchio, attaccare la spina e accendere la macchina. \n\n\nImpostare il programma Standard o Pane Francese. Il secondo lievita di più, cuoce di meno, quindi il pane sarà più soffice.\n\nImpostare il livello di doratura della crosta.\n\nSe non si può essere presenti quando termina il programma, impostare il timer in modo da ritardare il programma ed essere presenti per togliere il pane dalla macchina entro un'ora (*) dal termine della cottura.\n\nPremere il pulsante di avvio.\n\nSe si è presenti “al beep” (dopo circa 20' dall'avvio dell'impasto), si possono aggiungere ingredienti opzionali come olive snocciolate, cipolle soffritte, fichi secchi, noci, mandorle, pancetta, salsiccia, dadini vari, ecc.\n\n Anche il sale, invece che all'inizio, può essere aggiunto ora.\n\nA programma terminato (beep), attendere mezz'oretta e poi togliere il pane dalla macchina posandolo su una griglia per disperdere l'umidità.\n\nConsumarlo tostato dopo che si è raffreddato, o meglio ancora il giorno dopo. Per consumarlo subito, tagliarlo a metà, affettare e tostare le fette.","notes":"","rating":0,"source":"Brunati \"Appunti liberi di panificazione domestica\"","source_url":"","has_photo":true,"favorites":false},{"uid":"6F4CC726-9227-4B43-A5DE-756FF44A19A3","name":"Pangrattato condito alla Messinese","categories":["Messinese","Ricette base"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g pangrattato"},{"type":"item","text":"1 mazzetto prezzemolo"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"100 g pecorino pepato siciliano (grattugiato)"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"}],"directions":"Condire il pangrattato con aglio (tritato finemente), prezzemolo tritato, il pecorino grattugiato, sale e pepe se serve (il pecorino è molto salato e pepato di suo).\n\nConservare in sacchetti di stoffa. In altrernativa riporlo in berattoli di vetro in frigo ma in questo caso controllare di tanto in tanto che non faccia la muffa.","notes":"","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"D040843E-41B8-4D16-B474-29D6552B66AE","name":"Pannocchie Abbrustolite","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"4 pannocchie di mais (grosse e pulite)"},{"type":"item","text":"olio evo (q.b.)"},{"type":"item","text":"sale (q.b.)"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"EC03198A-181B-4A59-9EC0-73FE65050243","name":"Passatina di piselli con gamberi al curry","categories":[],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g piselli"},{"type":"item","text":"10 gamberi"},{"type":"item","text":"60 g burro"},{"type":"item","text":"2 scalogni"},{"type":"item","text":"1 bicchierino brandy"},{"type":"item","text":"1 cucchiaino curry"},{"type":"item","text":"1 ciuffo basilico"},{"type":"item","text":"olio evo (qb)"},{"type":"item","text":"sale e pepe (qb)"}],"directions":"","notes":"","rating":0,"source":"Cucchiaio d'argento","source_url":"","has_photo":true,"favorites":false},{"uid":"E4F99025-E704-47EF-8EA6-216DCAE94B2B","name":"Pasta 'ncasciata A' Missinisi","categories":["Messinese"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"Questa e' la versione messinese della classica pasta al forno siciliana.","ingredients":[{"type":"item","text":"600 g magliette di maccheroncino (rigati)"},{"type":"item","text":"200 g tuma (anche caciocavallo fresco)"},{"type":"item","text":"200 g carne tritata"},{"type":"item","text":"50 g salame (anche prosciutto cotto (in aggiunta o sostituzione))"},{"type":"item","text":"2 uova sode"},{"type":"item","text":"4 melanzane"},{"type":"item","text":"100 g pecorino grattugiato"},{"type":"item","text":"salsa di pomodoro"},{"type":"item","text":"1/2 bicchiere vino bianco secco"},{"type":"item","text":"basilico"},{"type":"item","text":"olio"},{"type":"item","text":"sale e pepe"}],"directions":"Tagliate le melenzane a fette e friggetele dopo averle tenute per piu' di un'ora con il sale. \n\nPreparare dell'abbondante salsa di pomodoro.\n\nSoffriggete intanto il tritato in un tegame, con olio abbondante, sfumate col vino e completate la cottura aggiungendo qualche cucchiaio di salsa di pomodoro. \n\nInvece di partire dalla carne trita ti possono utilizzare dei polpettoni (o delle polpette) spezzettati con la loro salsa o con la salsa del ragù come faceva il nonno Stefano.\n\nLessate la pasta, scolate la al dente e conditela in una zuppiera con la salsa di pomodoro. \n\nPrendete una teglia ben unta e versatevi le magliette alternandole a strati con la carne tritata, le melenzane fritte, il formaggio grattugiato, il basilico, le uova sode, la tuma ed il salame e/o prosciutto tagliati a fette. Chiudete l'ultimo strato di pasta con salsa e molto pecorino. \n\nPassate al forno caldo per circa 20 minuti. \n\nIl formaggio, sciogliendosi al calore del forno formerà una leggera crosta dorata (da cui il nome 'ncaciata, da cacio).","notes":"Il nonno Stefano usava come salsa di pomodoro il sugo del ragù fatto con 2/3 tipi di carne (maiale, manzo e vitello?).\nFaceva cuocere a lungo (come un brasato) e teneva il pomodoro per condire la pasta. \nIn questo stesso sugo, però, aveva anche cotto le polpette che poi metteva al posto della carne trita nella pasta al forno stessa.\n\nIo e Sergio l'abbiamo fatta utilizzando, al posto della carne trita, dei polpettoni spezzettatti e ripassati in padella con il loro sugo. Ne abbiamo usati 3, e sono in parte avanzati. Per riuscire a completare la teglia con più strati, abbiamo messo più pasta (circa 800 gr). E' venuta molto bene, ma il formaggio (abbiamo usato del caciocavallo) non si è sciolto bene all'interno ed è rimasto a dadini. Quindi bisogna usarne uno ancora più fresco oppure semplicemente avere l'accortezza di grattugiarlo.","rating":5,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"80A8683F-3929-4BA0-B126-FE6BF9B60161","name":"Pasta Alla Norma","categories":["Messinese"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"1 ora 30 min","description":"A casa nostra semplicemente \"Pasta chi Mulinciani\"","ingredients":[{"type":"item","text":"4 melanzane (media)"},{"type":"item","text":"500 g spaghetti"},{"type":"item","text":"1 kg pomodori maturi"},{"type":"item","text":"100 g ricotta salata (grattugiata)"},{"type":"item","text":"basilico (fresco)"},{"type":"item","text":"1 spicchio aglio"},{"type":"item","text":"olio di oliva"},{"type":"item","text":"sale"}],"directions":"Lavare le melanzane, tagliarle a fette, lungo la linea verticale, spesse circa 5 mm. Disporle su una tavola di legno, a strati, l’una sull’altra. Ogni strato di melanzane verrà cosparso di sale fino. Alla fine porre sopra la pila di melanzane un piatto su cui verrà poggiato un peso. L’operazione consentirà di privare gli ortaggi dell’acqua di vegetazione. Trascorsa circa un’ora occorrerà lavare le fette sotto l’acqua corrente e asciugarle con un canovaccio.  \n\nPreparare una padella antiaderente con abbondante olio d’oliva ben caldo e soffriggere le melenzane facendole dorare da entrambi i lati. Una volta fritte tutte le fette disporle su di un piatto.\n\nPreparare la salsa: Spellare i pomodori dopo averli tuffati in acqua bollente, privare dei semini interni, ridurli a pezzi grossolani e mettere a cuocere in una padella (meglio se di alluminio). Fare cuocere per circa 10 minuti. \n\nRimescolare con un cucchiaio di legno finchè non si sarà addensata. \n\nAggiustare di sale, quando è quasi cotta aggiungere uno spicchio d’aglio intero spellato, un giro d’olio, basilico in foglie.\n\nCuocere gli spaghetti in acqua bollente, scolare quando la pasta è al dente. La pasta verrà saltata con la salsa cotta precedentemente. \n\nServire la pasta al sugo di pomodoro nei piatti, solo dopo disporre le fette di melenzane fritte sui vari piatti, grattuggiare sopra la ricotta salata, guarnire con un ciuffo di basilico freco e servire.","notes":"La nonna Concetta, e quindi tutti i figli, non mettevano la ricotta salata. Eventualmente veniva aggiunto del parmigiano direttamente nel piatto.","rating":5,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"A471E7F7-9842-4A5F-AB79-588047913A3C","name":"Pasta Con I Broccoli","categories":["Messinese","Pasqua"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"(pasta chi vruoccoli 'rriminati)\n\nIn uso soprattutto nel palermitano e` una specialita` della cucina siciliana","ingredients":[{"type":"item","text":"500 g maccheroncini"},{"type":"item","text":"1 kg broccoli"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale e pepe"},{"type":"item","text":"35 g uva sultanina (facoltativo)"},{"type":"item","text":"35 g pinoli (facoltativo)"},{"type":"item","text":"1 bustina zafferano (facoltativo)"},{"type":"item","text":"2 acciughe salate (facoltativo)"},{"type":"item","text":"1 cipolla (media, facoltativo)"}],"directions":"Lessate i broccoli a pezzetti in acqua salata.\n\nAppena pronti, toglierli dall'acqua.\n\nRiportare a bollore l'acqua di cottura dei broccoli e cuocervi la pasta.\n\nAppena cotta, scolare la pasta lasciando un po' d'acqua da parte.\n\nUnire pasta e broccoli e allungare con un poco d'acqua se serve.\n\nSe piace, Iin un tegame soffriggere a parte la cipolla (o l'aglio) finemente affettata con olio abbondante, aggiungendovi lo zafferano sciolto in un po' di acqua tiepida, l'uva sultanina ed i pinoli, lasciare insaporire e versare anche i broccoli a pezzi. \n\nLasciare soffriggere a fuoco vivo, condite con sale e pepe, aggiungere un mestolo di acqua di cottura della verdura  e le acciughe gia' sciolte nell'olio. \n\nUnire la pasta nel tegame e saltare aggiungendo un po' d'acqua di cottura.\n\nCondire con olio evo e formaggio parmigiano.","notes":"","rating":4,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"FDFC5E24-3C4D-4F3D-8607-C0F53F133077","name":"Pasta Con La Mollica","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g pasta di semola rigata"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale"},{"type":"item","text":"pangrattato"},{"type":"item","text":"2 acciughe salate (facoltativo)"},{"type":"item","text":"1 cipollina novella (facoltativo)"}],"directions":"Tostare il pangrattato in una padella antiaderente.\n\nCuocere la pasta al dente e scolarla.\n\nUnire la pasta nella padella del pangrattato ed aggiungere l'olio a crudo.\n\nSe utilizzata, soffriggere la cipolla tagliata finemente in poco olio. Aggiungere l'acciuga e scioglierla insieme alla cipolla.\n\nUnire tutti gli ingredienti e servire.\n\nEventualmente (e volendo anche in alternativa), ogni commensale può aggiungere direttamente nel piatto il pangrattato tostato a piacimento.","notes":"","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"ADDAC12D-729C-4C29-A6A6-EFC15DA76318","name":"Pasta Con Le Sarde","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"30 min","description":"Si tratta di un piatto tipicamente palermitano ma famosissimo in tutto il mondo. E’ buono sia freddo che caldo.","ingredients":[{"type":"item","text":"600 pasta"},{"type":"item","text":"800 g sarde"},{"type":"item","text":"finocchietto selvatico"},{"type":"item","text":"4 acciughe salate"},{"type":"item","text":"1 cipolla"},{"type":"item","text":"100 pangrattato"},{"type":"item","text":"uva sultanina"},{"type":"item","text":"pinoli"},{"type":"item","text":"sale e pepe"},{"type":"item","text":"zafferano"},{"type":"item","text":"olio evo"}],"directions":"Abbrustolire in un a padella antiaderente il pangrattato. \n\nLavare sotto l’acqua corrente e lessare in acqua salata il finocchietto selvatico. Scolarlo e mettere l’acqua di cottura da parte ove verrà lessata la pasta. \n\nIn un padellino sciogliere le acciughe private del sale. \n\nIn acqua calda sciogliere lo zafferano. \n\nIn una padella antiaderente rosolare la cipolla in poco olio, unirvi l’uva passa i pinoli e se si desidera sarebbero gustose anche delle mandorle pelate a scagliette. Aggiungere le acciughe e lo zafferano. \n\nEviscerare le sarde, eliminare la coda e la testa e lasciarle aperte a libro. Friggete leggermente in olio i filetti di sarde lasiandone da parte circa 5, scolarle e metterle da parte. \n\nNell’olio di frittura delle sarde aggiungere il finocchietto tritato e i 5 filetti di sarde. \n\nRimescolare e sminuzzare le sarde. \n\nLessare la pasta nell’acqua di cottura del finocchietto, scolarla e condirla con la salsa preparata e parte del finocchietto condito con le sarde. \n\nPrendere una teglia ungerla con dell’olio e spolverizzare con un po’ di pangrattato. \n\nVersare la pasta e alternare uno strato di sarde e uno di finocchietto. Ripetere ancora e finire con lo strato superiore di sarde. \n\nSpolverizzare con il pangrattato, un giro d’olio e infornare per circa 10 minuti.","notes":"C’è chi usa piuttosto che infornare la pasta con le sarde, condirla e lasciarla riposare in una zuppiera capiente per circa 15 minuti trascorsi i quali viene servita.","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"7667432C-C07B-4174-8CB3-C3F3A9ADCEB8","name":"Pasta frolla","categories":[],"servings":"per una crostata media","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"250 g farina"},{"type":"item","text":"125 g burro"},{"type":"item","text":"125 g zucchero"},{"type":"item","text":"2 tuorli d'uovo"},{"type":"item","text":"buccia di limone"},{"type":"item","text":"1 pizzico sale"}],"directions":"","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"C2E2B4BE-6F33-4B86-8EED-184912FFE8C0","name":"Pasta frolla leggera","categories":[],"servings":"per una crostata media","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"250 g farina"},{"type":"item","text":"90 g burro"},{"type":"item","text":"130 g zucchero"},{"type":"item","text":"1 tuorli d'uovo"},{"type":"item","text":"1 uovo"},{"type":"item","text":"1 pizzico sale"},{"type":"item","text":"buccia di limone (facoltativa)"}],"directions":"","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"67411252-99F2-48B0-B715-8C8FCF31CE04","name":"Patate al Forno","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 kg patate"}],"directions":"","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"42C98CE3-475F-47E4-B528-FA653A605773","name":"Patate alla parmentier","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 kg patate"}],"directions":"","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"9B7F5313-64E1-4F28-BCAE-2A3555D80204","name":"Patate Croccanti","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g patate rosse"},{"type":"item","text":"1 limone"},{"type":"item","text":"4 rametti rosmarino (anche timo)"},{"type":"item","text":"1 testa aglio"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"9D51BD60-2DAE-4DA1-9DB6-72182C88768A","name":"Patate Novelle Arrosto","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g patate novelle"},{"type":"item","text":"1/2 limone"},{"type":"item","text":"1 mazzetto erbe aromatiche"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"F04B1BA3-85CB-4F62-834C-0912DCAF5E74","name":"Patate Schiacciate","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"700 patate novelle (oppure rosse, piccole)"},{"type":"item","text":"2 rametti rosmarino (fresco)"},{"type":"item","text":"2 foglie alloro (fresco)"},{"type":"item","text":"6 spicchi aglio"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"6F8AE8FC-7E3E-4A40-B870-27ACE6A299E8","name":"Patate, Pastinache e Carote arrostite","categories":[],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"\"Per come la vedo io, un bravo cuoco si riconosce da come gli vengono le patate arrosto. Come può un'umile verdurina come la patate far così felice la gente? Provate questa ricetta: otterrete delle patate perfettamente croccanti fuori e soffici dentro. La tecnica di sbollentarle, condirle per bene con olio aromatizzato e arrostirle finché sono belle dorate e croccanti, vale praticamente per tutti i tuberi e le verdure a radice, in particolare le pastinache e le carote, perciò in questa ricetta ci ho messo anche loro.","ingredients":[{"type":"item","text":"1 kg patate"},{"type":"item","text":"6 pastinache"},{"type":"item","text":"6 carote"},{"type":"item","text":"1 testa aglio"},{"type":"item","text":"3 rametti rosmarino"},{"type":"item","text":"olio di oliva"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"}],"directions":"Se intendete cucinarle a parte e non insieme ad un arrosto, scaldate il forno a 200℃. Pelate le verdure e tagliatele a metà nel senso della lunghezza quelle più grosse. Dividete l'aglio in spicchi, senza pelarli, e schiacciateli leggermente con il palmo della mano. Staccate gli agli dal rametto di rosmarino. \n\nButtate le patate e le carote in una grossa pentola d'acqua bollente salata (magari dovete usare due pentole) e riportate a ebollizione. Fatele andare per 5 minuti, poi aggiungete le pastinache e cuocetele per altri 4 minuti. Scolatele in uno scolapasta e lasciatele a buttare fuori il vapore. Tirate fuori le carote e le pastinache e mettetele da parte. Ammorbidite le patate facendole un po' saltare nello scolapasta: se la parte esterna si ammorbidisce bene, una volta nel forno formerà una deliziosa crosticina croccante.\n\nScaldate a fuoco medio una teglia capiente versandoci una bella dose d'olio d'oliva o un po' del grasso dell'arrosto che state cuocendo in forno (occhio a non scottarvi). Aggiungete l'aglio ed il rosmarino. Mettete le verdure nella teglia con un bel pizzico di sale e pepe e date una mescolata per farle insaporire bene. Distribuitele uniformemente così da averne un solo strato: se fossero ammassate l'una sull'altra finirebbero cotte al vapore, non arrostite. Mettetele nel forno già caldo per circa 1 ora, o finché saranno dorate, croccanti e appetitose. Servitele subito con il vostro arrosto ed il sughetto.","notes":"Il momento migliore per mettere in forno le verdure è circa 40 minuti prima di dover tirare fuori la carne. Mentre l'arrosto è sul tagliere ea riposare avrete più spazio nel forno e potrete trasferire la teglia con le verdure sul ripiano alto per finirle alla perfezione.\n\nQuesta ricetta è diventata per me/noi un grande classico. Ho provato anche ad usare il PLATANO al posto della pastinaca (finora introvabile), ma risulta alla fine un po' duro (probabilmente ha tempi di cottura inferiori). Sorprendentemente buone anche le carote.","rating":5,"source":"Jamie Oliver","source_url":"","has_photo":true,"favorites":false},{"uid":"ADF00833-CFD4-42EF-BDDA-C7942BA1053A","name":"Peanut Butter Biscuit","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"2 cups flour"},{"type":"item","text":"4 teaspoons baking powder"},{"type":"item","text":"1 teaspoon salt"},{"type":"item","text":"3 tablespoons peanut butter"},{"type":"item","text":"3/4 cup milk or water"}],"directions":"Sift dry ingredients. Work peanut butter into them with fork; add the liquid gradually until soft dough is formed. Turn out on floured board, roll to one-third inch in thickness. Cut with small round cutter, place on floured pan, and bake in quick oven. If desired one-third rye, Graham, barley or corn-meal may be used instead of all white flour. For a plain biscuit substitute other fat for the peanut butter. Sour milk with 3/4 tea-spoon soda may be used in place of sweet milk and baking powder.","notes":"","rating":4,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"D1CFD801-21FB-4D5A-9C36-8C160A09D41B","name":"Peperoni Arlecchino Al Gratin","categories":["Messinese"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"2 peperoni gialli"},{"type":"item","text":"2 peperoni rossi"},{"type":"item","text":"2 peperoni verdi"},{"type":"item","text":"olio evo"},{"type":"item","text":"200 g Pangrattato condito alla Messinese"},{"type":"item","text":"1 manciata capperi"},{"type":"item","text":"1 manciata olive nere"},{"type":"item","text":"1 limone"}],"directions":"Lavare i peperoni e grigliarli bene da ogni parte (oppure metterli nel forno).\n\nUna volta abbrustoliti (nel forno invece si ammorbidiscono soltanto) metterli in un sacchetto di carta e sigillarlo.\n\nUna volta intiepiditi (la buccia dovrebbe staccarsi adesso più facilmente) spellarli, privarli dei semi e tagliarli a listarelle. Durante la pulitura, sciacquare ripetutamente le mani avendo cura di non bagnare i peperoni.\n\nUngere una teglia e mettervi le listarelle di peperoni a strati con il pangrattato condito. Per non rischiare di metterne troppo, spolverarlo come si trattasse di salare un alimento. Aggiungere i capperi e le olive.\n\nUngere bene con olio e spremere il succo di limone uniformemente sulla teglia.\n\nInfornare a 180° per 30 minuti.","notes":"La Zia preferisce (e consiglia) i soli peperoni rossi: li trova più dolci!\n\nSelezionare dei peperoni il più lisci possibile, senza irregolarità sulla superficie che rendono più difficile la spellatura.\n\nLi abbiamo preparati solo con peperoni rossi e gialli. impegnativa la spellatura (fatta abbrustolendoli e mettendoli in un sacchetto), ma il risultato è stato davvero squisito.","rating":4,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"F0D809D1-9846-4D09-8886-2A560A82C569","name":"Peperoni ripieni al forno","categories":["Messinese"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1,500 kg peperoni (usare quelli piccoli)"},{"type":"item","text":"50 g capperi"},{"type":"item","text":"250 g Pangrattato condito alla Messinese"},{"type":"item","text":"50 g olive nere"},{"type":"item","text":"olio evo"}],"directions":"Con l' aiuto di un coltello tagliare la parte intorno al picciolo (metterla da parte) e scavare il piccolo peperone privandolo dei semi e delle coste bianche più dure e sporgenti.\n\nLavarli per bene sotto l'acqua corrente e posizionarli con il foro verso il basso per far scolare l'acqua. Lavare i piccioli e metterli ad asciugare.\n\nLavare sotto l'acqua corrente i capperi per desalarli.\n\nIn una ciotola mettere il pangrattato condito, aggiungere i capperi e le olive versando per ultimo l'olio fino a formare un composto umido ma non bagnato.\n\nRiempire con questo condimento uno per uno i peperoni senza pressarli troppo.\n\nUngere il fondo di una teglia e disporvi i peperoni con la parte aperta verso l'alto in modo da non rovesciare il ripieno. Eventualmente usare il loro coperchio per chiuderli.\n\nInfornare  a 180° per il tempo necessario per portare a cottura (1ora circa), ovvero fino a che la superficie non si sarà raggrinzita e la forchetta entrerà facilmente nella pelliccina del peperone.\n\nSe occorre lasciarli riposare nel forno caldo per un 1ora circa e poi servire ancora tiepidi.","notes":"","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"DDDF5716-876A-4B66-8A92-7E4077A28DFC","name":"Pescestocco Alla Messinese","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"E' la ricetta regina della cucina messinese. E' una pietanza gustosa e robusta e va servita come primo piatto accompagnata da un vigoroso e soprattutto genuino vino rosso preferibilmente preparato sotto il personale controllo dell'ospite. Una cena a base di pescestocco alla messinese non puÚ concludersi senza un assaggio di profumati 'Spaghetti alle restatine' che vanno conditi con il sugo residuo del pescestocco.","ingredients":[{"type":"item","text":"8 pezzi stoccafisso norvegese (già ammollato)"},{"type":"item","text":"1500 g patate novelle (medie)"},{"type":"item","text":"200 g passata di pomodoro"},{"type":"item","text":"300 g cipolle"},{"type":"item","text":"100 g gambi di sedano"},{"type":"item","text":"50 g capperi"},{"type":"item","text":"200 g olive verdi in salamoia"},{"type":"item","text":"100 cl olio di oliva"},{"type":"item","text":"sale"},{"type":"item","text":"pepe nero"}],"directions":"In una terrina ricolma di acqua versate i capperi che avrete precedentemente lavato in abbondante acqua per togliere l'eccesso del sale di conservazione. \n\nLavate e tagliate in piccoli cubetti i gambi di sedano che avrete pulito da tutti i filamenti e della pellicola esterna. \n\nTriturate la cipolla in pezzetti non molto piccoli, snocciolate le olive verdi in 2 semigusci. \n\nPelate le patate, tagliatele in spicchi di medie dimensioni e ponetele in una terrina ricolma d'acqua per evitare l'annerimento dovuto al contatto prolungato con l'aria. \n\nIn una casseruola preparate un battuto con la cipolla tritata, i cubetti di sedano ed i capperi: aggiungete mezzo bicchiere d'acqua, dell'olio d'oliva e cuocete a fuoco lento fino ad esaurimento dell'acqua. Fate rosolare per alcuni minuti curando di mescolare continuamente il battuto con un cucchiaio di legno. \n\nAggiungete, quindi, il passato di pomodoro, 1/2 litro di acqua, sale, pepe nero e la parte restante dell'olio d'oliva. \n\nDopo aver mescolato il tutto immergete i pezzi di stoccafisso gi‡ lavati nella salsa avendo cura di porli con la pelle rivolta verso il basso evitando di sovrapporli e fate cuocere a fuoco lento. \n\nDopo circa 20 minuti aggiungere le patate precedentemente tagliate ponendole negli spazi vuoti lasciati dal pesce e ricoprendo lo stesso con uno strato uniforme in modo da lambire il bordo superiore del liquido. \n\nContinuare la cottura per circa 90 minuti e, comunque, fino a completa cottura del pesce e delle patate avendo cura di non mescolare gli ingredienti ma di spostarli leggermente e delicatamente con l'aiuto di un cucchiaio di legno scuotendo la pentola.","notes":"Per una perfetta riuscita della ricetta è indispensabile seguire scrupolosamente la scelta degli ingredienti e le fasi di preparazione. In considerazione del fatto che la preparazione riveste particolari difficolt‡ a coloro che si cimentano per la prima volta nella realizzazione di questa ricetta suggeriamo di provarla senza alcun impegno con ospiti e con dosi dimezzate al fine di prendere familiarit‡ con quelli che sono classificati come 'segreti della cucina' e che assicurano la perfetta riuscita della ricetta. \r\nSelezionare le parti migliori dello stoccafisso che deve essere ben ammollato ma altrettanto sodo e compatto. Le parti migliori sono quelle dorsali centrali e quelle di coda. \r\nPreparare tutti gli ingredienti seguendo scrupolosamente le modalit‡ di preparazione e la sequenza d'impiego. La parte pi˘ difficile riguarda il tempo di cottura dal momento che lo stoccafisso e le patate non hanno la stessa consistenza e richiedono, pertanto, tempi di cottura differenti dipendenti dalla qualit‡ della patata utilizzata e che va calcolato con una buona dose di esperienza.","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"85369DBA-732B-4171-8456-71D976A422D6","name":"Pignolata alla Messinese","categories":["Messinese"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"L’origine della pignolata probabilmente risale al periodo della dominazione spagnola in Sicilia (1516-1713).\nOriginariamente il dolce veniva preparato ricoprendo i mucchietti di pasta con miele fresco.\nSuccessivamente, i maestri pasticceri messinesi, su richiesta dell’aristocrazia, rielaborarono una versione del dolce più raffinata, che è quella attuale, caratterizzata dall’utilizzo di una duplice glassa.","ingredients":[{"type":"header","text":"per la pasta:"},{"type":"item","text":"1 kg farina tipo 00"},{"type":"item","text":"4 cucchiai strutto"},{"type":"item","text":"12 tuorli d'uovo"},{"type":"item","text":"6 cucchiai rhum"},{"type":"header","text":"per la glassa al limone:"},{"type":"item","text":"4 limoni"},{"type":"item","text":"400 g zucchero a velo"},{"type":"item","text":"6 albumi d'uovo"},{"type":"item","text":"2 cucchiaini vermuth"},{"type":"item","text":"essenza di limone (facoltativo)"},{"type":"header","text":"per la glassa al
