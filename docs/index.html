<!-- Firebase SDKs (compat, caricati prima del resto) -->

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #faf8f3; color: #1a1714;
    font-family: "Inter Tight", -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
  }
  * { box-sizing: border-box; }
  /* Reset minimal: il prototipo gestisce tutto il layout */
  button { font-family: inherit; cursor: pointer; border: 0; background: none; color: inherit; padding: 0; }
  a { color: inherit; }

  /* Splash mentre Babel compila i jsx (qualche centinaia di ms al primo load) */
  #splash { position: fixed; inset: 0; background: #faf8f3; display: flex;
    align-items: center; justify-content: center; flex-direction: column; z-index: 9999;
    transition: opacity .3s; gap: 14px;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash .logo { font-family: "Source Serif 4", Georgia, serif; font-size: 48px; font-weight: 500; letter-spacing: -1.4; }
  #splash .logo i { color: #a83d20; }
  #splash .sub { font-family: "JetBrains Mono", monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #857c6e; }

  /* Container app — responsive: mobile fino a 880px, desktop oltre.
     Frame usa height:100% quindi i parent devono avere un'altezza fissa,
     non solo min-height. */
  html, body, #root { height: 100%; }
  #root { width: 100%; }
  .app-mobile, .app-desktop { width: 100%; height: 100vh; height: 100dvh; background: #faf8f3; }
  .app-desktop { display: none; }
  .app-mobile { display: block; }
  @media (min-width: 880px) {
    .app-mobile { display: none; }
    .app-desktop { display: block; }
  }
  .app-mobile > *, .app-desktop > * { width: 100%; height: 100%; }
</style>
</head>
<body>

<div id="splash">
  <div class="logo">Recip<i>ees</i>.</div>
  <div class="sub">Caricamento…</div>
</div>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Prototipo: design system + viste mobile + viste desktop + glue -->

<script type="text/babel" src="v2/system.jsx?v=1778090687"></script>
<script type="text/babel" src="v2/mobile-1.jsx?v=1778090687"></script>
<script type="text/babel" src="v2/mobile-2.jsx?v=1778090687"></script>
<script type="text/babel" src="v2/desktop.jsx?v=1778090687"></script>

<!-- Site shell: responsive switch tra MobileApp e DesktopApp.
     Aspetta che tutti gli script Babel siano stati eseguiti, poi monta.
     Usiamo un setInterval di polling (Babel è async). -->
<script type="text/babel" data-presets="env,react">
(function () {
  class EB extends React.Component {
    constructor(p) { super(p); this.state = { e: null }; }
    static getDerivedStateFromError(e) { return { e }; }
    componentDidCatch(e, info) { console.error('Render error:', e, info?.componentStack); }
    render() {
      if (this.state.e) {
        return React.createElement('pre', {
          style: { padding: 20, fontSize: 11, whiteSpace: 'pre-wrap', color: '#a83d20' }
        }, String(this.state.e?.message) + '\n\n' + (this.state.e?.stack || ''));
      }
      return this.props.children;
    }
  }

  function Site() {
    return React.createElement(React.Fragment, null,
      React.createElement('div', { className: 'app-mobile' },
        React.createElement(EB, null, React.createElement(window.MobileApp))),
      React.createElement('div', { className: 'app-desktop' },
        React.createElement(EB, null, React.createElement(window.DesktopApp)))
    );
  }

  let mounted = false;
  function tryMount() {
    if (mounted) return;
    if (!window.MobileApp || !window.DesktopApp || !window.RECIPES) return;
    mounted = true;
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Site));
    // Nascondi splash subito (non aspettare rAF — su alcuni runtime non scatta)
    setTimeout(function () {
      const s = document.getElementById('splash');
      if (s) { s.classList.add('hide'); setTimeout(function () { s.remove(); }, 350); }
    }, 0);
  }
  // Polling robusto — Babel può finire in qualsiasi ordine
  const iv = setInterval(function () {
    tryMount();
    if (mounted) clearInterval(iv);
  }, 50);
  // Fallback dopo 10s: se ancora non è partito mostra errore
  setTimeout(function () {
    if (!mounted) {
      console.error('Mount timeout. MobileApp=', typeof window.MobileApp, 'DesktopApp=', typeof window.DesktopApp);
      const s = document.getElementById('splash');
      if (s) s.querySelector('.sub').textContent = 'Errore di caricamento — controlla la console';
    }
  }, 10000);
})();
</script>

</body>
</html>
