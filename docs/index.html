cioccolato:"},{"type":"item","text":"400 g zucchero a velo"},{"type":"header","text":"per friggere:"},{"type":"item","text":"400 g cacao amaro"},{"type":"item","text":"200 g burro (a temperatura ambiente)"},{"type":"item","text":"pizzico vaniglia"},{"type":"item","text":"300 ml acqua"},{"type":"item","text":"500 g strutto"}],"directions":"Preparazione della pasta:\n\nVersare la farina a fontana sulla spianatoia.\n\nMettere al centro i tuorli d’uova, il rhum e lo strutto.\n\nIniziare ad impastare, raccogliendo via via la farina.\n\nLavorare energicamente l’impasto, fino ad ottenere una pasta consistente ed omogenea.\n\nFormare dei bastoncini della dimensione di un dito e tagliarli in pezzetti di 2 cm.\n\nVersare lo strutto in un tegame dai bordi alti e portarlo a temperatura.\n\nFriggere pochi dadini di pasta alla volta e, mescolando con cura, farli dorare a fuoco moderato, in modo che possano cuocere anche internamente.\n\nMano a mano che i dadini sono pronti, prenderli con una schiumarola forata e metterli a sgocciolare su carta assorbente da cucina.\n\nProseguire fino al termine dell’impasto.\n\nPreparazione della glassa al limone:\n\nSetacciare lo zucchero a velo.\n\nCon lo sbattitore elettrico montare a neve ben ferma gli albumi.\n\nContinuando a sbattere unire lo zucchero, il vermuth, il succo dei limoni e l’essenza.\n\nAmalgamare il tutto, fino ad ottenere una glassa morbida e bianchissima.\n\nPreparazione della glassa al cioccolato:\n\nStemperare lo zucchero, il burro ammorbidito, la vaniglia e il cacao in polvere con un po’ di acqua fredda, aggiunta agli altri ingredienti poco per volta, fino ad ottenere la densità desiderata.\n\nVersare il tutto in un pentolino e lasciare sobbollire, a fuoco lentissimo, per alcuni minuti.\n\nPreparazione della pignolata:\n\nDividere i pezzettini di pasta in due parti uguali.\n\nMescolare la glassa al limone con una delle due parti, facendo in modo che, scivolando tra i pezzettini di pasta, ne faccia un tutt’uno.\n\nA parte, mescolare accuratamente la glassa al cioccolato tiepida con l’altra metà dei pezzettini di pasta.\n\nIn un vassoietto rettangolare versare la pignolata ”bianca” accanto a quella “nera”, senza mischiare i due gusti.\n\nCon le mani bagnate dare al dolce la forma di una montagnola “bicolore”.\n\nSolidificando, le due parti del dolce si uniranno indissolubilmente tra loro.\n\nLasciare raffreddare in frigorifero.\n\nCURIOSITÀ:\n\nLa pignolata è il dolce più tipico della pasticceria messinese.\n\nIl termine “pignolata” deriva dalla particolare forma dei pezzetti di pasta, che, a fine preparazione, somigliano a mucchietti di piccole “pigne” , ricoperte di glassa “bianca” e “nera”.\n\nNei tempi antichi la pignolata veniva preparata in occasione del Carnevale. Oggi, invece, viene prodotta tutto l’anno.\n\nViene preparata nella caratteristica forma rettangolare ai due gusti, oppure in bicchieri monoporzione al gusto di limone o di cioccolato.","notes":"Tagliare i pezzetti di pasta non più grandi delle dimensioni indicate, dal momento che gonfiano durante la frittura.\nNel caso la glassa al limone risultasse troppo fluida, aggiungere ancora un po’ di zucchero.\nSe, invece, dovesse risultare troppo consistente, aggiungere un altro albume.\nLa glassa al cioccolato può essere preparata a freddo, evitando di porre il composto sul fuoco.","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"9A730B0D-2A74-4978-A72F-BF2B6B3054FF","name":"Piselli alla Francese","categories":["30 minuti"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"2 cespi lattuga (little gem o zuccherina)"},{"type":"item","text":"1 noce burro"},{"type":"item","text":"1 cucchiaio farina"},{"type":"item","text":"0,3 lt Brodo di pollo"},{"type":"item","text":"2 rametti menta (fresca)"},{"type":"item","text":"480 piselli surgelati"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"0858C39A-6A68-4D3D-B7F5-8625736BC7A9","name":"Pitoni alla Messinese di Natale","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per l'impasto:"},{"type":"item","text":"500 g pasta per pizza"},{"type":"header","text":"per il ripieno:"},{"type":"item","text":"500 g insalata scarola riccia (indivia)"},{"type":"item","text":"400 g pecorino pepato siciliano"},{"type":"item","text":"pepe nero macinato"},{"type":"item","text":"olio evo (per condire il ripieno)"}],"directions":"In una casseruola intiepidite 200 g di acqua nella quale diluirete lo zucchero ed il lievito rimescolando fino alla completa soluzione. Non scaldare troppo l’acqua in quanto una temperatura superiore a 30/35 gradi distrugge i fermenti del lievito rendendolo praticamente inefficace.\n\nSu un piano versate la farina mescolata con il sale e l'olio e disponetela in modo da formare un solco circolare dove verserete il lievito preparato precedentemente. Impastate fino a far assorbire tutto il liquido-\n\n\nContinuate ad impastare fino ad amalgamare il tutto. L’impasto deve restare morbido e non incollarsi alle mani. \n\nAggiustare se serve con acqua tiepida e/o farina quindi avvolgere l’impasto in un canovaccio e fatelo riposare per il tempo necessario a tagliare a cubetti il pecorino e sminuzzare in piccoli pezzi la scarola riccia (circa una mezz'ora).\n\nDisponete gli ingredienti in idonei contenitori a tenuti portata di mano aggiungendo un contenitore per il sale ed il pepe nero macinato. \n\nFormate 10 panetti di uguale peso senza impastare ulteriormente. \n\nSpolverare di farina il piano di lavoro in modo da non far attaccare il pitone\n\nSpianate con un mattarello un panetto fino a ridurlo ad una sfoglia di 2/3 mm circa di spessore. Deve risultare un cerchio di pasta della grandezza di un piccolo piatto.\n\nDisponete nel semicerchio inferiore 3 - 4 pezzettini di acciughe (se utilizzate), un ciuffo di scarola riccia, l’equivalente di 20 g. di pecorino tagliato a cubetti, un pizzico di sale e di pepe nero. Completate con un filo d'olio.\n\nRicoprite fino a far combaciare i bordi e pressate lungo la circonferenza con le dita (o con i rebbi della forchetta) per farli incollare tra di loro. \n\nDurante la preparazione del pitone è necessario disporre gli ingredienti senza sporcare con olio, farina i bordi che andranno sovrapposti al fine di permettere una perfetta saldatura per una buona riuscita.\n\nL’operazione va ripetuta per tutti i restanti panetti. \n\nImmergere in olio il pitone dopo almeno 5 minuti dalla preparazione per permettere il consolidamento della saldatura. \n\nFriggete in abbondante olio di semi bollente fino alla doratura. \n\nIl pitone, durante la frittura, deve galleggiare nell’olio; pertanto se non si dispone di una friggitrice si possono ottenere ottimi risultati utilizzando una casseruola di alluminio con bordi alti nella quale andrà versata una quantità di olio di semi tale da far galleggiare i pitoni (2 l circa). \n\nDisporre i pitoni fritti in posizione orizzontale e su della carta assorbente per distribuire uniformemente l’impasto interno e far assorbire l’eccesso di olio.","notes":"","rating":5,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"B978A78A-D2C4-4431-BC77-DC7B0A0E8D36","name":"Pitoni alla panzerotto","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per l'impasto:"},{"type":"item","text":"500 g pasta sfoglia"},{"type":"header","text":"per il ripieno:"},{"type":"item","text":"500 g pomodori"},{"type":"item","text":"400 g mozzarella"},{"type":"item","text":"pepe nero macinato"},{"type":"item","text":"olio evo (per condire il ripieno)"}],"directions":"In una casseruola intiepidite 200 g di acqua nella quale diluirete lo zucchero ed il lievito rimescolando fino alla completa soluzione. Non scaldare troppo l’acqua in quanto una temperatura superiore a 30/35 gradi distrugge i fermenti del lievito rendendolo praticamente inefficace.\n\nSu un piano versate la farina mescolata con il sale e l'olio e disponetela in modo da formare un solco circolare dove verserete il lievito preparato precedentemente. Impastate fino a far assorbire tutto il liquido-\n\n\nContinuate ad impastare fino ad amalgamare il tutto. L’impasto deve restare morbido e non incollarsi alle mani. \n\nAggiustare se serve con acqua tiepida e/o farina quindi avvolgere l’impasto in un canovaccio e fatelo riposare per il tempo necessario a tagliare a cubetti il pecorino e sminuzzare in piccoli pezzi la scarola riccia (circa una mezz'ora).\n\nDisponete gli ingredienti in idonei contenitori a tenuti portata di mano aggiungendo un contenitore per il sale ed il pepe nero macinato. \n\nFormate 10 panetti di uguale peso senza impastare ulteriormente. \n\nSpolverare di farina il piano di lavoro in modo da non far attaccare il pitone\n\nSpianate con un mattarello un panetto fino a ridurlo ad una sfoglia di 2/3 mm circa di spessore. Deve risultare un cerchio di pasta della grandezza di un piccolo piatto.\n\nDisponete nel semicerchio inferiore 3 - 4 pezzettini di acciughe (se utilizzate), un ciuffo di scarola riccia, l’equivalente di 20 g. di pecorino tagliato a cubetti, un pizzico di sale e di pepe nero. Completate con un filo d'olio.\n\nRicoprite fino a far combaciare i bordi e pressate lungo la circonferenza con le dita (o con i rebbi della forchetta) per farli incollare tra di loro. \n\nDurante la preparazione del pitone è necessario disporre gli ingredienti senza sporcare con olio, farina i bordi che andranno sovrapposti al fine di permettere una perfetta saldatura per una buona riuscita.\n\nL’operazione va ripetuta per tutti i restanti panetti. \n\nImmergere in olio il pitone dopo almeno 5 minuti dalla preparazione per permettere il consolidamento della saldatura. \n\nFriggete in abbondante olio di semi bollente fino alla doratura. \n\nIl pitone, durante la frittura, deve galleggiare nell’olio; pertanto se non si dispone di una friggitrice si possono ottenere ottimi risultati utilizzando una casseruola di alluminio con bordi alti nella quale andrà versata una quantità di olio di semi tale da far galleggiare i pitoni (2 l circa). \n\nDisporre i pitoni fritti in posizione orizzontale e su della carta assorbente per distribuire uniformemente l’impasto interno e far assorbire l’eccesso di olio.","notes":"","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"C560EE46-C1C7-4B48-9E8C-72BF793BAFED","name":"Pitoni fritti alla Messinese","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per l'impasto:"},{"type":"item","text":"500 g farina di semola (di prima macina)"},{"type":"item","text":"1 cubetto lievito di birra"},{"type":"item","text":"1 cucchiaino sale"},{"type":"item","text":"1 cucchiaino zucchero"},{"type":"item","text":"2 cucchiai olio"},{"type":"header","text":"per il ripieno:"},{"type":"item","text":"500 g insalata scarola riccia (indivia)"},{"type":"item","text":"200 g pecorino pepato siciliano"},{"type":"item","text":"pepe nero macinato"},{"type":"item","text":"200 cl olio di semi (di buona qualità)"},{"type":"item","text":"olio evo (per condire il ripieno)"},{"type":"item","text":"50 g acciughe salate (facoltativo)"}],"directions":"In una casseruola intiepidite 200 g di acqua nella quale diluirete lo zucchero ed il lievito rimescolando fino alla completa soluzione. Non scaldare troppo l’acqua in quanto una temperatura superiore a 30/35 gradi distrugge i fermenti del lievito rendendolo praticamente inefficace.\n\nSu un piano versate la farina mescolata con il sale e l'olio e disponetela in modo da formare un solco circolare dove verserete il lievito preparato precedentemente. Impastate fino a far assorbire tutto il liquido-\n\n\nContinuate ad impastare fino ad amalgamare il tutto. L’impasto deve restare morbido e non incollarsi alle mani. \n\nAggiustare se serve con acqua tiepida e/o farina quindi avvolgere l’impasto in un canovaccio e fatelo riposare per il tempo necessario a tagliare a cubetti il pecorino e sminuzzare in piccoli pezzi la scarola riccia (circa una mezz'ora).\n\nDisponete gli ingredienti in idonei contenitori a tenuti portata di mano aggiungendo un contenitore per il sale ed il pepe nero macinato. \n\nFormate 10 panetti di uguale peso senza impastare ulteriormente. \n\nSpolverare di farina il piano di lavoro in modo da non far attaccare il pitone\n\nSpianate con un mattarello un panetto fino a ridurlo ad una sfoglia di 2/3 mm circa di spessore. Deve risultare un cerchio di pasta della grandezza di un piccolo piatto.\n\nDisponete nel semicerchio inferiore 3 - 4 pezzettini di acciughe (se utilizzate), un ciuffo di scarola riccia, l’equivalente di 20 g. di pecorino tagliato a cubetti, un pizzico di sale e di pepe nero. Completate con un filo d'olio.\n\nRicoprite fino a far combaciare i bordi e pressate lungo la circonferenza con le dita (o con i rebbi della forchetta) per farli incollare tra di loro. \n\nDurante la preparazione del pitone è necessario disporre gli ingredienti senza sporcare con olio, farina i bordi che andranno sovrapposti al fine di permettere una perfetta saldatura per una buona riuscita.\n\nL’operazione va ripetuta per tutti i restanti panetti. \n\nImmergere in olio il pitone dopo almeno 5 minuti dalla preparazione per permettere il consolidamento della saldatura. \n\nFriggete in abbondante olio di semi bollente fino alla doratura. \n\nIl pitone, durante la frittura, deve galleggiare nell’olio; pertanto se non si dispone di una friggitrice si possono ottenere ottimi risultati utilizzando una casseruola di alluminio con bordi alti nella quale andrà versata una quantità di olio di semi tale da far galleggiare i pitoni (2 l circa). \n\nDisporre i pitoni fritti in posizione orizzontale e su della carta assorbente per distribuire uniformemente l’impasto interno e far assorbire l’eccesso di olio.","notes":"","rating":1,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"9F0BB419-8DC2-4381-8730-A173C66D738C","name":"Pollo al vino","categories":["Pollo"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 pollo (da circa 1,2 kg, pulito ed eviscerato)"},{"type":"item","text":"3 dl vino rosso secco"},{"type":"item","text":"1 cucchiaio zucchero di canna"},{"type":"item","text":"16 cipolline"},{"type":"item","text":"100 g pancetta (tagliata a dadini)"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"1 mazzetto guarnito"},{"type":"item","text":"20 funghi champignon (divisi a metà)"},{"type":"item","text":"1 noce burro"},{"type":"item","text":"1 bicchiere brandy (anche cognac)"},{"type":"item","text":"30 g Roux"},{"type":"item","text":"0,2 lt Brodo di pollo"}],"directions":"Dividete il pollo in 8 parti e rosolatele in una casseruola a fuoco vivo in 1 noce di burro per 3'.\n\nFlambate con 1 bicchiere di brandy e aggiungete 3 dl di vino rosso senz'alcol. Per tradizione, francese, sarebbe perfetto del pinot nero\n\nAggiungete il brodo di pollo, lo zucchero di canna, le cipolline, la pancetta, l'aglio, i funghi ed il mazzetto guarnito.\n\nMettete il coperchio e cuocete a fuoco dolcissimo per circa un'ora, più o meno, dipende da quanto è ruspante il pollo.\n\nAlla fine togliete il mazzetto, unite il roux e cuocete ancora per 3'.\n\nIn alternativa all'aggiunta del roux, i pezzi del pollo possono essere infarinati prima della rosolatura. In questo caso basta aggiungere anche un altro bicchiere di brodo.\n\nRegolate di sale e pepe.","notes":"","rating":3,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"1F31C14A-11D2-4AA5-94CA-97DFBA57F498","name":"Pollo alla Mascalzona","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per il pollo:"},{"type":"item","text":"4 petti di pollo (da circa 180 gr l'uno)"},{"type":"item","text":"1 cucchiaino miele (liquido)"},{"type":"item","text":"2 rametti rosmarino"},{"type":"item","text":"2 rametti coriandolo (fresco, oppure prezzemolo)"},{"type":"header","text":"per la salsa:"},{"type":"item","text":"4 cipollotti"},{"type":"item","text":"1 mazzetto timo (fresco)"},{"type":"item","text":"3 foglie alloro (fresco)"},{"type":"item","text":"chiodi di garofano (in polvere)"},{"type":"item","text":"noce moscata (in polvere)"},{"type":"item","text":"peperoncino (in polvere)"},{"type":"item","text":"6 cucchiai rhum chiaro"},{"type":"item","text":"6 cucchiai aceto di vino bianco"},{"type":"item","text":"1 cucchiaio miele (liquido)"},{"type":"item","text":"1 peperoncino (Scotch Bonnet)"},{"type":"item","text":"4 spicchi aglio"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"D8300A39-A22A-4374-BECF-6EC60F59408F","name":"Pollo Arrosto","categories":["Pollo"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per l'arrosto:"},{"type":"item","text":"1.5 kg pollo (possibilmente da allevamento all'aperto biologico)"},{"type":"item","text":"2 cipolle (medie dimensioni)"},{"type":"item","text":"2 carote"},{"type":"item","text":"2 gambi di sedano"},{"type":"item","text":"1 testa aglio"},{"type":"item","text":"1 mazzetto timo (oppure anche rosmarino, alloro, o salvia od un misto)"},{"type":"item","text":"olio di oliva"},{"type":"item","text":"sale"},{"type":"item","text":"pepe nero"},{"type":"header","text":"per servire:"},{"type":"item","text":"Sugo d'arrosto"},{"type":"item","text":"Salse per l'arrosto"},{"type":"item","text":"Patate, Pastinache e Carote arrostite"}],"directions":"Tirate fuori il pollo dal frigo 30 minuti prima che debba andare in forno. Scaldate il forno a 240°. Non c'è bisogno di pelare le verdure: passatele sotto l'acqua e tagliatele grossolanamente. Dividete l'aglio in spicchi, senza pelarli. Ammucchiate le verdure, l'aglio e e le erbe nel centro di una grossa teglia e spruzzatele d'olio d'oliva.\n\nCospargete d'olio d'oliva il pollo e conditelo bene con sale e pepe, strofinandolo uniformemente. Usando la punta di un coltello affilato punzecchiate uniformemente il limone (se avete il forno a microonde mettetecelo per 40°, sprigionerà tutto il suo profumo). Infilate il limone ed il mazzetto di erbe aromatiche nella cavità del pollo.\n\nAppoggiate il pollo nella teglia sopra lo strato di verdure e mettetelo in forno. Abbasssate subito la temperatura portandola a 200° e cuocete per un ora e 20 minuti. Se volete preparare anche patate e verdure arrosto, è ora di mettersi sotto con quelle, in modo da metterle in forno per l'ultima ora di cottura del pollo.\n\nA metà cottura, bagnate il pollo con il suo stesso suco e, se vi sembra che le verdure si stiano sciugando troppo, aggiungete una spruzzata d'acqua per evitare che brucino. Quando il pollo è cotto al punto giusto, tirate fuori la teglia dal forno e mettetelo a riposare su un tagliere per circa 15 minuti. Coprite il vostro pollo arrosto con un foglio d'alluminio e un canovaccio da cucina e intanto iniziate a preparare il sugo e la salsa da voi scelta.\n\nTogliete dal pollo eventuali pezzi di spago e staccategli le ali (spezzettatele e aggiungetele al sughetto per insaporirlo ancora di più). Praticate un taglio tra la coscia ed il petto. Incidete l'articolazione e staccate la coscia. Fate lo stesso dall'altra parte, poi separate le cosce dalle sovraccosce, così vi ritroverete con quattro porzioni di carne scura. Trasferitele su un piatto da portata.\n\nOra potete tagliare più comodamente il resto del pollo. Incidete diagonalmente il petto e tagliatene via una parte, poi l'altra. Quando arrivate ai punti più difficili da raggiungere, basta che li spolpiate con le dita- Alla fine dovreste ritrovarvi con una carcassa perfettamente spolpata ed un piatto pieno di carne deliziosa che potete servire con il sughetto caldissimo, le verdure arrostite e la salsa da voi scelta a parte.","notes":"","rating":4,"source":"Jamie Oliver","source_url":"","has_photo":true,"favorites":false},{"uid":"5996E805-97AB-4C27-A399-0B1F2E83DA79","name":"Polpettone alla messinese","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per l'Impasto base:"},{"type":"item","text":"800 g polpa di vitellone macinata"},{"type":"item","text":"5 fette pane raffermo"},{"type":"item","text":"100 g pecorino pepato siciliano (grattugiato)"},{"type":"item","text":"1 bicchiere latte (anche acqua)"},{"type":"item","text":"2 uova intere"},{"type":"item","text":"prezzemolo (tritato)"},{"type":"item","text":"1 aglio"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"},{"type":"header","text":"per il ripieno:"},{"type":"item","text":"3 uova sode"},{"type":"item","text":"100 g salame (a mio gusto anche meno (50/60 gr))"},{"type":"item","text":"100 g provola dolce (a dadini)"},{"type":"header","text":"per la salsa:"},{"type":"item","text":"1 cipolla bionda (grande)"},{"type":"item","text":"1,5 lt passata di pomodoro"},{"type":"item","text":"1 lt olio per friggere"}],"directions":"Mettere il pane in una tazza con il latte per ammorbidirlo.\n\nRaccogliere in una terrina la carne, le uova, l'aglio ed il prezzemo lo tritato. Salare, pepare e quindi lavorare il composto con le mani per qualche minuto in modo da ottenere un impasto più possibile omogeneo.\n\nStrizzare il pane e unirlo all'impasto di carne amalgamandolo bene.\n\nSuddividere l'impasto in parti uguali per preparare il numero di polpettoni desiderati.\n\nTagliare le uova sode a pezzetti ed il salame e la provola a dadini.\n\nPrendere una delle dosi di carne e lavorarla in modo da formare una coppetta, all'interno della quale si metteranno dei pezzetti di uova e dei dadini di salame e provola.\n\nChiudere il polpettone rivolgendo i bordi della coppetta verso l'interno e girarlo tra le mani per sigillarlo bene.\n\nProcedere in questo modo fino ad esaurire gli ingredienti.\n\n\nIn una pentola scaldare l'olio per friggere e rosolarvi i polpettoni.\n\nGirare i polpettoni su ogni lato facendo attenzione a non romperli o farli aprire.\n\nIn una pentola di altezza opportuna dorare la cipolla ed aggiungere la passata di pomodoro.\n\nAdagiare i polpettoni nella salsa e cuocere a fuoco moderato per circa 20/30 minuti.\n\nLasciar riposare qualche minuto e servire i polpettoni tiepidi con la loro salsa a parte.","notes":"Faro Rosso DOC\n\nLi ho cucinati seguendo la ricetta ma non friggendo i polpettoni prima di cuocerli nel sugo. Li ho soltanto brasati in una pentola con poco olio. Non credo questo tolga nulla al sapore, ma rende molto difficile mantenerne la forma perfettamente rotonda e si rischia facilmente di romperli. Questo in particolare se si mettono tutti assieme in una grande padella, dove poi si girano con difficoltà. Perciò, non volendo friggerli, sarà oppurtuno brasarne pochi per volta facendoli rotolare con grande delicatezza ma continuamente per mantenere la forma.\n\nDopo tanti anni rimangiarli è stato davvero emozionante. Li ho preparati utilizzando della salsa di pomodoro (non quella del ragù): sono venuti veramente molto buoni. Ho trovato troppo abbondante il salame, che ridurrei a massimo 50/60 gr.","rating":4,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"2AF51ECA-A5EA-44BC-BF84-DDA3C6C3BB0C","name":"Pomodori ripieni al forno","categories":["Messinese"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 kg pomodori (san marzano o costoluti)"},{"type":"item","text":"50 g capperi"},{"type":"item","text":"250 g Pangrattato condito alla Messinese"},{"type":"item","text":"50 g olive nere"},{"type":"item","text":"basilico (per guarnire)"},{"type":"item","text":"olio evo"}],"directions":"Lavare i pomodori e tagliarli a metà nel senso della lunghezza. Eventualmente, si possono tagliare i costoluti in orizzontale scartando la parte superiore.\n\nScavarli avendo cura di togliere tutti i semi e l'acqua di vegetazione.\n\nLavare sotto l'acqua corrente i capperi per desalarli.\n\nIn una ciotola mettere il pangrattato condito, aggiungere i capperi e le olive versando per ultimo l'olio fino a formare un composto umido ma non bagnato.\n\nRiempire con questo condimento uno per uno i pomodori.\n\nUngere il fondo di una teglia e disporvi i pomodori con la parte aperta verso l'alto.\n\nInfornare  a 180° per il tempo necessario per portare a cottura (mezz'ora circa), ovvero fino a che la superficie non si sarà raggrinzita.\n\nGuarnire con il basilico e servire ben caldi.","notes":"Li abbiamo preparati seguendo perfettamente la ricetta e partendo da dei pomodori tondi da insalata. Sono risultati molto buoni. Da provare anche aggiungendo anche un po' di formaggio (anche lo stesso pecorino pepato siciliano) e salando preventivamente i pomodori (magari lasciandoli perdere un po' della loro acqua). Buona l'idea di cuocere in forno, ma separati, anche i tappi (ricavati dal quarto superiore del pomodoro), da rimettere sopra una volta tolti dal forno. La cottura (30 minuti a 200°) andava bene, meglio però mantenerla a 180° come da ricetta.","rating":4,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"A59C4642-E614-400C-BC88-82F43B2BFCD9","name":"Puré Di Patate","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"Il purè di patate (o purea di patate) è una ricetta classica e un gustoso contorno, di larga diffusione anche all’estero, che può accompagnare moltissimi piatti, come arrosti, cotolette, scaloppine, pesce… \n\nDi facile preparazione, è un piatto a base di patate lessate e schiacciate con l’aggiunta di burro e latte che piace molto anche ai bambini per la sua gustosità e delicatezza e ben si presta ad affiancare numerose preparazioni: bisogna però fare particolare attenzione a non abusarne, poiché è una pietanza discretamente calorica!","ingredients":[{"type":"item","text":"1 kg patate (bianche farinose)"},{"type":"item","text":"300 ml latte fresco"},{"type":"item","text":"80 g burro"},{"type":"item","text":"q.b. noce moscata"},{"type":"item","text":"q.b. sale"}],"directions":"Procuratevi delle patate della stessa dimensione, meglio se non molto grosse (se lo sono, dividetele a metà), lavatele molto bene sotto l’acqua corrente (1), e lessatele con tutta la buccia in acqua salata (2) per circa 40-45 minuti, a seconda della grandezza.  Accertatevi dell’avvenuta cottura punzecchiandole con un forchettone (3), e poi scolatele.\n\n Sbucciate le patate ancora calde (4-5), poi riducetele a tochetti e passatele nel passaverdure (6) o nello schiacciapatate, facendo ricadere la purea nello stesso tegame ancora caldo nel quale le avete lessate.\n\n Mettete il tegame sul fuoco bassissimo, tanto per mantenerlo caldo, e, sempre mescolando con un cucchiaio di legno, aggiungete il burro a pezzetti (7), e poco alla volta il latte bollente (8), finchè otterrete un purè liscio, gonfio e omogeneo (non deve risultare liquido, regolatevi con il latte!). Aggiustate di sale, e unite una grattatina di noce moscata (9), mescolate di nuovo, poi togliete il recipiente dal fuoco e servite immediatamente.","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"D17FBB32-0DED-480A-B178-8D0BBD02A35D","name":"Puré di Piselli \"A Modo Mio\"","categories":["30 minuti"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g piselli surgelati"},{"type":"item","text":"4 patate (medie, da forno)"},{"type":"item","text":"1 cespo broccoli"},{"type":"item","text":"1 noce burro (abbondante)"},{"type":"item","text":"2 cucchiaini Salsa di menta"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"E3AC6FAC-2839-490B-8669-EACCF4845751","name":"Ragout di pesce","categories":[],"servings":"8 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"8 kg Pesce (Pesce misto, sfilettato)"},{"type":"item","text":"100 g Soffritto di cipolle"},{"type":"item","text":"1 dl Fondo di pesce"}],"directions":"","notes":"","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"A97C2945-3B35-4EE5-88ED-46488A009F9B","name":"Ragu alla Messinese","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 kg lacerto"},{"type":"item","text":"500 g cipolle"},{"type":"item","text":"1 bicchiere vino rosso secco"},{"type":"item","text":"1 kg passata di pomodoro"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"}],"directions":"Preparare il lacerto in un unico pezzo, legandolo con spago da cucina.\n\nVersare 4 cucchiai di olio in un tegame e rosolare la carne.\n\nSfumare con il vino rosso e lasciarlo evaporare.\n\nA parte, rosolare in poco olio le cipolle affettate.\n\nUnire la passata di pomodoro e lasciare cuocere.\n\nQuando le cipolle diventeranno morbide, unirle alla carne.\n\nInsaporire il tutto con una spolverata di pepe nero macinato al momento.\n\nFare cuocere, a fuoco medio e a tegame coperto, per circa 90 minuti .\n\nA cottura ultimata, aggiustare di sale e di pepe.\n\nTogliere, quindi, la carne dal tegame e tenerla in caldo.\n\nAlzare la fiamma sotto al tegame e lasciare restringere il sugo.\n\nIntanto, affettare la carne e disporla su un piatto da portata caldo.\n\nAppena la salsa si sarà addensata, servire la carne e condire con la salsa.","notes":"La salsa del ragu diventa fondamentale per molti altri piatti tipici, come le pasta incaciata, le polpette, i polpettoni e per condire la pasta in generale.\nIl nonno Stefano lo usava sui maccheroni.\n\nL'ho fatta usando un pezzo di \"polpa sceltissima\", che poi per errore ho cotto troppo (credo almeno due ore). Il sugo era eccellente, mentre la carne è risultata troppo asciutta. Da riprovare con del lacerto (cercando magatello come si chiama qui a Milano) per ritrovare la stessa estrema morbidezza che ricordo in quello fatto dal nonno (e dalla mamma) e la consistenza perfettamente fresca, non stopposa. Papà e Stefano ricordano venisse utilizzato il cimalino. Da verificare.","rating":5,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"ECE3F9BB-97B1-4A1D-8735-BC4F7F20FA1B","name":"Ragù di Carne","categories":["Ricette base"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g carne mista (manzo, vitello, maiale)"},{"type":"item","text":"1 noce burro"},{"type":"item","text":"250 g Soffritto all'italiana con pancetta"},{"type":"item","text":"1 bicchiere vino rosso secco (meglio senz'alcool)"},{"type":"item","text":"1 punta concentrato di pomodoro"},{"type":"item","text":"Brodo di manzo (facoltativo)"},{"type":"item","text":"prezzemolo"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"},{"type":"item","text":"noce moscata (facoltativo)"}],"directions":"Tagliare a dadini piccoli con un coltello pesante la carne.\n\nScaldare una noce di burro e far saltare la carne per 4 minuti.\n\nUnire il soffritto, il vino ed il concentrato di pomodoro.\n\nCuocere a fuoco dolce per 20 minuti, non di più. Eventualmente aggiungere del brodo se si asciugasse troppo.\n\nAlla fine spolverare con una manciata di prezzemolo e regolare di sale e pepe.","notes":"Buonissimo anche con l'aggiunta di un po' di noce moscata.","rating":4,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"2C722DAB-1DD1-48CB-8493-985D176F12DA","name":"Ragù Napoletano","categories":["Ricette base"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per la prima fase di preparazione:"},{"type":"item","text":"100 g prosciutto crudo (possibilmente grasso)"},{"type":"item","text":"50 g pancetta tesa affumicata"},{"type":"item","text":"1 ciuffo prezzemolo"},{"type":"item","text":"pepe"},{"type":"header","text":"per la seconda fase:"},{"type":"item","text":"1,5 kg primo taglio di manzo (noce (pezza a cannello) o magatello (lacerto))"},{"type":"item","text":"400 g tracchiolelle (puntine) di maiale (facoltativo)"},{"type":"item","text":"500 g cipolle (vecchie)"},{"type":"item","text":"100 g strutto"},{"type":"item","text":"50 g lardo"},{"type":"item","text":"1 bicchiere olio evo"},{"type":"item","text":"50 g pancetta tesa affumicata"},{"type":"item","text":"300 ml vino rosso secco"},{"type":"item","text":"100/300 g concentrato di pomodoro"},{"type":"item","text":"1 1/2 lt passata di pomodoro (o 1 kg. e mezzo di pomidoro tipo Roma o san Marzano sbollentati pelati e passati al passaverdure a buchi fitti.)"},{"type":"item","text":"sale"}],"directions":"Lardellate la carne con il prosciutto, la pancetta, il prezzemolo ed il pepe e legatela bene.\n\nTritate grossolanamente , usando un affilatissimo coltello o una lama a mezza luna, su un tagliere di legno prima il lardo e, via via la rimanente pancetta, e le cipolle. Si può anche usare un tritacarne per questa operazione, sarà un’operazione più rapida, ma la sconsiglio; infatti c'e il rischio di perdere il succo e con esso l’aroma delle cipolle.\n\nPonete tutto il trito nella casseruola possibilmente di coccio o di rame stagnato, insieme allo strutto ed all'olio e, a fuoco bassissimo, riscaldate fino a quando lo strutto sarà fuso e la cipolla comincerà appena a soffriggere. Aggiungete la carne e, per chi vuole seguire la variante, le puntine (tracchiolelle) di maiale.\n\nCoprite e lasciate rosolare , sempre a fuoco bassissimo, rivoltando frequentemente le carni.\n\nAttenzione! Le puntine di maiale cuociono molto prima, quindi potrebbe essere necessario toglierle per qualche tempo dalla pentola.\n\nQuando le cipolle cominciano a prendere colore, scoprite, mescolate e rivoltate la carne più spesso, aggiungendo poco per volta il vino che dovrà evaporare tutto. Fatto questo, le cipolle saranno ormai ben rosolate, ogni traccia di liquido sarà sparita e non rimarrà che il grasso che sobbolle lentamente.\n\nQuesta prima fase vi vedrà impegnati per circa 2 - 2,5 ore. Durante tutto questo tempo non è consigliabile allontanarsi dai fornelli: le cipolle potrebbero bruciare, rovinando tutto.\n\nSeconda fase\n\nAumentate, ma di poco, il fuoco, per dargli un po' di forza, ma non molta: appena sufficiente ad accogliere gli altri ingredienti che sono freddi.\n\nAggiungete non più di due o tre cucchiai di concentrato di pomodoro e fatelo soffriggere, fino a quando non diventa scurissimo.Fate molta attenzione: il concentrato deve sciogliersi nel grasso, prendendo sì colore, ma non bruciare!\n\nSolo a questo punto va aggiunto tutto l’altro concentrato, sempre nelle stesse quantità, e così via, sempre con la stessa procedura, finché non l'avrete terminato.\n\nDurante questa fase sicuramente le puntine (tracchiolelle) di maiale saranno cotte e vanno tolte delicatamente, per evitare che si spacchino aprendosi e disfacendosi.\n\nQuesta seconda fase (ancor più delicata della prima perché dovrete controllare la cottura della carne e perché si corre il rischio che il pomodoro si attacchi) vi impegnerà per altre 2 o 3 ore.\n\nA questo punto aggiungete tutto il passato di pomodoro,un po’ di sale le foglie di basilico spezzettate a mano e non più di un mestolo d'acqua,e a pentola scoperta lasciate prima cuocere per circa un’ora e poi, incoperchiando come suggerito, lasciate peppiare (cuocere a fuoco bassissimo) per almeno un'ora e mezzo.\n\nSe non l'avete già fatto, togliete tutta la carne e disponetela in un piatto: la rimetterete nel sugo a fine cottura.\n\nLa salsa sarà cotta quando vi apparirà densa, lucida, scurissima ed untuosa.\n\nVerificate il sale, non dovrebbe essere necessario aggiungerne, rimettete la carne in casseruola e lasciate riprendere il bollo per pochi minuti.\n\nDato il tempo di preparazione (almeno 7 ore) vi suggerisco di preparare il ragú il sabato, trasferendolo alla fine della cottura dalla pentola in una zuppiera di coccio o porcellana. Inoltre, lasciandolo riposare, il ragú matura e risulterà ancora piú gustoso.\n\nQuesta salsa va usata per condire 6 o 7 etti di maccheroni di zite spezzettati a mano in pezzi da 4 o 5 cm. cadauno.\n\nSpolverare le porzioni impiattate con abbondante grana o (meglio ancora!) pecorino grattugiati e profumato pepe nero.\n\nServire come pietanza la carne affettata coperta con qualche cucchiaio di salsa.\n\nNote: Il ragù si serve, quasi esclusivamente con la pasta grossa: maccheroni di zitespezzati a mano, ma si possono usare anche rigatoni, maltagliati rigati. Ottimi Noi i paccheri, magari imbottiti con ricotta di pecora ma difficilmente si posson trovare.\n\nDopo un congruo piatto di ziti a ragú si può anche non mangiare altro, fatta eccezione, come detto, per la carne del ragú, con un contorno di verdura cotta; a Napoli si usano i friarielli(sorta di tenerissime cime di rapa, da soffriggere a crudo in padella con aglio, olio e peperoncino) che altrove non esistono., per cui si possono sostituire con bietole, spinaci o patate stufate.","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"1A47D2C3-E862-40E5-9491-2478FD667D46","name":"Red Lentil Soup","categories":[],"servings":"Makes about 7 cups","prep_time":"","cook_time":"","total_time":"40 min","description":"","ingredients":[{"type":"item","text":"1 1/2 tablespoons olive oil"},{"type":"item","text":"1 large onion (chopped)"},{"type":"item","text":"3 garlic cloves (chopped)"},{"type":"item","text":"2 carrots (chopped (1 cup))"},{"type":"item","text":"1/2 cup chopped fresh or canned tomato"},{"type":"item","text":"1 celery rib (chopped)"},{"type":"item","text":"1 1/4 teaspoons ground cumin"},{"type":"item","text":"1/2 teaspoon salt"},{"type":"item","text":"1 cup dried red lentils"},{"type":"item","text":"4 cups water"},{"type":"item","text":"1 1/2 cups chicken broth"},{"type":"item","text":"2 tablespoons chopped fresh parsley"}],"directions":"Heat oil in a 4- to 5-quart heavy saucepan over moderately high heat until hot but not smoking, then sauté onion, stirring, until golden, about 5 minutes. Add garlic, carrots, tomato, celery, cumin, and salt and sauté, stirring, 2 minutes. Add lentils, water, and broth and simmer, uncovered, stirring occasionally, until lentils are tender, about 20 minutes.\n\nStir in parsley, then season with salt and pepper.","notes":"","rating":0,"source":"Epicurious.com","source_url":"","has_photo":true,"favorites":false},{"uid":"0F0975A1-137D-45DB-9940-F75C39B7FAD0","name":"Rigatoni al ragout di pesce","categories":[],"servings":"2 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"200 g rigatoni"},{"type":"item","text":"Ragout di pesce"}],"directions":"","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"08AFB063-C55A-417D-8ABE-13215E68D599","name":"Rigatoni Col Sugo Dell’agglassato","categories":[],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 kg girello intero"},{"type":"item","text":"1 kg cipolle (o più, saporite (dipende anche dalla quantità di pasta da calare))"},{"type":"item","text":"vino marsala secco"},{"type":"item","text":"olio evo"},{"type":"item","text":"burro"},{"type":"item","text":"pepe"},{"type":"item","text":"sale"}],"directions":"Prima di tutto affettate le cipolle grossolanamente. \n\nIn una casseruola abbastanza grande ponete il girello e copritelo d’acqua, olio extravergine d'oliva abbondantissimo, sale, pepe e tutte le cipolle. \n\nQuando raggiunge l’ebollizione, moderate la fiamma e fate cuocere cosi’, a fuoco lento, finchè il sugo non si riduce. In una padella grande e con i bordi alti sciogliete una generosa quantità di burro e rosolate bene la carne. \n\nQuando la carne assume un bel colore dorato, sfumate con il marsala e fatelo evaporare. Adesso, con la schiumarola, travasate a poco a poco le cipolle dalla prima casseruola alla seconda, facendo in modo di schiacciarle bene , in modo da far trapelare il succo. \n\nVersate sulla carne tutto il brodo restante e fate addensare la glassa sino a che diventa cremosa, stando molto attenti che non si attacchi! L’antico uso prevedeva di servirlo con pisellini cotti a parte e patate tagliate a cubetti, fritte e fatte insaporire con la salsa glassata.\n\nMettete da parte un po’ di sugo e condite 500 gr di rigatoni. \n\nServite con una spolverata di parmigiano.","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"2139101B-8315-46DF-A265-0095F38BA5BC","name":"Ristretto di zucca con polpettine speziate","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"650 g zucca"},{"type":"item","text":"250 g ricotta romana"},{"type":"item","text":"1 uovo"},{"type":"item","text":"30 ml brandy"},{"type":"item","text":"1 peperoncino"},{"type":"item","text":"4 bacche cardamomo"},{"type":"item","text":"1 foglia alloro"},{"type":"item","text":"2 bacche ginepro"},{"type":"item","text":"1/2 cipolla"},{"type":"item","text":"farina (qb)"},{"type":"item","text":"sale e pepe (qb)"}],"directions":"","notes":"","rating":0,"source":"Cucchiaio d'argento","source_url":"","has_photo":true,"favorites":false},{"uid":"07C30B69-6E55-40B8-8D41-09F95697DCB0","name":"Roast Beef al Sale","categories":["Manzo"],"servings":"8 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"2 kg costata di manzo (completa di costole)"},{"type":"item","text":"1 kg sale grosso"}],"directions":"Privare la costata del grasso esterno lasciando la fasciatura (o cosiddetto Cordone).\n\nLegare la carne con spago bagnato.\n\nAdagiarla con l'arco delle costole sopra una teglia asciutta.\n\nMettere il sale in una ciotola, inumidirlo con poca acqua metterlo prima sotto alla costata e poi sopra, pressandolo bene e formando uno strato di 1 cm circa.\n\nMettere la teglia in forno preriscaldato a 190° e far cuocere per circa 45-50 minuti.\n\nToglierla dal forno, farla riposare per almeno 15 minuti e staccare con un coltello a lama affilata, la carne dall'osso\n\nAffettarla finemente","notes":"Come variante può essere utilizzata anche la costata disossata.\n\nIl Roast beef cuoce 20 minuti di cottura per un kg di carne, e altri 10 minuti per ogni kg successivo.","rating":5,"source":"Altopalato","source_url":"","has_photo":true,"favorites":false},{"uid":"30116B8F-0CB6-43A2-9C56-1CAEECA6060C","name":"Roast-Beef","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"700 g filetto di manzo"},{"type":"item","text":"8 rametti rosmarino"},{"type":"item","text":"8 rametti salvia"},{"type":"item","text":"8 rametti timo"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"8DD78E19-EF05-4B9E-87D8-1916FDF13C6B","name":"Rotolo Di Vitello Ripieno Di Spinaci","categories":["Messinese"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1/2 kg spalla di vitello (in un unica fetta)"},{"type":"item","text":"4 uova"},{"type":"item","text":"1 cucchiaio parmigiano"},{"type":"item","text":"400 g spinaci"},{"type":"item","text":"80 g burro"},{"type":"item","text":"1 bicchiere vino bianco secco"},{"type":"item","text":"1 limone"},{"type":"item","text":"aglio"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"}],"directions":"Preparare una frittata sbattendo le uova, il formaggio, sale e pepe. \n\nPulire gli spinaci (in alternativa usare quelli surgelati) e, dopo averli fatti bollire, strizzarli e tritali, dopodiche' li farli saltare in una padella con olio ed aglio (che deve essere poi rimosso).\n\nStendere la fetta di vitello e schiacciarla con il batticarne per assottigliarla e allargarla un po'. \n\nPoggiarci sopra la frittata e aggiungere su di essa l' impasto di spianci. Arrotolare tutto ben stretto e legare il rotolo di carne ottenuto.\n\nFar rosolare il rotolo con l'olio in una pentola abbastanza capiente. Aggiungere il succo di limone e far cuocere a fuoco lento.\n\nDurante la cottura rigirare piu' volte il rotolo in modo che sia ben dorato su tutta la superficie e in modo che formi una bella crosticina. \n\nInnaffiare poi con il vino bianco. \n\nDopo qualche minuto abbassare la fiamma.\n\nCoprire e far cuocere a fuoco medio per un' altra mezz'ora.\n\nA cottura ultimata, quando si e' intiepidito, slegare il rotolo, affettarlo e, dopo averlo adagiato su di un piatto da portata, servirlo con il sughetto della cottura a parte.","notes":"Ottimo con la purea di patate","rating":0,"source":"Mamma","source_url":"","has_photo":true,"favorites":false},{"uid":"DD6A5609-7433-4C83-877E-F67310F08B6C","name":"Roux","categories":["Ricette base"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 parte burro"},{"type":"item","text":"1 parte farina tipo 00"}],"directions":"In una padellina antiaderente, sciogliete il burro ed aggiungete la farina ben setacciata.\n\nContinuate a rimestare con un cucchiaio di legno a fuoco dolcissimo.\n\nPer un roux chiaro togliere dal fuoco dopo 5 minuti, mentre se si desidera un roux più scuro, lasciare qualche minuto in più.\n\nSe volete ottenere un roux molto scuro senza far cuocere troppo al lungo (e bruciare) il burro, potete utilizzare della farina tostata a parte e scura al punto giusto.\n\nPer evitare grumi, unite sempre un roux caldo ad una preparazione fredda, od un roux freddo ad una preparazione calda.\n\nPer addensare si può usare, in sostituzione del roux, anche della fecola di patate o della maizena (amido di mais), da stemperare in un liquido freddo prima di essere aggiunte alle preparazioni.","notes":"","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"7F5AB40D-6217-4EE7-A2B4-DD31E1879837","name":"Salsa di Menta","categories":["Ricette base"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"foglie menta (fresca, una manciata)"},{"type":"item","text":"20 g zucchero cristallizzato"},{"type":"item","text":"2 cucchiai aceto di vino rosso"},{"type":"item","text":"sale"},{"type":"item","text":"pepe nero"}],"directions":"sbucciate le mele, privatele del torsolo e tagliatele grossolanamente in pezi di circa 2,5 cm. Grattugiate la scorza dell'arancia sopra un pentolino e spremeteci dentro il succo. Aggiungete il burro, lo zucchero e la cannella. Incorporate la noce moscata grattugiata ed i chiodi di garofano. In un pentolino far sciogliere il burro a fuoco dolce.\n\nMescolate finché il burro diventa spumoso, poi incorporateci i pezzi di mela. Coprite il pentolino con un coperchio e cuocete per 20-25 minuti a fuoco medio-basso mescolando di tanto in tanto fino ad ottenere una salsa mrbida ma con i pezzi. Assaggiate e, se serve, aggiungete un po' di zucchero. Servite la vostra salsa di mele tiepida o fredda....è una delizia in tutti e due i modi!\n\npelate e tritate finemente la mezza cipolla. Mettetela in un pentolino insieme al latte, all'alloro ed ai chiodi di garofano e fate andare a fuoco dolce. Lasciate sobbollire 10 minuti, poi togliete l'alloro ed i chiodi di garofano. Mettete il pane nel pentolino e fatelo sobbollire per 5 minuti, finché avrà assorbito tutto il latte, ammorbidendosi.\n\nIncorporate la senape a aggiustate di sale e pepe. Una volta finita, la salsa dovrebbe avere più o meno la consistenza di un semolino. Se la volete più densa, fatela cuocere un altro po'; se la volete più liquida, aggiungete un goccio d'acqua.\n\nmettete il rafano in una ciotola. Grattugiateci finemente il limone, poi tagliatelo a metà e spremeteci anche il succo. Aggiungete la crème fraîche, una bella spruzzata d'olio evo ed un pizzico di sale e pepe. \n\nMescolate bene il tutto. Assaggiate e, se serve, aggiungete un altro po' di rafano, sale o pepe.\n\nTritate finemente la menta e mettetela in una ciotola. Sciogliete lo zucchero in 100 ml d'acqua bollente e versatelo direttamente sulla menta. Aggiungete l'aceto: oltre a diluirla un po', darà alla salsa una bella scossa.\n\nAggiungete un pizzico di sale e pepe e bilanciate il sapore aggiungendo un pizzico di zucchero o un goccio d'aceto.","notes":"","rating":0,"source":"Jamie Oliver","source_url":"","has_photo":true,"favorites":false},{"uid":"C4839800-16D6-48FA-94BE-94978E454EE8","name":"Salsa Tartara","categories":["Ricette base"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"3 cetriolini sottaceto"},{"type":"item","text":"1 cucchiaino capperi (piccoli)"},{"type":"item","text":"1 mazzetto prezzemolo"},{"type":"item","text":"15 g filetti di acciughe sottolio"},{"type":"item","text":"1 limone"},{"type":"item","text":"200 g maionese (buona qualità)"},{"type":"item","text":"1 cucchiaio paprica dolce (per spolverare)"}],"directions":"","notes":"","rating":0,"source":"J
