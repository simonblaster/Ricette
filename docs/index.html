<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Le mie ricette</title>
<style>
:root{
  --bg:#faf7f2;--surface:#fff;--border:#e8e0d6;
  --text:#2c2412;--muted:#7a6a55;
  --accent:#c0674a;--accent2:#8b5a3c;
  --tag-bg:#f0e8df;--tag-color:#7a4a30;
  --shadow:0 2px 12px rgba(44,36,18,.10);
  --radius:14px;--font:'Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}

/* ── Header ── */
header{background:var(--accent);color:#fff;padding:1.5rem 1.25rem 1rem;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.18)}
header h1{font-size:1.5rem;font-weight:700;letter-spacing:.02em;margin-bottom:.75rem}
header h1 span{font-size:.9rem;opacity:.75;font-weight:400;margin-left:.5rem}
.search-bar{display:flex;gap:.5rem;align-items:center}
.search-bar input{flex:1;padding:.55rem .9rem;border:none;border-radius:99px;
  font-size:.95rem;background:rgba(255,255,255,.18);color:#fff;outline:none}
.search-bar input::placeholder{color:rgba(255,255,255,.65)}
.search-bar input:focus{background:rgba(255,255,255,.28)}
#btn-favs{background:rgba(255,255,255,.18);border:none;border-radius:99px;
  padding:.5rem .85rem;color:#fff;cursor:pointer;font-size:.9rem;white-space:nowrap;transition:.2s}
#btn-favs.active,#btn-favs:hover{background:rgba(255,255,255,.35)}

/* ── Categorie ── */
.cats-bar{padding:.75rem 1.25rem;display:flex;gap:.5rem;overflow-x:auto;
  border-bottom:1px solid var(--border);background:var(--surface);
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cats-bar::-webkit-scrollbar{display:none}
.cat-chip{flex-shrink:0;padding:.35rem .85rem;border-radius:99px;border:1.5px solid var(--border);
  background:transparent;font-size:.82rem;cursor:pointer;color:var(--muted);
  transition:.18s;white-space:nowrap}
.cat-chip:hover{border-color:var(--accent);color:var(--accent)}
.cat-chip.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* ── Stats bar ── */
.stats-bar{padding:.5rem 1.25rem;font-size:.82rem;color:var(--muted);
  border-bottom:1px solid var(--border);background:var(--surface)}

/* ── Griglia ── */
main{padding:1.25rem;max-width:1400px;margin:0 auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
@media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr);gap:.75rem}}

/* ── Card ── */
.card{background:var(--surface);border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow);cursor:pointer;transition:.22s;border:1px solid var(--border)}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(44,36,18,.15)}
.card-photo{width:100%;aspect-ratio:4/3;object-fit:cover;background:#ede8e0;display:block}
.card-nophoto{width:100%;aspect-ratio:4/3;background:linear-gradient(135deg,#f0e8df 0%,#e8ddd2 100%);
  display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.card-body{padding:.7rem .8rem .8rem}
.card-name{font-size:.88rem;font-weight:600;line-height:1.3;margin-bottom:.4rem;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:.3rem}
.tag{font-size:.72rem;background:var(--tag-bg);color:var(--tag-color);border-radius:99px;padding:.15rem .55rem}
.card-stars{font-size:.75rem;color:#d4a017;margin-bottom:.25rem}
.fav-badge{float:right;font-size:.9rem}

/* ── Modale ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:.25s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;
  width:100%;max-width:680px;max-height:92vh;overflow-y:auto;
  transform:translateY(100%);transition:.3s cubic-bezier(.4,0,.2,1);padding:0 0 2rem}
.overlay.open .modal{transform:translateY(0)}
@media(min-width:600px){
  .overlay{align-items:center}
  .modal{border-radius:var(--radius);max-height:88vh}
}
.modal-photo{width:100%;max-height:280px;object-fit:cover;display:block}
.modal-nophoto{width:100%;height:160px;
  background:linear-gradient(135deg,#f0e8df 0%,#e8ddd2 100%);
  display:flex;align-items:center;justify-content:center;font-size:4rem}
.modal-content{padding:1.25rem 1.25rem 0}
.modal-name{font-size:1.3rem;font-weight:700;margin-bottom:.5rem;line-height:1.3}
.modal-meta{display:flex;flex-wrap:wrap;gap:.75rem;font-size:.82rem;color:var(--muted);margin-bottom:.75rem}
.modal-meta span{display:flex;align-items:center;gap:.25rem}
.modal-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.9rem}
.modal-desc{font-size:.9rem;color:var(--muted);margin-bottom:1rem;line-height:1.5;font-style:italic}
.modal-section{margin-bottom:1.2rem}
.modal-section h3{font-size:.95rem;font-weight:700;color:var(--accent2);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:.6rem;
  padding-bottom:.3rem;border-bottom:2px solid var(--tag-bg)}
.ing-header{font-size:.85rem;font-weight:700;color:var(--muted);
  margin:.6rem 0 .25rem;text-transform:uppercase;letter-spacing:.05em}
.ing-list{list-style:none}
.ing-list li{font-size:.9rem;padding:.2rem 0;border-bottom:1px solid var(--border);line-height:1.4}
.ing-list li:last-child{border-bottom:none}
.directions-text{font-size:.92rem;line-height:1.7;white-space:pre-wrap}
.notes-text{font-size:.88rem;line-height:1.6;color:var(--muted);
  background:var(--tag-bg);border-radius:8px;padding:.75rem 1rem;white-space:pre-wrap}
.source-link{font-size:.8rem;color:var(--accent);text-decoration:none;
  display:inline-flex;align-items:center;gap:.25rem;margin-top:.5rem}
.source-link:hover{text-decoration:underline}
.modal-close{position:sticky;top:0;z-index:10;width:100%;display:flex;
  justify-content:flex-end;padding:.75rem 1rem .5rem;background:var(--surface)}
.modal-close button{background:var(--tag-bg);border:none;border-radius:99px;
  width:2rem;height:2rem;font-size:1.1rem;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;justify-content:center}

/* ── Vuoto ── */
.empty{text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty .icon{font-size:3rem;margin-bottom:.75rem}
</style>
</head>
<body>

<header>
  <h1>Le mie ricette <span id="counter"></span></h1>
  <div class="search-bar">
    <input id="search" type="search" placeholder="🔍 Cerca ricetta…" autocomplete="off">
    <button id="btn-favs" title="Solo preferiti">⭐</button>
  </div>
</header>

<div class="cats-bar" id="cats-bar">
  <button class="cat-chip active" data-cat="" onclick="setCat('')">Tutte</button>
</div>

<div class="stats-bar" id="stats-bar"></div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="icon">🍽️</div>
    <p>Nessuna ricetta trovata.</p>
  </div>
</main>

<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <div class="modal-close"><button id="btn-close" aria-label="Chiudi">✕</button></div>
    <div id="modal-inner"></div>
  </div>
</div>

<script>
const RECIPES=[{"uid":"57ED77B7-D1F1-4186-B310-FF352FBCD14D","name":"Aggrassato In Bianco","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"In Sicilia “l’agglassato” viene chiamato “Aggrassato”.\nIl termine “Agglassato” fa riferimento al tipo di preparazione della ricetta. La glassa in questione viene data dalle cipolle che, a cottura ultimata, ormai ridotte in purea, avvolgono completamente la carne, cosi come in pasticceria una glassa ricopre interamente un dolce.","ingredients":[{"type":"item","text":"1 kg lacerto"},{"type":"item","text":"500 g cipolle"},{"type":"item","text":"1 bicchiere vino bianco secco"},{"type":"item","text":"olio evo"},{"type":"item","text":"Brodo di manzo"},{"type":"item","text":"sale"},{"type":"item","text":"pepe nero"}],"directions":"Preparare il lacerto in un unico pezzo, legandolo con spago da cucina.\n\nVersare 4 cucchiai di olio in un tegame e rosolare la carne.\n\nA parte, rosolare in poco olio le cipolle affettate.\n\nUnire un dito d’acqua e lasciare cuocere.\n\nQuando le cipolle diventeranno morbide, unirle alla carne.\n\nSfumare con il vino bianco e lasciarlo evaporare.\n\nInsaporire il tutto con una spolverata di pepe nero macinato al momento.\n\nAggiungere, poi, un po’ d’acqua calda ed il dado.\n\nFare cuocere, a fuoco medio e a tegame coperto, per circa 90 minuti .\n\nA cottura ultimata, aggiustare di sale e di pepe.\n\nTogliere, quindi, la carne dal tegame e tenerla in caldo.\n\nAlzare la fiamma sotto al tegame e lasciare restringere il sugo.\n\nIntanto, affettare la carne e disporla su un piatto da portata caldo.\n\nAppena il fondo di cottura si sarà addensato, schiacciarlo con il dorso di un cucchiaio, in modo da ottenere una crema.\n\nCoprire la carne con la purea di cipolle e servire.","notes":"In Sicilia “l’agglassato” viene chiamato “Aggrassato”.\nIl termine “Agglassato” fa riferimento al tipo di preparazione della ricetta. La glassa in questione viene data dalle cipolle che, a cottura ultimata, ormai ridotte in purea, avvolgono completamente la carne, cosi come in pasticceria una glassa ricopre interamente un dolce.\n\nIl sugo dell'aggrassato può essere utilizzato anche per condire delle mezze penne (rigate e non). \nIl nonno Stefano lo cuoceva talmente tanto che talvolta diventava un fondo di cottura marrone molto scuro.","rating":1,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"366D2BB1-2374-4D1A-9B54-6A2B95921ABF","name":"Arancini di riso al Ragu","categories":["Messinese"],"servings":"8 persone","prep_time":"","cook_time":"","total_time":"","description":"Lo stuzzicante profumo degli arancini, forse la più conosciuta specialità della rosticceria isolana, frammisto alle fresche e salse folate dello Stretto, saluta ogni nuovo visitatore nei confortevoli ristoranti o snack delle navi traghetto che fanno la spola tra Villa S. Giovanni e Messina. E' il primo saluto, quindi, della Sicilia per chi arriva in auto o col treno, ed il primo sapore, dove si possono riconoscere le seguenti influenze: quella araba, per aver fornito il riso e lo zafferano; la francese per il ragout; la spagnola per il pomodoro; e, prima ancora, la greca col canestrato fresco, il tenero formaggio che, a dadini, sarà frammisto al rag˘ nella farcia. Fino al secolo scorso gli arancini erano grandi come cocomeri, allorché a friggerli e ad infornarli erano i monaci del Convento dei Benedettini di Catania, come Federico De Roberto ci fa sapere nel suo romanzo storico I Vicere. Ora hanno la tendenza a diventare sempre più piccoli e si presentano appuntiti (quelli al ragù).","ingredients":[{"type":"item","text":"500 g riso vialone"},{"type":"item","text":"50 g farina"},{"type":"item","text":"1/2 bustina zafferano"},{"type":"item","text":"1 uovo"},{"type":"item","text":"80 g pecorino grattugiato"},{"type":"item","text":"50 g pangrattato"},{"type":"item","text":"olio di oliva"},{"type":"item","text":"sale e pepe"},{"type":"header","text":"per la farcitura (ragù):"},{"type":"item","text":"250 g polpa di carne trita (Se si utilizza, mettere solo poco pomodoro)"},{"type":"item","text":"1 cipolla"},{"type":"item","text":"100 g piselli freschi sgranati"},{"type":"item","text":"500 g passata di pomodoro"},{"type":"item","text":"1 gambo di sedano"},{"type":"item","text":"100 g caciocavallo (anche tuma, fontina o silano calabro (come usa il nostro macellaio siciliano))"},{"type":"item","text":"olio di oliva"},{"type":"item","text":"olio per friggere"},{"type":"item","text":"sale e pepe"}],"directions":"In una padella sciogliere del burro, aggiungere una cipolla e farla dorare pian piano. Far quindi tostare il riso in modo che assorba tutti i grassi. Aggiungere con un mestolo abbondante acqua (tenuta a sobbollire in un'altra pentola) fino a ricoprirlo e proseguire la cottura. Aggiungere via via altra acqua quando ce n'è bisogno. A 3/4 della cottura scioglievi lo zafferano. Al termine della cottura (circa 20 minuti rispetto ai 15 pervisti per la semplice bollitura in acqua), il riso deve risultare al dente e asciutto, ma molto morbido e cremoso. Fuori dal fuoco, mescolarvi il pecorino pepato siciliano senza usare troppa forza. Distendere il riso su una teglia da forno imburrata creando uno spessore uniforme (circa 3 cm) e lasciarlo raffreddare. A quel punto, con l'aiuto di una spatola, suddividerlo in tanti quadrati quanti sono gli arancini previsti.\n\nNel frattempo preparare il ragu con carne trita (possibilmente battuta al coltello e non macinata) con piselli, cipolla, pomodoro e gli odori necessari. \n\nTagliare il formaggio fresco in piccoli cubetti di circa 2 cm di spessore.\n\nMettere un quadrato di riso nel palmo della mano e lavorarlo in modo da ricavare una coppetta. Farcirlo con una cucchiata di ragù.\n\nSu questo intingolo adagiare un cubetto di formaggio e chiudere l'arancino facendo attenzione a sigillarlo bene affinché né il ragù né il formaggio possano fuoriuscire.\n\nPassare ogni arancino nella farina (la Zia non la usa), poi nell'uovo battuto e, quindi, nel pangrattato. Preparare tutti gli arancini fino ad esaurimento degli ingredienti.\n\nFriggere in una capace padella con olio bollente fino alla corretta doratura. \n\nSgocciolare l'olio di frittura e riporre gli arancini in una teglia da forno.\n\nProcedere ad un ultimo finissaggio in forno caldo a 200℃  per 10 minuti per la smaltatura e asciugatura, in modo da conferire all'arancino tutto il suo inconfondibile aroma.","notes":"In onore a Messina, che più di ogni altra consorella città siciliana ha propagandato l'arancino, berremo il rosso Faro, profumato di zagara d'arance e di bergamotto.\n\nLa Zia usa anche una variante che prevede nel ripieno l'aggiunta di uvetta e pinoli.\n\nLi abbiamo preparati per il compleanno di Stefano, quindi omettendo la carne e preparando un \"ragù\" di sola salsa di pomodoro partendo da un abbondante soffritto di cipolla e carote.\nIl risultato è stato molto buono, con gli arancini che si presentavano perfettamente asciutti e dorati dopo il finissaggio in forno (200° per 5 minuti) e solo un paio di loro appena aperti da far fuoriuscire il formaggio durante la frittura.\nIl riso utilizzato (vialone nano), dopo la scolatura al dente si è mantenuto ben sgranato tanto da rendere anche un po' difficile modellare la forma. In compenso dopo la cottura la consistenza era ottima, per nulla pesante, ma ferma.\nIl formaggio usato (toma) era troppo poco consistente: da provare con una buona fontina.\nCon 400 grammi di riso (e gli altri ingredienti in proporzione) ne sono venuti fuori 8 della dimensione di una pallina da tennis (due un po' più piccoli).\n\n\nLo abbiamo rifatto applicando alcune varianti con un risultato decisamente ancora migliore. Vedere il procedimento di preparazione del riso che ho inserito in ricetta, e che è spiegato benissimo qui: http://youtu.be/nvP1AionSs4\nAbbiamo ottenuto una teglia che abbiamo suddiviso in 16 quadrati (4 x 4), più 4 di metà larghezza che abbiamo unito a due a due formando due quadrati ulteriori. In tutto18 arancini dosando gli ingredienti per 600 gr di riso.","rating":4,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"8573D78D-8B51-4AA4-A0B8-1E8B90C283CA","name":"Arrosto di Manzo","categories":["Manzo"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per l'arrosto:"},{"type":"item","text":"1,5 kg fesa di vitello"},{"type":"item","text":"2 cipolle (medie dimensioni)"},{"type":"item","text":"2 carote"},{"type":"item","text":"2 gambi di sedano"},{"type":"item","text":"1 testa aglio"},{"type":"item","text":"1 mazzetto timo (oppure anche rosmarino, alloro, o salvia od un misto)"},{"type":"item","text":"olio di oliva"},{"type":"item","text":"sale"},{"type":"item","text":"pepe nero"},{"type":"header","text":"per servire:"},{"type":"item","text":"Patate, Pastinache e Carote arrostite"},{"type":"item","text":"Sugo d'arrosto"},{"type":"item","text":"Salse per l'arrosto"}],"directions":"tirate fuori la carne dal frigo 30 minuti prima che debba andare in forno. Scaldate il forno a 240°. Non c'è bisogno di pelare le verdure: passatele sotto l'acqua e tagliatele grossolanamente. Dividete l'aglio in spicchi, senza pelarli. Ammucchiate le verdure, l'aglio e e le erbe nel centro di una grossa teglia e spruzzatele d'olio d'oliva.\n\nSpruzzate la carne con un po' d'olio d'oliva e conditelo bene con sale e pepe, strofinandolo per distrubuire il condimento uniformemente . Appoggiate il vostro arrosto sopra lo strato di verdure.\n\nMettere la teglia nel forno già caldo. Abbasssate subito la temperatura portandola a 200° e, per una cottura media, cuocete per 60 minuti. Se vi piace più al sangue, tirate fuori l'arrosto 5-10 minuti prima. Se vi piace ben cotto, lasciatelo in forno 5-10 minuti in più. Se volete preparare anche patate e verdure arrosto, è ora di mettersi sotto con quelle, in modo da lasciarle in forno per l'ultima ora di cottura.\n\nA metà cottura, bagnate l'arrosto con il suo stesso sugo e, se vi sembra che le verdure si stiano sciugando troppo, aggiungete una spruzzata d'acqua per evitare che brucino. Quando la carne è cotta come piace a voi, tirate fuori la teglia dal forno e mettete il vostro arrosto a riposare su un tagliere. Copritelo con un foglio d'alluminio e un canovaccio da cucina e intanto iniziate a preparare il sugo e la salsa da voi scelta.\n\nTogliete lo spago dall'arrosto. Armatevi di un buon coltello, lungo e affilato, e di una forchetta per tenerlo fermo (possibilmente un forchettone per arrosti). Tagliatelo a fette e trasferitele su un piatto da portata.\n\nServite il vostro arrosto con il sugo caldissimo, le verdure arrostite e la salsa da voi scelta a parte.","notes":"","rating":4,"source":"Jamie Oliver","source_url":"","has_photo":true,"favorites":false},{"uid":"683BC8AC-8DFA-4CBD-ADA1-CEC7EC107770","name":"Baccalà Alla Messinese","categories":["Messinese"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"Quando questo baccalà lo abbiamo cucinato inevitabilmente ci è venuta in mente la storia della caponata e della sua etimologia. Sì perché, a sua volta, cucinando la caponata di carciofi qualche giorno fa avevamo finito per ragionare sull’origine della parola ed era saltata fuori, tra le diverse interpretazioni, anche una faccenda legata al pesce. Poi certo pensa e ripensa, ma alla fine e per fortuna è ora di mangiare e ad averlo in bocca questo baccalà messinese aveva qualcosa di quell’alchimia tipica della caponata: olive verdi, capperi, uva sultanina, pinoli… anche se poi manca l’aceto e ci sono in più le patate…\nRiflessioni, derive e parentele a parte il baccalà era buono, delicato, rassicurante con tutti i suoi sapori al posto giusto, senza prevaricazioni, ognuno a fare la sua parte.","ingredients":[{"type":"item","text":"500 g baccalà (già dissalato)"},{"type":"item","text":"400 g patate"},{"type":"item","text":"300 g passata di pomodoro"},{"type":"item","text":"1 costa di sedano"},{"type":"item","text":"2 cucchiai olive verdi"},{"type":"item","text":"1 cucchiaio capperi sotto sale"},{"type":"item","text":"1 cucchiaio pinoli"},{"type":"item","text":"1 cucchiaio uva sultanina"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale e pepe"}],"directions":"Sbollentare velocemente il sedano tagliato a pezzetti, comprese le foglie più verdi e tenere da parte. \n\nFar andare il pomodoro con poco olio extravergine di oliva, unire le patate tagliate in pezzetti medio-piccoli, il sedano, i capperi (ben sciacquati), le olive, i pinoli e l’uvetta, unire acqua sufficiente per coprire e far andare per 10-15 minuti. \n\nAggiungere il baccalà tagliato a pezzi, eventualmente ancora acqua e cuocere per circa mezz’ora a fuoco dolce facendo attenzione a non disfare troppo il pesce e le patate mescolando. \n\nRegolare di sale e pepe e servire caldo o tiepido, ma è buonissimo anche freddo.","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"10AB9F90-0477-429C-B33D-C7F85F4E64B1","name":"Banana Sour Cream Bread","categories":[],"servings":"8 persone","prep_time":"","cook_time":"","total_time":"","description":"\"I know, you're probably thinking, 'Oh no! Another banana bread recipe!' But this one is a little different: the sour cream makes this one so moist it melts in your mouth. The flavor is just wonderful!  This one is great for gift giving and holidays. Loaves freeze well.\" — Esther Nelson","ingredients":[{"type":"header","text":"Per guarnire"},{"type":"item","text":"10 g zucchero"},{"type":"item","text":"1.5 ml vaniglia (estratto)"},{"type":"item","text":"1 g cannella macinata"},{"type":"header","text":"Per l'impasto"},{"type":"item","text":"1 uovo"},{"type":"item","text":"45 g burro"},{"type":"item","text":"2 banane (molto mature)"},{"type":"item","text":"150 g zucchero semolato"},{"type":"item","text":"115 g panna acida"},{"type":"item","text":"1 g cannella macinata"},{"type":"item","text":"1 g sale"},{"type":"item","text":"3 g baking soda"},{"type":"item","text":"140 g farina 00"},{"type":"item","text":"30 g noci tritate (opzionale)"}],"directions":"Preheat oven to 150 degrees C. Grease one 7x3 inch loaf pans. In a small bowl, stir together 10 gwhite sugar, 1 g cinnamon and 1,5 ml vanilla extract. Dust pans lightly with cinnamon, vanilla and sugar mixture.\n\nIn a large bowl, cream butter and 3 cups sugar. Mix in eggs, mashed bananas, sour cream, vanilla and cinnamon. Mix in salt, baking soda and flour. Stir in nuts.  Divide into prepared pans.\n\nBake for 1 hour, until a toothpick inserted in center comes out clean.","notes":"","rating":0,"source":"Allrecipes.com","source_url":"","has_photo":true,"favorites":false},{"uid":"BC904D96-66FB-417A-8723-AA381096E09C","name":"Beef and Ale Stew","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"You are going to love this slow-cooked stew recipe, because it’s so simple and gives consistently good results. The meat should be cut into approximately 2cm cubes. Packs from most supermarkets are normally about that size. In stew recipes you’re often told to brown off the meat first. But I’ve done loads of tests and found the meat is just as delicious and tender without browning it first, so I’ve removed this usual stage from the recipe.","ingredients":[{"type":"item","text":"3 bay leaves (Fresh or dried)"},{"type":"item","text":"500 g diced stewing beef"},{"type":"item","text":"500 ml ale (Guinness or stout)"},{"type":"item","text":"2 stick celery"},{"type":"item","text":"2 onions (medium)"},{"type":"item","text":"2 carrots"},{"type":"item","text":"olive oil"},{"type":"item","text":"1 tablespoons plain flour"},{"type":"item","text":"400 g tomatoes (Tin chopped)"},{"type":"item","text":"sea salt"},{"type":"item","text":"black pepper (Freshly ground)"}],"directions":"If using the oven to cook your stew, preheat it to 180ºC/350ºF/gas 4 \n\nTrim the ends off your celery and roughly chop the sticks \n\nPeel and roughly chop the onions \n\nPeel the carrots, slice lengthways and roughly chop \n\nPut a casserole pan on a medium heat \n\nPut all the vegetables and the bay leaves into the pan with 2 lugs of olive oil and fry for 10 minutes \n\nAdd your meat and flour \n\nPour in the booze and tinned tomatoes \n\nGive it a good stir, then season with a teaspoon of sea salt (less if using table salt) and a few grinds of pepper \n\nBring to the boil, put the lid on and either simmer slowly on your hob or cook in an oven for 3 hours \n\nRemove the lid for the final half hour of simmering or cooking \n\nWhen done, your meat should be tender and delicious \n\nRemember to remove the bay leaves before serving, and taste it to see if it needs a bit more salt and pepper \n\nYou can eat your stew as it is, or you can add some lovely dumplings to it","notes":"","rating":0,"source":"Jamie's \"Ministry of Food\"","source_url":"","has_photo":true,"favorites":false},{"uid":"6F80FCC4-0C58-4086-A228-88F3D711AB3F","name":"Braciole Messinesi","categories":["Messinese"],"servings":"8 persone","prep_time":"","cook_time":"","total_time":"45 min","description":"Il lacerto è il girello di spalla (zampa anteriore, e quindi da non confondersi col girello di coscia che è posto nella parte posteriore) del manzo o bue, comunque di un bovino adulto. E' un muscolo ed è un taglio x bistecche, arrosti, bolliti, stracotti, brasati e umidi. A Milano è comunemente chiamato magatello, in altre città è conosciuto anche come tondino.","ingredients":[{"type":"item","text":"800 g lacerto"},{"type":"item","text":"200 g provola dolce"},{"type":"item","text":"pangrattato"},{"type":"item","text":"olio evo"},{"type":"item","text":"prezzemolo"},{"type":"item","text":"aglio"},{"type":"item","text":"sale e pepe"},{"type":"item","text":"pecorino pepato siciliano (grattugiato)"}],"directions":"Tagliare il lacerto a fette sottili.\n\nCondire il pangrattato con aglio (tritato finemente), prezzemolo, pecorino pepato grattugiato (siciliano), sale e pepe se serve (visto che il pecorino è molto salato e pepato di suo)\n\nTagliare la provoletta o galbanino (o qualsiasi tipo di formaggio dolce della stessa consistenza della provoletta) a dadini. Ogni fettina di carne va bagnata nell’olio extravergine d’oliva e passata nel pangrattato condito.\n\nVariante di condimento: Se piace unire dela polpa di un pomodoro crudo piccolo rosso spellato al pangrattato condito\n\nDisporre poi al centro della carne un dadino di formaggio, arrotolare la carne su se stessa, chiudere bene da tutti i lati ed infilzare con uno spiedo\n\nProcedere fino ad esaurimento degli ingredienti ottenendo spiedini di braciole per tutti. Arrostire sulla brace.","notes":"Il lacerto è il girello di spalla (zampa anteriore, e quindi da non confondersi col girello di coscia che è posto nella parte posteriore) del manzo o bue, comunque di un bovino adulto. E' un muscolo ed è un taglio per bistecche, arrosti, bolliti, stracotti, brasati e umidi. A Milano è comunemente chiamato magatello, in altre città è conosciuto anche come tondino.\n\nLa zia dispone le fettine tutte su un piano, le condisce tutte insieme con sale pepe e burro (al centro insieme ad un mezzo cucchiaio di pangrattato condito), le ripiega e le infilza nello spiedino. Poi le spalma ancora di burro e le passa nel pangrattato\n\nSpesso in Sicila mettono dentro anche del pecorino fresco. Un'altra variante (la faceva spesso la nonna Concetta), da fare in umido bianco, non prevede il pangrattato ed all'interno vi è solo un bel ciuffo di prezzemolo ed il formaggio (pecorino o altro).\n\nLa nonna Concetta faceva poi la versione alla cacciatora: esternamente erano nudi. il ripieno era con pangrattato (ed eventualmente formaggio). Venivano brasati in padella, prima, e cotti con i pomodorini ciliegini, poi, a formare una ricca salsa. La zia si ricorda che sapevano di cipolla quindi probabilmente insieme ai pomodorini veniva messo anche del soffritto di cipolla.","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"D6995498-4B4C-45DF-A535-18C43A543FA5","name":"Brodo con royale natalizia","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"2 lt Brodo universale"},{"type":"item","text":"4 uova"},{"type":"item","text":"1 tartufo"},{"type":"item","text":"1 bicchierino marsala stravecchio"},{"type":"item","text":"3 zucchine"},{"type":"item","text":"3 carote"},{"type":"item","text":"1 foglia alloro"},{"type":"item","text":"1 chiodi di garofano"},{"type":"item","text":"1 rametto prezzemolo (tritato)"},{"type":"item","text":"burro (qb)"},{"type":"item","text":"sale e pepe (qb)"}],"directions":"","notes":"","rating":0,"source":"Cucchiaio d'argento","source_url":"","has_photo":true,"favorites":false},{"uid":"19AD6208-5D8F-4D31-AE75-748FD5466C6A","name":"Brodo di crostacei","categories":["Ricette base","Aiutacuochi"],"servings":"1 litro","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"600 g teste e gusci di crostacei (oppure 1 kg eliminando i gamberetti)"},{"type":"item","text":"400 g gamberetti piccoli"},{"type":"item","text":"1,5 lt acqua oligominerale naturale"},{"type":"item","text":"1 bicchiere vino bianco secco"},{"type":"item","text":"2 porri"},{"type":"item","text":"1 carota"},{"type":"item","text":"1 costa di sedano verde"},{"type":"item","text":"1 pomodoro"},{"type":"item","text":"21 foglia alloro"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"3 chiodi di garofano"},{"type":"item","text":"1 mazzetto gambi di prezzemolo"},{"type":"item","text":"pepe bianco in grani"}],"directions":"Sciacquate bene e spezzettate le teste ed i gusci dei crostacei. Tagliate sottili porri, carote, sedano e aglio. Riunite gli scarti e le verdure in una casseruola, fateli rosolare con una noce di burro od un filo d'olio per 10'. Unite l'acqua, il vino senz'alcol, il pomodoro, il pepe, il mazzetto e l'alloro e portate a bollore.\n\nCuocete dolcemente e scoperto, schiumando con attenzione per 40' dal bollore.\n\nFiltrate con un colino coperto con una mussola bianca e concentrate a piacere sempre dolcemente.","notes":"Il brodo si conserva senza problemi. Utilizzate le bottiglie vuote dell'acqua minerale. Riempitele a 3/4, non di più, altirmenti quando ghiaccia rischia di rompersi la bottiglia, chiudetele col loro tappo, etichettatele e conservatele in freezer per almeno tre mesi. In frigo dura meno, circa una settimana.\n\nCuocere il brodo in una pentola chiusa con un coperchio lo rende più torbido.","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"674C4BFF-DA8D-489C-A2D3-0194584CDF6A","name":"Brodo di manzo","categories":["Ricette base","Aiutacuochi"],"servings":"2 litri","prep_time":"","cook_time":"","total_time":"","description":"Nell'ambito dei brodi, quello di manzo è il vero re. Soprattutto se concentrato è forte e dominante, combinarlo non è mai facile. Però per le grandi salse da carne, per un risotto esemplare come quello alla milanese e per alcune mitiche zuppe è insostituibile. Diluito, allarga il raggio di azione.","ingredients":[{"type":"item","text":"1 kg muscolo di bovino adulto (in un solo pezzo)"},{"type":"item","text":"1 osso di manzo con midollo"},{"type":"item","text":"3 lt acqua oligominerale naturale"},{"type":"item","text":"2 cipolle"},{"type":"item","text":"1 porro"},{"type":"item","text":"2 carote"},{"type":"item","text":"2 coste di sedano verde"},{"type":"item","text":"2 foglie alloro"},{"type":"item","text":"1 mazzetto gambi di prezzemolo"},{"type":"item","text":"3 chiodi di garofano"},{"type":"item","text":"pepe nero in grani"}],"directions":"Pelate una cipolla, dividetela in due per il largo e fatela tostare in padella, dal lato piatto, per 20': sembra una tecnica biodinamica, serve a rendere più brillante il brodo. Picchettate l'altra cipolla con i chiodi di garofano. Unite a freddo tutti gli ingredienti in una pentola della capienza sufficiente e portare a bollore.\n\nCuocete dolcemente e scoperto, schiumando e sgrassando con attenzione. Dopo 1 ora e mezza dal bollore eliminate le verdure e cuocete ancora per 1 ora e mezza\n\nAlla fine filtrate con un colino coperto con una mussola bianca e, se volete un brodo più concentrato, cuocete ancora 1 ora, sempre dolcemente.","notes":"Il brodo si conserva senza problemi. Utilizzate le bottiglie vuote dell'acqua minerale. Riempitele a 3/4, non di più, altirmenti quando ghiaccia rischia di rompersi la bottiglia, chiudetele col loro tappo, etichettatele e conservatele in freezer per almeno tre mesi. In frigo dura meno, circa una settimana.\n\nCuocere il brodo in una pentola chiusa con un coperchio lo rende più torbido, cosa che succede anche prolungando la cottura della carne oltre il tempo indicato.","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"E0BFD38F-0157-4F03-A8AA-6E50C3804FB4","name":"Brodo di pesce","categories":["Ricette base","Aiutacuochi"],"servings":"1 litro","prep_time":"","cook_time":"","total_time":"","description":"Si può fare con gli scarti di tutti i pesci tranne quelli azzurri.","ingredients":[{"type":"item","text":"1,2 kg teste, scarti e lische di pesce"},{"type":"item","text":"1,5 lt acqua oligominerale naturale"},{"type":"item","text":"1 bicchiere vino bianco secco"},{"type":"item","text":"2 porri"},{"type":"item","text":"1 carota"},{"type":"item","text":"1 costa di sedano verde"},{"type":"item","text":"1 pomodoro"},{"type":"item","text":"2 foglie alloro"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"3 chiodi di garofano"},{"type":"item","text":"1 mazzetto gambi di prezzemolo"},{"type":"item","text":"pepe bianco in grani"}],"directions":"Sciacquate bene e spezzettate gli avanzi del pesce. Tagliate sottili porri, carote, sedano e aglio. Riunite gli scarti del pesce e le verdure in una casseruola, fateli rosolare con una noce di burro od un filo d'olio per 10'. Unite l'acqua, il vino senz'alcol, il pomodoro, il pepe, il mazzetto e l'alloro e portate a bollore.\n\nCuocete dolcemente e scoperto, schiumando con attenzione per 40' dal bollore.\n\nFiltrate con un colino coperto con una mussola bianca e concentrate a piacere sempre dolcemente.","notes":"Il brodo si conserva senza problemi. Utilizzate le bottiglie vuote dell'acqua minerale. Riempitele a 3/4, non di più, altirmenti quando ghiaccia rischia di rompersi la bottiglia, chiudetele col loro tappo, etichettatele e conservatele in freezer per almeno tre mesi. In frigo dura meno, circa una settimana.\n\nCuocere il brodo in una pentola chiusa con un coperchio lo rende più torbido.","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"97563641-96BA-42F0-B822-7E92553A0C9C","name":"Brodo di pollo","categories":["Ricette base","Aiutacuochi"],"servings":"2 lt","prep_time":"","cook_time":"","total_time":"","description":"Potete farlo anche con una gallina, che cuocerete da 2 ore e 1/2 a 3 ore (dipende dall'età della gallina) o con un cappone, cuocendolo per 2 ore, sempre togliendo le verdure dopo 1 ora e 1/2.","ingredients":[{"type":"item","text":"1 pollo (da 1,2 kg privato del fegato)"},{"type":"item","text":"1 carcassa di pollo"},{"type":"item","text":"3 lt acqua oligominerale naturale"},{"type":"item","text":"2 cipolle"},{"type":"item","text":"1 porro"},{"type":"item","text":"2 carote"},{"type":"item","text":"2 coste di sedano verde"},{"type":"item","text":"2 foglie alloro"},{"type":"item","text":"1 mazzetto gambi di prezzemolo"},{"type":"item","text":"3 chiodi di garofano"},{"type":"item","text":"pepe nero in grani"}],"directions":"Pelate una cipolla, dividetela in due per il largo e fatela tostare in padella, dal lato piatto, per 20': sembra una tecnica biodinamica, serve a rendere più brillante il brodo. Picchettate l'altra cipolla con i chiodi di garofano. Unite a freddo tutti gli ingredienti in una pentola della capienza sufficiente e portare a bollore.\n\nCuocete dolcemente e scoperto, schiumando e sgrassando con attenzione per 1 ora e mezza dal bollore.\n\nFiltrate con un colino coperto con una mussola bianca e, se volete un brodo più concentrato, cuocete ancora a piacere, sempre dolcemente.","notes":"Il brodo si conserva senza problemi. Utilizzate le bottiglie vuote dell'acqua minerale. Riempitele a 3/4, non di più, altirmenti quando ghiaccia rischia di rompersi la bottiglia, chiudetele col loro tappo, etichettatele e conservatele in freezer per almeno tre mesi. In frigo dura meno, circa una settimana.\n\nCuocere il brodo in una pentola chiusa con un coperchio lo rende più torbido, cosa che succede anche prolungando la cottura della carne oltre il tempo indicato.","rating":4,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"BDD9EC5C-A08D-4B8F-BCD9-7F93C3F6A0C1","name":"Brodo di verdure","categories":["Ricette base","Aiutacuochi"],"servings":"1 lt","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1,5 lt acqua oligominerale naturale"},{"type":"item","text":"1 bicchiere vino bianco secco"},{"type":"item","text":"2 cipolle"},{"type":"item","text":"2 porri"},{"type":"item","text":"2 carote"},{"type":"item","text":"2 coste di sedano verde"},{"type":"item","text":"1 patata (sbucciata)"},{"type":"item","text":"2 zucchine"},{"type":"item","text":"1 pomodoro"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"2 foglie alloro"},{"type":"item","text":"1 mazzetto gambi di prezzemolo"},{"type":"item","text":"2 bacche di ginepro"},{"type":"item","text":"3 chiodi di garofano"},{"type":"item","text":"burro"}],"directions":"Tagliate a pezzi cipolle, porri (anche un po' di verde), carote, sedano, aglio e zucchine. Fate rosolare con una noce di burro per 15' a fuoco dolcissimo. Unite l'acqua, l'alloro, il ginepro, i chiodi di garofano, la patata a fette, il pomodoro, il mazzetto e portate a bollore.\n\nCuocete dolcemente e scoperto, schiumando con attenzione per 40' dal bollore. Filtrate con un colino coperto con una mussola bianca.\n\n\nFiltrate con un colino coperto con una mussola bianca e concentrate a piacere sempre dolcemente.","notes":"Il brodo si conserva senza problemi. Utilizzate le bottiglie vuote dell'acqua minerale. Riempitele a 3/4, non di più, altirmenti quando ghiaccia rischia di rompersi la bottiglia, chiudetele col loro tappo, etichettatele e conservatele in freezer per almeno tre mesi. In frigo dura meno, circa una settimana.\n\nCuocere il brodo in una pentola chiusa con un coperchio lo rende più torbido","rating":3,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"CD53DF53-6D9B-4D6D-8B29-C2D84CA4F792","name":"Brodo di vitello","categories":["Ricette base","Aiutacuochi"],"servings":"2 litri","prep_time":"","cook_time":"","total_time":"","description":"Accompagna, va da sé, preparazioni di vitello piuttosto che infiniti piatti dove la carne è un ingrediente dominante. Ma bisogna stare attenti: se concentrato a fondo, diventa poderoso (quasi) come un brodo di manzo, può addirittura andare bene per un risotto alla milanese.","ingredients":[{"type":"item","text":"600 g muscolo di vitello (in un solo pezzo)"},{"type":"item","text":"600 g biancostato di vitello"},{"type":"item","text":"1 osso di vitello"},{"type":"item","text":"3 lt acqua oligominerale naturale"},{"type":"item","text":"2 cipolle"},{"type":"item","text":"1 porro"},{"type":"item","text":"2 carote"},{"type":"item","text":"2 coste di sedano verde"},{"type":"item","text":"2 foglie alloro"},{"type":"item","text":"1 mazzetto gambi di prezzemolo"},{"type":"item","text":"3 chiodi di garofano"},{"type":"item","text":"pepe nero in grani"}],"directions":"Pelate una cipolla, dividetela in due per il largo e fatela tostare in padella, dal lato piatto, per 20': sembra una tecnica biodinamica, serve a rendere più brillante il brodo. Picchettate l'altra cipolla con i chiodi di garofano. Unite a freddo tutti gli ingredienti in una pentola della capienza sufficiente e portare a bollore.\n\nCuocete dolcemente e scoperto, schiumando e sgrassando con attenzione per 1 ora e mezza dal bollore.\n\nFiltrate con un colino coperto con una mussola bianca e concentrate a piacere sempre dolcemente.","notes":"Il brodo si conserva senza problemi. Utilizzate le bottiglie vuote dell'acqua minerale. Riempitele a 3/4, non di più, altirmenti quando ghiaccia rischia di rompersi la bottiglia, chiudetele col loro tappo, etichettatele e conservatele in freezer per almeno tre mesi. In frigo dura meno, circa una settimana.\n\nCuocere il brodo in una pentola chiusa con un coperchio lo rende più torbido, cosa che succede anche prolungando la cottura della carne oltre il tempo indicato.","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"A8B993E5-5820-4A8E-94FB-E144C2E8FE47","name":"Brodo universale","categories":["Ricette base","Aiutacuochi"],"servings":"2 litri","prep_time":"","cook_time":"","total_time":"","description":"Personalmente lo chiamo, poco elegantemente, \"brodo *******\", perché si sposa con tutti i piatti che genericamente richiedono un brodo. Consideratelo una ruota di scorta e quindi tenetelo sempre in freezer, tanto non costa niente. Per un risotto giallo non andrà mai bene, ma per tutti gli altri risotti, anche quelli misti di pesce, se la cava più che bene. Sempre giocando con il livello di concentrazione.","ingredients":[{"type":"item","text":"1 kg ossi misti di vitello"},{"type":"item","text":"2 carcasse di pollo"},{"type":"item","text":"3 lt acqua oligominerale naturale"},{"type":"item","text":"2 cipolle"},{"type":"item","text":"1 porro"},{"type":"item","text":"2 carote"},{"type":"item","text":"2 coste di sedano verde"},{"type":"item","text":"2 foglie alloro"},{"type":"item","text":"1 mazzetto gambi di prezzemolo"},{"type":"item","text":"3 chiodi di garofano"},{"type":"item","text":"pepe nero in grani"}],"directions":"Spezzettate gli ossi e le carcasse e fateli rosolare in una casseruola per 20'. Scolate il grasso, coprite con l'acqua, unite a freddo tutti gli ingredienti e portate a bollore.\n\nCuocete dolcemente e scoperto, schiumando e sgrassando con attenzione per 1 ora e mezza dal bollore.\n\nFiltrate con un colino coperto con una mussola bianca e concentrate a piacere sempre dolcemente.","notes":"Il brodo si conserva senza problemi. Utilizzate le bottiglie vuote dell'acqua minerale. Riempitele a 3/4, non di più, altirmenti quando ghiaccia rischia di rompersi la bottiglia, chiudetele col loro tappo, etichettatele e conservatele in freezer per almeno tre mesi. In frigo dura meno, circa una settimana.\n\nCuocere il brodo in una pentola chiusa con un coperchio lo rende più torbido, cosa che succede anche prolungando la cottura della carne oltre il tempo indicato.","rating":0,"source":"Allan Bay","source_url":"","has_photo":true,"favorites":false},{"uid":"3FD2524C-5D28-4EC7-A292-834982050A74","name":"Brownie","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"200 g cioccolato"},{"type":"item","text":"175 g burro"},{"type":"item","text":"325 g zucchero"},{"type":"item","text":"130 g farina"},{"type":"item","text":"3 uova"}],"directions":"Mescolare cioccolato e burro mettendo per 30 secondi nel microonde di volta in volta finché non è perfettamente amalgamato.\n\nUnire l'impasto allo zucchero e mescolare. Aggiungere le uova, e mescolare ancora.\n\nUna volta perfettamente amalgamato, ma non montato, infornare a 170° per 30 minuti","notes":"","rating":0,"source":"Francesca Fiorentini","source_url":"","has_photo":true,"favorites":false},{"uid":"2D15FF38-7F93-4561-A9A6-FF711616D5A4","name":"Buddy's Chicken Fajitas","categories":["Pollo"],"servings":"4","prep_time":"","cook_time":"30 min","total_time":"","description":"","ingredients":[{"type":"item","text":"1 red onion"},{"type":"item","text":"1 red pepper"},{"type":"item","text":"1 x 150g skinless free-range chicken breast"},{"type":"item","text":"1 teaspoon sweet smoked paprika"},{"type":"item","text":"½ teaspoon ground cumin"},{"type":"item","text":"olive oil"},{"type":"item","text":"1 corn on the cob"},{"type":"item","text":"2 spring onions"},{"type":"item","text":"1 fresh red chilli"},{"type":"item","text":"1 sprig of fresh coriander"},{"type":"item","text":"1 lime"},{"type":"item","text":"TO SERVE:"},{"type":"item","text":"8 small wholemeal flour tortillas"},{"type":"item","text":"¼ of an iceberg lettuce"},{"type":"item","text":"50g Cheddar cheese"},{"type":"item","text":"½ a bunch of fresh coriander (15g)"},{"type":"item","text":"50g natural yoghurt"}],"directions":"Preheat the oven to 150°C/350°F/gas 4. Peel and finely slice the red onion. Deseed and finely slice the red pepper and finely slice the chicken breast. Transfer everything to a large bowl, then wash your hands, board and knife.\n\nAdd the paprika and cumin to the bowl along with a small pinch of sea salt and black pepper and 1 teaspoon of olive oil. Mix well until everything is well coated.\n\nTo make the corn salsa, char the corn in a dry non-stick frying pan over a high heat for 8 to 10 minutes, turning regularly. Remove and leave to cool before carefully slicing the kernels off the husk (ask an adult to help you with this bit). Place the kernels in a bowl, finely slice and add the spring onions, red chilli and coriander. Squeeze over the lime juice, mix well and season with a little black pepper.\n\nWrap the tortillas in foil and place in the oven to warm through. Shred the lettuce, grate the cheese and pick the coriander leaves.\n\nPlace a large non-stick frying pan on a high heat. Once it’s very hot, carefully place the chicken and vegetables into the pan and cook for 3 to 5 minutes, until the chicken is cooked through and the peppers and onion have softened, stirring continuously. (You may need to do this in batches.)\n\nCarefully remove the tortillas from the oven (ask an adult to help you with this) and divide between the serving plates. Load up the warm tortillas with the chicken mixture and your choice of toppings, and tuck in right away!","notes":"","rating":0,"source":"jamieoliver.com","source_url":"https://www.jamieoliver.com/recipes/chicken/buddys-chicken-fajitas/","has_photo":true,"favorites":false},{"uid":"3DB160E7-D780-4CCD-B9F3-68F8D64ED29D","name":"Calamari Ripieni","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"35 min","description":"","ingredients":[{"type":"item","text":"6 calamari"},{"type":"item","text":"olio di oliva"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"300 g pomodori pelati"},{"type":"item","text":"1 uovo"},{"type":"item","text":"pangrattato"},{"type":"item","text":"Pangrattato condito alla Messinese"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"}],"directions":"Pulire bene i 6 calamari facendo attenzione a non bucarli.\n\nRosolare i tentacoli dei calamari in olio d’oliva e qualche spicchio d’aglio schiacciato. \n\nRimuovere i tentacoli e metterli da parte, aggiungere nella pentola i pomodori pelati e lasciare cuocere per qualche minuto.\n\nRiempire i calamari con una farcia composta dai tentacoli sminuzzati, un uovo e pangrattato condito.\n\nChiudere ogni calamaro con degli stecchini di legno, disporli nella pentola col sugo ottenuto precedentemente facendo attenzione che li ricopra tutti. \n\nCuocere per circa 25 minuti.\n\nSi può utilizzare il sughetto insieme ai tentacoli tagliuzzati per condire la pasta.\n\nAnziché cuocere i calamari nel sugo di pomodoro, si possono fare in bianco mettendoli in forno per circa 30 minuti cosparsi esternamente con del pangrattato condito, dell'olio d'oliva e del limone.","notes":"La Zia utilizza una sua varoante valida soprattutto se si utilizzano dei calamari grandi,: nel ripieno, oltre al classico pangrattato condito, mette capperi, olive, formaggio (emmental), pezzettini di pomodoro fresco ed un po' d'olio. Per fare il sugo, poi, utilizza gli stessi ingredienti aggiunti al pangrattato condito e sfuma tutto con il vino bianco\n\nIo e Sergio abbiamo fatto questa ricetta seguendo la versione originale, quindi al sugo. Molto buoni. Ma entrambi ci ricordiamo che la mamma li faceva più spesso al forno, probabilmente cospargendoli di pangrattato condito, olio (o burro) e probabilmente limone. Effettivamente in questo modo l'ottimo ripieno risaltava ancora di più.","rating":4,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"691CD661-FE5B-4267-B59E-C2A95BDAF39F","name":"Cannoli Alla Siciliana","categories":["Messinese"],"servings":"8 persone","prep_time":"","cook_time":"","total_time":"","description":"Dolce a base di ricotta tipico della Sicilia","ingredients":[{"type":"header","text":"per le scorze:"},{"type":"item","text":"250 g farina"},{"type":"item","text":"75 g zucchero"},{"type":"item","text":"12 cl vino bianco secco"},{"type":"item","text":"1 uovo"},{"type":"item","text":"q.b. strutto"},{"type":"header","text":"per il ripieno:"},{"type":"item","text":"800 g ricotta di pecora"},{"type":"item","text":"450 g zucchero"},{"type":"item","text":"vaniglia"},{"type":"item","text":"cherry brandy"},{"type":"item","text":"latte (se si deve ammorbidire l'impasto)"},{"type":"item","text":"cioccolato a scagliette"},{"type":"item","text":"zucchero a velo"},{"type":"item","text":"canditi (facoltativo)"}],"directions":"Mettere la farina sul tagliere e impastarla con gli altri ingredienti per 1/2 ora.\n\nTirare quindi la pasta con il matterello fino ad ottenere una sfoglia sottilissima; tagliarla a formettine ovali ed avvolgerle a pezzetti di canna.\n\n\nFriggere le scorze in strutto o olio. \n\nE' conveniente ungere le canne prima di usarle ed incollare i bordi delle formette di pasta con un po' di bianco d'uovo. \n\nDopo aver riempito i cannoli con la ricotta impastata con zucchero, vaniglia e brandy, ricoprire le estremità con scagliette di cioccolata. \n\nCospargere infine i cannoli con zucchero a velo.","notes":"Nella variante con i canditi impastarli insieme alla ricotta","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"55DF1A16-1FB8-42F4-A8DF-214BA1D07F6F","name":"Caponata Di Melanzane","categories":["Messinese"],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"Questa è una delle ricette più note della sicilia: chi non ha mia sentito parlare o solo visto in qualche film di montalbano un bel piatto di caponata di melanzane saporita e profumata?\nQuesta è la ricetta tradizionale presa da un vecchio libro di cucina di ricette tipiche della Sicilia, solitamente ognuni famiglia ci mette la sua aggiuntina che può variare il tutto ma gli ingredienti base sono sempre gli stessi e il sapore inconfondibile.","ingredients":[{"type":"header","text":"per gli ingredienti originali:"},{"type":"item","text":"3 melanzane"},{"type":"item","text":"1 cucchiaio concentrato di pomodoro"},{"type":"item","text":"1 cucchiaio capperi sotto sale"},{"type":"item","text":"1 cucchiaio zucchero"},{"type":"item","text":"1/2 bicchiere aceto di vino bianco"},{"type":"item","text":"2 pugni olive verdi"},{"type":"item","text":"1 costa di sedano"},{"type":"item","text":"1 cipolla"},{"type":"item","text":"foglie mentuccia"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale"},{"type":"item","text":"pepe nero"},{"type":"header","text":"per le aggiunte (non usate da nonna Concetta):"},{"type":"item","text":"1 alici"},{"type":"item","text":"1 cucchiaio pinoli"},{"type":"item","text":"1 cucchiaio uva sultanina"},{"type":"item","text":"2 peperoni"}],"directions":"Tagliare il sedano a tocchetti e sbollentarlo in acqua salata per 10 minuti, scolarlo e tenerlo da parte.\n\nLavare e tagliare le melenzane mantenendone la buccia, disporre in uno scolapasta alternando le melanzane ad un abbondante spolverata di sale, eventualmente posizionare un peso e lasciare a riposare per un ora circa cosi da perdere tutta la loro acqua di vegetazione.\n\nSciacquare sotto l' acqua corrente le melanzane ed asciugarle\n\n\nFriggerle fino a doratura e lasciarle a scolare su carta assorbente. Fare attenzione in questa fase a non cuocere troppo a lungo (si rischia che poi si spappoli).\n\nSe si utilizzano i peperoni, lavarli e tagliarli privandoli dei semi e delle coste bianche se troppo callose, farli a dadini e friggerli in abbondante olio, scolare e mettere a riposare su carta assorbente.\n\nNello stesso olio dove sono state fritte le verdure lasciare imbiondire la cipolla tagliata a fette, aggiungere il concentrato di pomodoro e un alice (se utilizzata), lasciare che tutto si sia amalgamato con 2 cucchiai d'acqua (per sciogliere il concentrato).\n\nAggiungere le verdure, le olive, i capperi, i pinoli e l'uva sultanina (se utilizzati), il sedano in padella e far saltare il tutto. Verso la fine aggiungere anche la mentuccia.\n\nTerminare sfumando con l'aceto in cui avrete sciolto lo zucchero. Regolare di sale e pepe lasciare riposare un paio di minuti per poi servirla tiepida o fredda (meglio) decorando con foglie di menta o basilico.","notes":"Un'amica della Zia ne fa una versione molto semplice: solo melanzane, aceto, zucchero e mentuccia (no pomodoro o altri ingredienti)","rating":0,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"8CD4056E-A1DD-4571-8451-44EF6F7D33FD","name":"Carciofi Alla Messinese","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"1 ora 30 min","description":"","ingredients":[{"type":"item","text":"6 carciofi (andrebbero usati quelli senza spine, tipo violetto di catania)"},{"type":"item","text":"pangrattato"},{"type":"item","text":"pecorino grattugiato"},{"type":"item","text":"1 filetto di acciuga sottolio (facoltativo)"},{"type":"item","text":"1 mazzetto prezzemolo"},{"type":"item","text":"aglio"},{"type":"item","text":"sale e pepe"}],"directions":"Separare i carciofi dal gambo, lavarli sotto l’acqua corrente e batterli su un ripiano di marmo in modo che si aprano e sia più facile condirli. \n\nPelare e tagliare gli spicchi d’aglio. \n\nLavare il prezzemolo e tritarlo con un coltello. \n\nIn una padella sciogliere l’acciuga (se utilizzata) in un po’ d’olio, aggiungere poi l’aglio, il prezzemolo, il pangrattato precedentemente mischiato con il pecorino, sale e pepe ed un po' d'olio. \n\nRimescolare il tutto. \n\nCapovolgere il carciofo, tenerlo ben fermo e condire con il preparato ben dorato riempendolo allargando le foglie. Ripetere l’operazione per tutti i carciofi. \n\nDisporre i carciofi verticalmente e a cerchio in una grande pentola, riempita con due dita d’acqua e al centro della può essere messo un recipiente metallico a forma di bicchiere anch’esso pieno d’acqua. In ogni caso i carciofi devono essere ben stretti tra loro per non cadere di fianco\n\nAvvolgere la parte superiore della pentola con della carta, che tipicamente viene utilizzata per i sacchetti del pane. Ponete il coperchio sopra la carta. \n\nCuocere a fuoco medio per circa 30 minuti. \n\nA questo punto versare su ogni carciofo un filino d’olio evo e passare in forno sotto al grill per far dorare lo strato superiore del pangrattato","notes":"Io e Sergio li abbiamo fatti seguendo la ricetta, ma senza mettere il coperchio sul foglio di carta (come ci ricordavamo tutti facessero la mamma e la nonna). Sono venuti molto bene, ma asciutti. Questo probabilmente perché anziche gratinarli velocemente sotto il grill li abbiamo passati nel forno ventilato a 200° per 15/20 minuti. Credo sia decisamente troppo. Da riprovare gratinando brevemente sotto un grill ben caldo.","rating":5,"source":"Zia","source_url":"","has_photo":true,"favorites":false},{"uid":"EEE41DE6-4D3B-4210-9D70-9F3FE580FB64","name":"Carne Murata","categories":["Messinese"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"Secondo di carne a base di vitello tipico della Sicilia e della Calabria","ingredients":[{"type":"item","text":"600 g carne di vitello a fette"},{"type":"item","text":"600 g patate"},{"type":"item","text":"6 pomodori"},{"type":"item","text":"1 cipolla"},{"type":"item","text":"olio evo"},{"type":"item","text":"sale"},{"type":"item","text":"pepe"},{"type":"item","text":"basilico"}],"directions":"Disponete in un tegame alternando, la carne, le patate tagliate a fette, i pomodori a pezzetti, la cipolla nettata e tritata, e condite di volta in volta con sale, pepe, basilico e origano. Quindi spruzzate d'olio. \n\nPonete su fuoco moderato con il coperchio per circa 30 minuti, aggiungendo se necessario di tanto in tanto un poco d'acqua. \n\nServire il piatto caldo.","notes":"","rating":3,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"0478656D-6380-40FD-8AE4-CFD0782DB2B4","name":"Cheese Cake","categories":[],"servings":"8 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per la crema:"},{"type":"item","text":"200 g philadelphia"},{"type":"item","text":"150 g zucchero"},{"type":"item","text":"3 uova"},{"type":"item","text":"2 bustine vanillina"},{"type":"item","text":"1/2 lt panna (fresca da montare)"},{"type":"item","text":"1/2 limone spremuto"},{"type":"header","text":"per la base:"},{"type":"item","text":"150 g marie (usare volendo i biscotti Digestive)"},{"type":"item","text":"100 g burro"},{"type":"item","text":"2 cucchiai zucchero"},{"type":"header","text":"per il topping"},{"type":"item","text":"250 g frutti di bosco"},{"type":"item","text":"125 g zucchero"},{"type":"item","text":"125 g acqua"}],"directions":"Mettete i biscotti in un mixer, aggiungendo lo zucchero di canna, quindi sminuzzateli finemente.\n\nPonete il burro a sciogliere in un pentolino; nel frattempo mettete i biscotti sminuzzati in una ciotola e aggiungete a poco a poco il burro sciolto amalgamando per bene il tutto.\n\nImburrate una tortiera, meglio se a cerchio apribile, del diametro di 22-24 cm; ritagliate un disco di carta forno dello stesso diametro del fondo della tortiera e due strisce della stessa altezza dei bordi,  quindi foderate la tortiera stessa.\n\nVersate il composto di biscotti sul fondo, e sui lati della tortiera livellando bene il composto aiutandovi con un cucchiaio. Mettete la teglia nel frigo per un’ora (o per fare prima nel freezer per mezz’ora).\n\nPreriscaldate il forno a 180 gradi. Ponete in una capace bacinella le uova, la vanillina e lo zucchero e sbattete il composto affinchè diventi omogeneo. Aggiungete poi il formaggio (se volete un cheese cake più alto, potete aggiungere fino a 150 gr di Philadelphia in più), amalgamandolo bene fino a che diventi ben cremoso e privo di grumi. Meglio effettuare l'operazione con un cucchiaio e a mano, per evitare che il formaggio possa cominciare a cagliare se frullato troppo energicamente.\n\nAggiungete al composto, sempre mescolando,  il succo di limone, la maizena, due bei pizzichi di sale ed in ultimo (senza però montarla!) la panna, continuando ad amalgamare tutto insieme. \n\nVersate la crema ottenuta nella tortiera che avrete tolto dal frigorifero (o dal freezer), livellatela e infornate a 180° per 40 minuti.\n\nA cottura avvenuta, spegnete il forno, e lasciate riposare il cheesecake per 30 minuti nel forno spento e con la porta leggermente aperta.","notes":"Il primo consiglio da seguire per una riuscita ottimale del cheesecake, è quello di usare assolutamente per la preparazione della crema il formaggio Philadelphia, mentre per il fondo usate solo biscotti digestive, meglio se della marca McVitie’s, che potrete facilmente reperire nei grandi supermercati.\n\nE' bene sapere, inoltre, che è meglio non aprire il forno prima di 30-40 minuti dall’inizio della cottura, per evitare rovinosi “afflosciamenti” del cake.","rating":0,"source":"Silvia Cappelli","source_url":"","has_photo":true,"favorites":false},{"uid":"0BB078D7-D114-4468-8D2B-6BF86E43AE66","name":"Classico alberello di pandoro","categories":[],"servings":"10 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 kg pandoro"},{"type":"item","text":"500 g panna fresca"},{"type":"item","text":"250 g marsala"},{"type":"item","text":"1/2 lt Crema al cioccolato"}],"directions":"","notes":"","rating":0,"source":"Cucchiaio d'argento","source_url":"","has_photo":true,"favorites":false},{"uid":"B9829A00-4D9B-4456-BA23-C2DEF8F17BE1","name":"Crema al cioccolato","categories":["Ricette base"],"servings":"1/2 lt","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g latte intero (volendo si può usare metà latte e metà panna)"},{"type":"item","text":"3 tuorli d'uovo"},{"type":"item","text":"170 g zucchero"},{"type":"item","text":"20 g maizena (volendo usare solo un pizzico per fare una crema più inglese)"},{"type":"item","text":"1 baccello vaniglia"},{"type":"item","text":"100 g cioccolato fondente 70%"}],"directions":"","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"60385997-5A5D-4A71-998F-DEF3029B5160","name":"Crema di asparagi","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"600 g asparagi (verdi)"},{"type":"item","text":"1 lt Brodo di verdure"},{"type":"item","text":"1/2 bicchiere vino bianco secco"},{"type":"item","text":"40 g farina"},{"type":"item","text":"50 g burro"},{"type":"item","text":"1 cipolla"},{"type":"item","text":"40 g panna fresca"},{"type":"item","text":"sale e pepe"}],"directions":"Pulite gli asparagi, eliminate la parte finale del gambo, tagliate a pezzetti il resto e tenete da parte le punte.\n\nTritate la cipolla. In una pentola scaldate il burro, insaporitevi la cipolla a fettine sottili, unite gli asparagi.\n\nDopo pochi minuti cospargetele con la farina. Mescolate, versate il vino ed il brodo. Salate, pepate, cuocete a fuoco basso mezz'ora mescolando. Frullate il tutto a lungo. \n\nVersate due bicchieri d'acqua in un tegame, portate a bollore, scottatevi le punte di asparagi due minuti. \n\nVersate il frullato in una pentola, ponete sul fuoco, aggiungete le punte di asparagi e tre cucchiai di panna.","notes":"Servire con Terlano Pinot Bianco DOC, oppure Colli Piacentini Sauvignon, o Casteldelmonte Chardonnay","rating":4,"source":"Cucchiaio d'argento","source_url":"","has_photo":true,"favorites":false},{"uid":"70A9F931-3EA6-4860-A8B4-ECADC558F1F0","name":"Crema di gamberi e pomodori","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1 kg gamberi"},{"type":"item","text":"1 lt Brodo di verdure"},{"type":"item","text":"500 g pomodori maturi"},{"type":"item","text":"45 g burro"},{"type":"item","text":"40 g farina"},{"type":"item","text":"2 cucchiaini curry (in polvere)"}],"directions":"Lessate per tre minuti i gamberi non sgusciati nel brodo bollente. Scolateli, sgusciateli e mettetene da parte dieci interi. Gli altri tritateli finemente. \n\nFiltrate il brodo con cura.\n\nIn una pentola fate sciogliere il burro, incorporatevi la farina e, quando ha preso colore, diluitela con il brodo caldo.\n\nPortate a bollore, riducete la fiamma e cuocete per dieci minuti mescolando.\n\nUnitevi i gamberi tritati. Spellate i pomodori, eliminate i semi, frullateli e insaporiteli con il curry. Aggiungeteli alla crema.\n\nPortateli a bollore per alcuni minuti, regolate di sale, versate nella zuppiera, guarnite con i gamberi interi e servite.","notes":"","rating":0,"source":"Cucchiaio d'argento","source_url":"","has_photo":true,"favorites":false},{"uid":"FE8E36DC-04D2-42F4-A3E5-2BDA41A4674E","name":"Crema Inglese","categories":["Ricette base"],"servings":"1/2 lt","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g latte intero (volendo si può usare metà latte e metà panna)"},{"type":"item","text":"3 tuorli d'uovo"},{"type":"item","text":"170 g zucchero"},{"type":"item","text":"1 pizzico maizena"},{"type":"item","text":"1 baccello vaniglia"}],"directions":"","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"22964EC3-D2B6-493D-916A-6A9BD3D548D7","name":"Crema Inglese di Natale","categories":["Ricette base"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"250 g latte intero"},{"type":"item","text":"250 panna fresca"},{"type":"item","text":"2 tuorli d'uovo"},{"type":"item","text":"170 g zucchero"},{"type":"item","text":"1 pizzico maizena"},{"type":"item","text":"1 baccello vaniglia"}],"directions":"","notes":"","rating":5,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"49A4711D-7BB2-4729-ABB5-C3F57A1EB2B4","name":"Crema Inglese di Natale al Cioccolato","categories":["Ricette base"],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"250 g latte intero"},{"type":"item","text":"250 g panna fresca"},{"type":"item","text":"2 tuorli d'uovo"},{"type":"item","text":"170 g zucchero"},{"type":"item","text":"1 pizzico maizena"},{"type":"item","text":"1 baccello vaniglia"},{"type":"item","text":"1 stecca cioccolato fondente 70%"}],"directions":"","notes":"","rating":5,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"4148CB1D-17CA-4555-8695-5E92ABA6F056","name":"Crema Pasticcera","categories":["Ricette base"],"servings":"1/2 lt","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g latte intero (volendo si può usare metà latte e metà panna)"},{"type":"item","text":"3 tuorli d'uovo"},{"type":"item","text":"170 g zucchero"},{"type":"item","text":"20 g maizena"},{"type":"item","text":"1 baccello vaniglia"}],"directions":"","notes":"","rating":4,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"F8EA7434-583C-4954-8196-5CD80E652EE7","name":"Crema Pasticcera al Cioccolato","categories":["Ricette base"],"servings":"1/2 lt","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g latte intero (volendo si può usare metà latte e metà panna)"},{"type":"item","text":"3 tuorli d'uovo"},{"type":"item","text":"170 g zucchero"},{"type":"item","text":"20 g maizena"},{"type":"item","text":"1 baccello vaniglia"},{"type":"item","text":"1 stecca cioccolato fondente 70%"}],"directions":"","notes":"","rating":4,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"9EA75AE4-E162-44FE-AB74-09EBD7F07165","name":"Creme Brulèe","categories":[],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"La crème brulée, dolce di origine francese la cui ricetta risalirebbe al lontano 1691, significa letteralmente crema bruciata, e consiste in una crema contenente uova, latte, panna e vaniglia cotta a bagnomaria nel forno in pirofile monoporzione. \n\nCome ultimo tocco, viene cosparsa di zucchero successivamente caramellato, in modo da formare una sottile superficie dolce e croccante.","ingredients":[{"type":"item","text":"8 Uova (solo i tuorli)"},{"type":"item","text":"500 ml Panna fresca"},{"type":"item","text":"125 ml Latte"},{"type":"item","text":"130 g Zucchero"},{"type":"item","text":"1 baccello Vaniglia"},{"type":"item","text":"q.b. Zucchero"}],"directions":"Per preparare la crème brulée la prima cosa da fare è accendere il forno a 180°. Versate poi in un tegame il latte, la panna (1), i semi di vaniglia che avrete estratto dal baccello e anche il baccello stesso (2), quindi portate lentamente ad ebollizione. Nel frattempo ponete i rossi d’uovo e lo zucchero in una ciotola (3)\n\ne mischiate gli ingredienti delicatamente con un mestolo di legno (4), senza sbatterli o formare schiuma. Quando il latte bollirà spegnete il fuoco, togliete il baccello di vaniglia e versate lentamente a filo il composto caldo nei rossi d’uovo (5), mescolando continuamente fino a che il composto non sarà diventato omogeneo (6).\n\nA questo punto preparate sei pirofiline da forno monoporzione (quelle in foto hanno una capacità di 150 ml l'una) e versatevi il composto ottenuto, debitamente filtrato con un colino (7), poi procedete con la cottura in forno a bagnomaria: disponetele in una teglia contenente dell’acqua bollente che dovrà ricoprire per 1/3 la superficie esterna delle pirofile (8), e infornate per circa 50-60 minuti a 180°. Quando la superficie della creme brulè sarà compatta e dorata togliete le pirofiline dal forno e lasciatele intiepidire (9).\n\nCospargete poi la superficie con lo zucchero semolato (10) e caramellizzatela con l’apposito attrezzo (11), oppure in alternativa ponete la creme brulè sotto al grill per qualche minuto. Non appena si sarà formata la crosticina dorata in superficie, la vostra creme brulè è pronta per essere servita (12). Per una buona riuscita della creme brulè è consigliabile porre le pirofiline contenenti il composto da cuocere a bagnomaria, in una teglia contenente dell’acqua bollente. A questo scopo vi consiglio di versare due dita di acqua nella teglia e di metterla sul fuoco: appena l’acqua bollirà, potete adagiarvi le pirofile e infornarle.","notes":"","rating":0,"source":"Giallo Zafferano","source_url":"","has_photo":true,"favorites":false},{"uid":"887ABC24-C1CC-4C01-AC1D-B8E7D5CF67BC","name":"Crocchette di Pesce alla Svedese","categories":["30 minuti"],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"2 filetto salmone (circa 150g l'uno, senza pelle e diliscati)"},{"type":"item","text":"1 filetto merluzzo (nella ricetta originale citava l'eglefino, molto simile. Circa 300g, senza pelle e diliscato)"},{"type":"item","text":"1 trancio tonno"},{"type":"item","text":"2 fette pane raffermo (con la crosta)"},{"type":"item","text":"1 limone"},{"type":"item","text":"1 mazzetto prezzemolo"},{"type":"item","text":"1 spicchio aglio"}],"directions":"","notes":"","rating":0,"source":"Jamie Oliver \"I miei menù da 30 minuti\"","source_url":"","has_photo":true,"favorites":false},{"uid":"4711E662-0383-4724-892B-C49471B6AAA0","name":"Crostata di frutta","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"Pasta frolla"},{"type":"item","text":"Crema pasticcera al cioccolato"},{"type":"item","text":"1 cestino lamponi"},{"type":"item","text":"1 cestino mirtilli"},{"type":"item","text":"1 melone"},{"type":"item","text":"1 banana"},{"type":"item","text":"1 cestino fragole"}],"directions":"","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"C5395C84-D901-4E11-98CD-DB8C93BBA3A9","name":"Crostata di Natale","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"Pasta frolla leggera"},{"type":"item","text":"Crema pasticcera al cioccolato"},{"type":"item","text":"2 cestini more"},{"type":"item","text":"2 cestini lamponi"}],"directions":"","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"CA025923-1D95-4B91-AE80-84ED4F77C9FC","name":"Crudité","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"500 g Carote"},{"type":"item","text":"500 g Finocchi"},{"type":"item","text":"500 g Sedano"}],"directions":"","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"2D2CC909-CB74-45BD-A8D8-999CD69309DA","name":"Crumble niçois au fromage de chèvre","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"header","text":"per la ratatouille:"},{"type":"item","text":"1 melanzana"},{"type":"item","text":"2 zucchine"},{"type":"item","text":"1 peperone rosso"},{"type":"item","text":"3 pomodori"},{"type":"item","text":"1 cipolla"},{"type":"item","text":"2 spicchi aglio"},{"type":"item","text":"1 rametto rosmarino"},{"type":"item","text":"1 bicchiere olio evo"},{"type":"header","text":"per la crema di formaggio:"},{"type":"item","text":"120 g formaggio di capra fresco"},{"type":"item","text":"10 cl panna fresca"},{"type":"item","text":"2 cucchiai olio evo"},{"type":"item","text":"2 pizzichi sale"},{"type":"item","text":"2 pizzichi pepe"},{"type":"header","text":"per il crumble:"},{"type":"item","text":"200 g farina"},{"type":"item","text":"100 g burro"},{"type":"item","text":"2 pizzichi sale"},{"type":"item","text":"1 tuorlo"}],"directions":"","notes":"","rating":0,"source":"Verrines","source_url":"","has_photo":true,"favorites":false},{"uid":"0C09D5B3-50FE-48F7-81FE-9272F334BFD0","name":"Crèpes","categories":["Ricette base"],"servings":"20/25 crèpes","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"200 g farina"},{"type":"item","text":"1/2 lt latte"},{"type":"item","text":"3 uova"},{"type":"item","text":"burro"}],"directions":"In una terrina lavorare le uova con la frusta.\n\nUnire, poco alla volta, la farina setacciata e il latte, mescolando sempre con la frusta, fino a ottenere una pastella liscia e omogenea.\n\nFarla riposare in luogo fresco per almeno un'ora.\n\nFar scaldare un padellino di ferro, oppure antiaderente, e spennellarlo con un poco di burro fuso a parte (o con olio, in base alla propria preferenza).\n\nVersarvi una piccola quantità di pastella e roteare rapidamente il padellino affinché si distribuisca uniformemente sul fondo formando un velo sottile.\n\nFar asciugare la crèpe a fuoco moderato, rigirarla con una spatola e farla asciugare anche dall'altra parte.\n\nSe necessario, rifinire il bordo tagliando quanto eccede da un piatto rovesciato o altra forma della giusta misura.\n\nFar raffreddare le crepes e accatastarle una sopra l'altra sopra un piatto (girato).","notes":"Bisognerebbe usare una padella solo per le crèpes (o le uova in generale). Altrimenti scartare la prima.\n\nPossono essere conservate in frigo diversi giorni oppure congelate tranquillamente. Gli avanzi della rifilatura del bordo sono ottimi per una minestra.","rating":5,"source":"Altopalato","source_url":"","has_photo":true,"favorites":false},{"uid":"CFC4FC57-3021-47FB-A189-D0B8734FAEE7","name":"Duck Rillettes","categories":[],"servings":"","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"2 duck legs"},{"type":"item","text":"250 g duck fat"},{"type":"item","text":"2 cloves garlic (smashed)"},{"type":"item","text":"5 sprigs thyme"},{"type":"item","text":"50 g pistachio nuts (chopped)"},{"type":"item","text":"50 g sultanas (chopped)"},{"type":"item","text":"1 teaspoon shallot vinegar"},{"type":"item","text":"sourdough toast (to serve)"}],"directions":"Preheat the oven to 150C/gas \n\nPlace the duck legs and fat in a roasting tray. \n\nSeason, then tuck in garlic and 3 thyme sprigs. Cover with foil and roast for 2 hours, until the meat is falling off the bone. Remove from oven. \n\nOnce cool, discard skin and shred meat. \n\nMix in pistachios, sultanas, vinegar and remaining thyme leaves. \n\nAdd enough cooking fat to bind mixture, about 2 tbsp. \n\nSeason, then serve with toast.","notes":"","rating":0,"source":"","source_url":"","has_photo":true,"favorites":false},{"uid":"4D476089-A80A-44BE-AB7D-CB4650F91BA3","name":"Egyptian Red Lentil Soup","categories":[],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"5 cups vegetable broth or 5 cups water"},{"type":"item","text":"1 cup dried red lentils"},{"type":"item","text":"2 cups chopped onions"},{"type":"item","text":"2 cups chopped potatoes"},{"type":"item","text":"8 garlic cloves (peeled and left whole)"},{"type":"item","text":"1 tablespoon canola oil"},{"type":"item","text":"2 teaspoons ground cumin"},{"type":"item","text":"1/2 teaspoon turmeric"},{"type":"item","text":"1 teaspoon salt"},{"type":"item","text":"1/3 cup chopped fresh cilantro"},{"type":"item","text":"3 tablespoons fresh lemon juice"},{"type":"item","text":"salt and pepper"}],"directions":"Add the first 5 ingredients to a large pot; cover and bring to a boil.\n\nLower the heat and simmer 15-20 minutes or until the lentils and veggies are tender.\n\nTake pot from stove burner and set aside.\n\nIn a small saucepan, add the oil; warm over low heat until the oil is hot but not smoking.\n\nAdd in the cumin, turmeric, and salt; cook and stir constantly for for 2-3 minutes or until the cumin has released its fragrance (be careful not to scorch the spices).\n\nSet spice mixture aside for 1 minute to cool.\n\nStir spice mixture into the lentil mixture; add cilantro, stir to combine.\n\nYou can puree the soup, in batches, in a blender OR you can use an immersion blender and blend to desired texture (I like to leave it a little chunky).\n\nAdd in lemon juice; stir to combine.\n\nRewarm soup in soup pot; season if needed with salt/pepper.","notes":"","rating":0,"source":"Food.com","source_url":"","has_photo":true,"favorites":false},{"uid":"CE23CA16-6CA6-46B7-B7F1-99F20FC2EBD3","name":"Egyptian Red Lentil Soup","categories":[],"servings":"6 persone","prep_time":"","cook_time":"","total_time":"","description":"","ingredients":[{"type":"item","text":"1182.95 ml vegetable broth or 1182.95 ml water"},{"type":"item","text":"236.59 ml dried red lentils"},{"type":"item","text":"473.18 ml chopped onions"},{"type":"item","text":"473.18 ml chopped potatoes"},{"type":"item","text":"8 garlic cloves (peeled and left whole)"},{"type":"item","text":"14.79 ml canola oil"},{"type":"item","text":"9.85 ml ground cumin"},{"type":"item","text":"2.46 ml turmeric"},{"type":"item","text":"4.92 ml salt"},{"type":"item","text":"78.07 ml chopped fresh cilantro"},{"type":"item","text":"44.37 ml fresh lemon juice"},{"type":"item","text":"salt and pepper"}],"directions":"Add the first 5 ingredients to a large pot; cover and bring to a boil.\n\nLower the heat and simmer 15-20 minutes or until the lentils and veggies are tender.\n\nTake pot from stove burner and set aside.\n\nIn a small saucepan, add the oil; warm over low heat until the oil is hot but not smoking.\n\nAdd in the cumin, turmeric, and salt; cook and stir constantly for for 2-3 minutes or until the cumin has released its fragrance (be careful not to scorch the spices).\n\nSet spice mixture aside for 1 minute to cool.\n\nStir spice mixture into the lentil mixture; add cilantro, stir to combine.\n\nYou can puree the soup, in batches, in a blender OR you can use an immersion blender and blend to desired texture (I like to leave it a little chunky).\n\nAdd in lemon juice; stir to combine.\n\nRewarm soup in soup pot; season if needed with salt/pepper.","notes":"","rating":0,"source":"Food.com","source_url":"","has_photo":true,"favorites":false},{"uid":"A8B11456-C22C-44D6-8885-7192FF690E42","name":"Filetto Di Manzo In Crosta Alla Birra","categories":[],"servings":"4 persone","prep_time":"","cook_time":"","total_time":"","description":"Il filetto di manzo in crosta alla birra è un secondo piatto raffinato e di grande effetto da preparare in occasioni speciali. \nUna delicata crosta di pasta sfoglia nasconde un ripieno pregiato: un taglio di filetto scottato in padella con un filo d’olio ricoperto da una crema di carciofi e rivestito da pancetta affumicata. \nLa riduzione del fondo di cottura del filetto sfumata con la birra accompagna il piatto: una delizia per il palato!","in
